<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyasa Ekranı | Dijital Tabela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        board: '#0a0a0a',     /* Tabela arka planı (Çok koyu) */
                        panel: '#171717',     /* Kart arka planı */
                        neonGreen: '#10b981', /* Döviz */
                        neonGold: '#fbbf24',  /* Altın */
                        neonBlue: '#3b82f6',  /* Elektrik */
                        neonOrange: '#f97316' /* Akaryakıt */
                    },
                    fontFamily: {
                        // Rakamların düzgün alt alta hizalanması için sans-serif ve tabular-nums kombinasyonu
                        'display': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }
        /* Rakamların dijital ekran gibi hizalanması */
        .tabular { font-variant-numeric: tabular-nums; }
        
        /* Çizgi animasyonu (Canlı hissi için) */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 20vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.03), rgba(255,255,255,0));
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="scanline-overlay"></div>

    <header class="bg-board border-b border-gray-800 py-4 px-6 sm:px-12 flex justify-between items-center shadow-2xl z-10 relative">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-satellite-dish text-2xl text-gray-400"></i>
            <h1 class="text-2xl sm:text-4xl font-black tracking-widest text-white uppercase">Vibe<span class="text-neonBlue">Tabela</span></h1>
        </div>
        <div class="flex flex-col items-end">
            <div class="flex items-center gap-2 text-neonGreen font-bold text-lg">
                <i class="fa-solid fa-circle text-[12px] animate-pulse"></i>
                CANLI YAYIN
            </div>
            <div id="clock" class="text-gray-400 text-sm sm:text-xl font-mono tabular">--:--:--</div>
        </div>
    </header>

    <main class="flex-grow p-4 sm:p-8 bg-[#050505] z-10 relative">
        
        <div class="max-w-screen-2xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-10">

            <div class="flex flex-col gap-4">
                <div class="bg-neonGreen/10 border border-neonGreen/30 rounded-t-xl p-3 text-center">
                    <h2 class="text-neonGreen text-xl font-bold uppercase tracking-wider"><i class="fa-solid fa-money-bill-transfer mr-2"></i>Döviz Piyasası</h2>
                </div>
                <div class="flex flex-col gap-4" id="currency-board">
                    </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-neonGold/10 border border-neonGold/30 rounded-t-xl p-3 text-center">
                    <h2 class="text-neonGold text-xl font-bold uppercase tracking-wider"><i class="fa-solid fa-coins mr-2"></i>Kıymetli Maden</h2>
                </div>
                <div class="flex flex-col gap-4" id="gold-board">
                    </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-neonOrange/10 border border-neonOrange/30 rounded-t-xl p-3 text-center">
                    <h2 class="text-neonOrange text-xl font-bold uppercase tracking-wider"><i class="fa-solid fa-gas-pump mr-2"></i>Akaryakıt & Enerji</h2>
                </div>
                <div class="flex flex-col gap-4" id="energy-board">
                    </div>
            </div>

        </div>
    </main>

    <footer class="bg-board border-t border-gray-900 py-3 px-6 text-center text-gray-600 text-sm z-10 relative uppercase tracking-widest">
        Veriler bilgilendirme amaçlıdır. MyVibeCoder Mimarisi.
    </footer>

    <script>
        /**
         * VERİ KATMANI (DATA STORE)
         * İleride Firebase Realtime Database'den gelecek JSON yapısının birebir simülasyonudur.
         */
        const MARKET_DATA = {
            currency: [
                { id: "USD", name: "Amerikan Doları", sell: "34.15", buy: "34.05", icon: "fa-dollar-sign", color: "text-neonGreen" },
                { id: "EUR", name: "Euro", sell: "37.85", buy: "37.70", icon: "fa-euro-sign", color: "text-neonGreen" }
            ],
            gold: [
                { id: "GRA", name: "Gram Altın", sell: "2.850", buy: "2.835", icon: "fa-scale-balanced", color: "text-neonGold" },
                { id: "CEY", name: "Çeyrek Altın", sell: "4.750", buy: "4.680", icon: "fa-ring", color: "text-neonGold" }
            ],
            energy: [
                { id: "B95", name: "Kurşunsuz 95", price: "42.55", unit: "₺/Lt", icon: "fa-gas-pump", color: "text-neonOrange" },
                { id: "DIZ", name: "Motorin (Dizel)", price: "43.10", unit: "₺/Lt", icon: "fa-oil-can", color: "text-neonOrange" },
                { id: "LPG", name: "Otogaz (LPG)", price: "24.30", unit: "₺/Lt", icon: "fa-fire-flame-simple", color: "text-neonOrange" },
                { id: "EV", name: "Elektrik (DC Şarj)", price: "9.85", unit: "₺/kWh", icon: "fa-bolt", color: "text-neonBlue" }
            ]
        };

        // UI RENDER FONKSİYONLARI
        function createBuySellCard(item) {
            return `
                <div class="bg-panel rounded-xl p-5 sm:p-6 border border-gray-800 shadow-xl flex flex-col justify-between h-full relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-br from-white/5 to-transparent rounded-bl-full pointer-events-none"></div>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl sm:text-2xl font-bold text-gray-200">${item.name}</h3>
                        <i class="fa-solid ${item.icon} text-3xl opacity-20 group-hover:opacity-100 transition-opacity ${item.color}"></i>
                    </div>
                    <div class="flex justify-between items-end border-t border-gray-800 pt-4 mt-2">
                        <div class="flex flex-col">
                            <span class="text-gray-500 text-xs sm:text-sm uppercase font-bold tracking-widest mb-1">Alış</span>
                            <span class="text-3xl sm:text-4xl font-bold tabular text-white">${item.buy}</span>
                        </div>
                        <div class="flex flex-col text-right">
                            <span class="text-gray-500 text-xs sm:text-sm uppercase font-bold tracking-widest mb-1">Satış</span>
                            <span class="text-3xl sm:text-4xl font-bold tabular ${item.color}">${item.sell}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function createSinglePriceCard(item) {
            return `
                <div class="bg-panel rounded-xl p-5 sm:p-6 border border-gray-800 shadow-xl flex items-center justify-between relative overflow-hidden group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gray-900 flex items-center justify-center border border-gray-700">
                            <i class="fa-solid ${item.icon} text-xl ${item.color}"></i>
                        </div>
                        <h3 class="text-lg sm:text-xl font-bold text-gray-200">${item.name}</h3>
                    </div>
                    <div class="flex items-baseline gap-1 text-right">
                        <span class="text-3xl sm:text-4xl font-bold tabular ${item.color}">${item.price}</span>
                        <span class="text-sm font-bold text-gray-500 uppercase">${item.unit}</span>
                    </div>
                </div>
            `;
        }

        function renderBoard() {
            // Döviz
            const currencyHTML = MARKET_DATA.currency.map(item => createBuySellCard(item)).join('');
            document.getElementById('currency-board').innerHTML = currencyHTML;

            // Altın
            const goldHTML = MARKET_DATA.gold.map(item => createBuySellCard(item)).join('');
            document.getElementById('gold-board').innerHTML = goldHTML;

            // Enerji (Akaryakıt & Şarj)
            const energyHTML = MARKET_DATA.energy.map(item => createSinglePriceCard(item)).join('');
            document.getElementById('energy-board').innerHTML = energyHTML;
        }

        // SAAT GÜNCELLEME (Tabela Hissi İçin)
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // BAŞLATMA
        document.addEventListener('DOMContentLoaded', () => {
            renderBoard();
            updateClock();
            setInterval(updateClock, 1000);
        });

    </script>
</body>
</html>

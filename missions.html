<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedef & Başarı Sistemi | Deep Blue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        deepBlue: {
                            900: '#0b1320',
                            800: '#111c2e',
                            700: '#162842',
                        },
                        uiPrimary: '#f43f5e', // Ekrandaki kırmızı/pembe buton rengi
                        uiSecondary: '#1e293b', // Ekrandaki koyu buton rengi
                    }
                }
            }
        }
    </script>
    <style>
        /* Deep Blue Space Background */
        body {
            background: radial-gradient(circle at top, #162842 0%, #0b1320 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Yeni Nesil Glassmorphism & Minimal Butonlar */
        .btn-primary {
            background-color: #f43f5e;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(244, 63, 94, 0.39);
        }
        .btn-primary:hover {
            background-color: #e11d48;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: #27354f;
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .glass-panel {
            background: rgba(17, 28, 46, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(0, 0, 0, 0.4);
        }

        /* Sekme (Tab) Aktif Durumu */
        .tab-active {
            border-bottom: 2px solid #38bdf8;
            color: #38bdf8;
            font-weight: 600;
        }

        /* Toast Animation */
        .toast-enter { animation: slideInUp 0.4s ease forwards; }
        .toast-leave { animation: slideOutDown 0.4s ease forwards; }
        @keyframes slideInUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes slideOutDown {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 100%); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="antialiased flex flex-col items-center py-6 px-4 md:px-0">

    <div class="w-full max-w-5xl flex justify-between items-center mb-6 px-4">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-graduation-cap text-3xl text-sky-400 drop-shadow-[0_0_15px_rgba(56,189,248,0.5)]"></i>
            <div>
                <h1 class="text-xl font-bold tracking-wider text-white">HEDEF SİSTEMİ</h1>
                <p class="text-xs text-sky-200/50">v1.0.0</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-slate-400" id="currentRoleText">Mod: Ebeveyn</span>
            <button onclick="app.toggleRole()" class="btn-secondary px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
                <i class="fa-solid fa-repeat"></i> Rol Değiştir
            </button>
        </div>
    </div>

    <main class="w-full max-w-5xl">
        
        <div class="glass-panel rounded-2xl p-6 mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-slate-400 text-sm font-medium">Toplam Başarı Puanı</h2>
                <div class="text-3xl font-bold text-sky-400 drop-shadow-md mt-1" id="totalPointsDisplay">0</div>
            </div>
            <div class="text-right">
                <i class="fa-solid fa-trophy text-4xl text-yellow-500/80"></i>
            </div>
        </div>

        <div class="flex border-b border-white/10 mb-6 px-2 overflow-x-auto hide-scrollbar" id="tabContainer">
            <button onclick="app.setTab('overview')" class="tab-btn tab-active px-4 py-3 text-sm transition-colors whitespace-nowrap" data-tab="overview">Genel Bakış</button>
            <button onclick="app.setTab('daily')" class="tab-btn text-slate-400 hover:text-slate-200 px-4 py-3 text-sm transition-colors whitespace-nowrap" data-tab="daily">Günlük</button>
            <button onclick="app.setTab('weekly')" class="tab-btn text-slate-400 hover:text-slate-200 px-4 py-3 text-sm transition-colors whitespace-nowrap" data-tab="weekly">Haftalık</button>
            <button onclick="app.setTab('monthly')" class="tab-btn text-slate-400 hover:text-slate-200 px-4 py-3 text-sm transition-colors whitespace-nowrap" data-tab="monthly">Aylık</button>
        </div>

        <div id="parentView" class="block animate-[fadeIn_0.5s_ease-out]">
            
            <div class="glass-panel rounded-2xl p-6 mb-8">
                <h3 class="text-lg font-semibold mb-5 text-white flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle text-rose-500"></i> Yeni Hedef Oluştur
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                    <div class="lg:col-span-2">
                        <label class="block text-xs text-slate-400 mb-1">Görev Adı</label>
                        <input type="text" id="goalTitle" placeholder="Örn: 50 sayfa kitap oku" class="glass-input w-full px-4 py-2.5 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Kategori</label>
                        <select id="goalCategory" class="glass-input w-full px-4 py-2.5 rounded-lg text-sm [&>option]:bg-deepBlue-800">
                            <option value="daily">Günlük</option>
                            <option value="weekly">Haftalık</option>
                            <option value="monthly">Aylık</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Kazanılacak Puan</label>
                        <input type="number" id="goalPoints" placeholder="Puan" class="glass-input w-full px-4 py-2.5 rounded-lg text-sm" min="1">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Süre (Saat cinsinden)</label>
                        <input type="number" id="goalDurationHours" placeholder="Örn: 24 (1 gün)" class="glass-input w-full px-4 py-2.5 rounded-lg text-sm" min="1">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Ekstra Ödül (Opsiyonel)</label>
                        <input type="text" id="goalReward" placeholder="Örn: Hafta sonu sinema" class="glass-input w-full px-4 py-2.5 rounded-lg text-sm">
                    </div>
                    <div class="flex items-end">
                        <button onclick="app.addGoal()" class="btn-primary w-full py-2.5 rounded-lg font-semibold flex items-center justify-center gap-2">
                            Görevi Ata <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="pendingContainer" class="mb-8 hidden">
                <h3 class="text-lg font-semibold mb-4 text-white flex items-center gap-2">
                    <i class="fa-solid fa-bell text-yellow-400 animate-pulse"></i> Onay Bekleyen Görevler
                </h3>
                <div id="pendingList" class="space-y-3"></div>
            </div>

            <h3 class="text-lg font-semibold mb-4 text-white" id="adminListTitle">Aktif Görevler (Genel Bakış)</h3>
            <div id="adminActiveList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>


        <div id="childView" class="hidden animate-[fadeIn_0.5s_ease-out]">
            <h3 class="text-xl font-semibold mb-6 text-white" id="childListTitle">Görevlerim (Genel Bakış)</h3>
            <div id="childActiveList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
            
            <div id="childEmptyState" class="hidden text-center py-20 glass-panel rounded-2xl border-dashed">
                <i class="fa-solid fa-check-double text-5xl text-sky-500/30 mb-4"></i>
                <h3 class="text-xl font-medium text-slate-300">Bu kategoride görev kalmadı!</h3>
                <p class="text-slate-500 mt-2">Harika gidiyorsun.</p>
            </div>
        </div>

    </main>

    <div id="toastContainer" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-3 w-max max-w-sm"></div>

    <script>
        const app = {
            role: 'parent',
            currentTab: 'overview',
            totalPoints: 0,
            goals: [],
            timerInterval: null,

            init() {
                // Örnek veriler ekleyelim
                const now = Date.now();
                this.goals.push({
                    id: this.generateId(),
                    title: "Matematik Ödevini Bitir",
                    category: 'daily',
                    points: 20,
                    reward: "Yarım saat oyun",
                    deadline: now + (5 * 60 * 60 * 1000), // 5 saat sonra
                    status: 'active'
                });
                this.goals.push({
                    id: this.generateId(),
                    title: "Haftalık Kitap Okuma Hedefi (150 sf)",
                    category: 'weekly',
                    points: 100,
                    reward: "Pizza Gecesi",
                    deadline: now + (3 * 24 * 60 * 60 * 1000) + (2 * 60 * 60 * 1000), // 3 gün 2 saat sonra
                    status: 'active'
                });

                this.startTimers();
                this.render();
            },

            generateId() {
                return Math.random().toString(36).substr(2, 9);
            },

            toggleRole() {
                this.role = this.role === 'parent' ? 'child' : 'parent';
                document.getElementById('currentRoleText').innerText = `Mod: ${this.role === 'parent' ? 'Ebeveyn' : 'Öğrenci'}`;
                
                const parentView = document.getElementById('parentView');
                const childView = document.getElementById('childView');
                
                if (this.role === 'parent') {
                    childView.classList.add('hidden');
                    parentView.classList.remove('hidden');
                } else {
                    parentView.classList.add('hidden');
                    childView.classList.remove('hidden');
                }
                
                this.render();
            },

            setTab(tabName) {
                this.currentTab = tabName;
                
                // Sekme stillerini güncelle
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    if(btn.dataset.tab === tabName) {
                        btn.classList.add('tab-active');
                        btn.classList.remove('text-slate-400');
                    } else {
                        btn.classList.remove('tab-active');
                        btn.classList.add('text-slate-400');
                    }
                });

                // Başlıkları güncelle
                const tabTitles = {
                    'overview': 'Genel Bakış',
                    'daily': 'Günlük Görevler',
                    'weekly': 'Haftalık Görevler',
                    'monthly': 'Aylık Görevler'
                };
                document.getElementById('adminListTitle').innerText = `Aktif Görevler (${tabTitles[tabName]})`;
                document.getElementById('childListTitle').innerText = `Görevlerim (${tabTitles[tabName]})`;

                this.render();
            },

            addGoal() {
                const title = document.getElementById('goalTitle').value.trim();
                const category = document.getElementById('goalCategory').value;
                const points = parseInt(document.getElementById('goalPoints').value);
                const hours = parseFloat(document.getElementById('goalDurationHours').value);
                const reward = document.getElementById('goalReward').value.trim();

                if (!title || !points || points <= 0 || !hours || hours <= 0) {
                    this.showToast('Lütfen görev adı, puan ve süreyi eksiksiz girin!', 'error');
                    return;
                }

                const deadline = Date.now() + (hours * 60 * 60 * 1000);

                const newGoal = {
                    id: this.generateId(),
                    title,
                    category,
                    points,
                    reward: reward || "Sadece Puan",
                    deadline,
                    status: 'active'
                };

                this.goals.push(newGoal);
                
                // Formu temizle
                document.getElementById('goalTitle').value = '';
                document.getElementById('goalPoints').value = '';
                document.getElementById('goalDurationHours').value = '';
                document.getElementById('goalReward').value = '';
                
                this.showToast('Yeni görev başarıyla atandı!', 'success');
                this.render();
            },

            requestApproval(id) {
                const goal = this.goals.find(g => g.id === id);
                if (goal && goal.status === 'active') {
                    goal.status = 'pending_approval';
                    this.showToast('Görev onaya gönderildi!', 'success');
                    this.render();
                }
            },

            approveGoal(id) {
                const goal = this.goals.find(g => g.id === id);
                if (goal && goal.status === 'pending_approval') {
                    goal.status = 'completed';
                    this.totalPoints += goal.points;
                    this.showToast(`${goal.points} puan eklendi!`, 'success');
                    this.render();
                }
            },

            rejectGoal(id) {
                const goal = this.goals.find(g => g.id === id);
                if (goal && goal.status === 'pending_approval') {
                    goal.status = 'active';
                    this.showToast('Görev reddedildi.', 'error');
                    this.render();
                }
            },

            deleteGoal(id) {
                this.goals = this.goals.filter(g => g.id !== id);
                this.showToast('Görev iptal edildi.', 'info');
                this.render();
            },

            // Akıllı Saat Formatlayıcı
            formatTimeLeft(deadline) {
                const now = Date.now();
                const diff = deadline - now;

                if (diff <= 0) return { text: "Süre Doldu", isUrgent: true, isExpired: true };

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / 1000 / 60) % 60);
                const seconds = Math.floor((diff / 1000) % 60);

                // 24 saatten fazlaysa Gün ve Saat göster
                if (days >= 1) {
                    return { text: `${days} Gün ${hours} Saat`, isUrgent: false, isExpired: false };
                } 
                // 24 saatten azsa dijital sayaç (HH:MM:SS)
                else {
                    const h = String(hours).padStart(2, '0');
                    const m = String(minutes).padStart(2, '0');
                    const s = String(seconds).padStart(2, '0');
                    return { 
                        text: `${h}:${m}:${s}`, 
                        isUrgent: hours < 1, // Son 1 saat kala kırmızı/acil durum
                        isExpired: false 
                    };
                }
            },

            // Saniyede bir UI'ı tetikler
            startTimers() {
                if(this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    this.updateTimerUIs();
                }, 1000);
            },

            // Sadece DOM'daki saat elemanlarını günceller (Tüm render'ı çağırmaz, performansı korur)
            updateTimerUIs() {
                this.goals.forEach(goal => {
                    if(goal.status === 'active') {
                        const timeInfo = this.formatTimeLeft(goal.deadline);
                        const timerElements = document.querySelectorAll(`.timer-${goal.id}`);
                        
                        timerElements.forEach(el => {
                            el.innerText = timeInfo.text;
                            
                            // Renklendirme mantığı
                            if(timeInfo.isExpired) {
                                el.className = `timer-${goal.id} text-rose-500 font-bold`;
                            } else if(timeInfo.isUrgent) {
                                el.className = `timer-${goal.id} text-rose-400 font-mono tabular-nums animate-pulse`;
                            } else if(timeInfo.text.includes(':')) {
                                el.className = `timer-${goal.id} text-sky-400 font-mono tabular-nums font-semibold tracking-wider`;
                            } else {
                                el.className = `timer-${goal.id} text-sky-300 font-semibold`;
                            }
                        });
                    }
                });
            },

            getCategoryLabel(cat) {
                if(cat === 'daily') return '<span class="bg-blue-500/20 text-blue-300 border border-blue-500/30 px-2 py-0.5 rounded text-xs">Günlük</span>';
                if(cat === 'weekly') return '<span class="bg-purple-500/20 text-purple-300 border border-purple-500/30 px-2 py-0.5 rounded text-xs">Haftalık</span>';
                if(cat === 'monthly') return '<span class="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 px-2 py-0.5 rounded text-xs">Aylık</span>';
                return '';
            },

            render() {
                document.getElementById('totalPointsDisplay').innerText = this.totalPoints;

                // Filtreleme
                const visibleGoals = this.goals.filter(g => 
                    this.currentTab === 'overview' ? true : g.category === this.currentTab
                );

                // --- EBEVEYN GÖRÜNÜMÜ RENDER ---
                const pendingList = document.getElementById('pendingList');
                const pendingContainer = document.getElementById('pendingContainer');
                const adminActiveList = document.getElementById('adminActiveList');
                
                pendingList.innerHTML = '';
                adminActiveList.innerHTML = '';
                let hasPending = false;

                // Onay Bekleyenler (Sekmeden bağımsız hepsi görünür)
                this.goals.forEach(goal => {
                    if (goal.status === 'pending_approval') {
                        hasPending = true;
                        pendingList.innerHTML += `
                            <div class="glass-panel p-4 rounded-xl border-l-4 border-l-yellow-400 flex justify-between items-center">
                                <div>
                                    <h4 class="font-semibold text-white">${goal.title}</h4>
                                    <div class="flex items-center gap-2 mt-1">
                                        ${this.getCategoryLabel(goal.category)}
                                        <span class="text-xs text-yellow-300"><i class="fa-solid fa-star"></i> ${goal.points}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="app.approveGoal('${goal.id}')" class="w-10 h-10 rounded-lg bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500 hover:text-white transition flex items-center justify-center border border-emerald-500/50">
                                        <i class="fa-solid fa-check"></i>
                                    </button>
                                    <button onclick="app.rejectGoal('${goal.id}')" class="w-10 h-10 rounded-lg bg-rose-500/20 text-rose-400 hover:bg-rose-500 hover:text-white transition flex items-center justify-center border border-rose-500/50">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                });
                
                if(hasPending) pendingContainer.classList.remove('hidden');
                else pendingContainer.classList.add('hidden');

                // Admin Aktif Liste
                visibleGoals.forEach(goal => {
                    if (goal.status === 'active') {
                        adminActiveList.innerHTML += `
                            <div class="btn-secondary p-4 rounded-xl flex flex-col justify-between">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex gap-2">${this.getCategoryLabel(goal.category)}</div>
                                    <button onclick="app.deleteGoal('${goal.id}')" class="text-slate-500 hover:text-rose-400 transition">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                                <h4 class="font-medium text-white mb-3">${goal.title}</h4>
                                <div class="flex justify-between items-end border-t border-white/5 pt-3">
                                    <div>
                                        <div class="text-[10px] text-slate-500 mb-0.5"><i class="fa-regular fa-clock"></i> Kalan Süre</div>
                                        <div class="timer-${goal.id} text-sm">Hesaplanıyor...</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-sm font-bold text-yellow-400">${goal.points} Puan</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });

                if (adminActiveList.innerHTML === '') {
                    adminActiveList.innerHTML = '<p class="text-slate-500 text-sm col-span-2">Bu kategoride aktif görev bulunmuyor.</p>';
                }


                // --- ÇOCUK GÖRÜNÜMÜ RENDER ---
                const childActiveList = document.getElementById('childActiveList');
                const childEmptyState = document.getElementById('childEmptyState');
                childActiveList.innerHTML = '';
                let childHasActive = false;

                visibleGoals.forEach(goal => {
                    if (goal.status === 'active') {
                        childHasActive = true;
                        childActiveList.innerHTML += `
                            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden flex flex-col justify-between group">
                                <div class="absolute -right-10 -top-10 w-32 h-32 bg-sky-500/10 rounded-full blur-2xl group-hover:bg-sky-500/20 transition duration-500"></div>
                                
                                <div>
                                    <div class="flex justify-between items-start mb-3">
                                        ${this.getCategoryLabel(goal.category)}
                                        <div class="bg-yellow-500/20 border border-yellow-500/30 text-yellow-300 px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-1 shadow-[0_0_10px_rgba(234,179,8,0.2)]">
                                            <i class="fa-solid fa-star"></i> ${goal.points}
                                        </div>
                                    </div>
                                    <h3 class="text-xl font-bold text-white mb-2 leading-tight">${goal.title}</h3>
                                    
                                    ${goal.reward && goal.reward !== "Sadece Puan" ? `
                                        <div class="inline-flex items-center gap-2 bg-purple-500/20 border border-purple-500/30 text-purple-200 px-3 py-1.5 rounded-lg text-sm mt-2">
                                            <i class="fa-solid fa-gift text-purple-400"></i>
                                            <span>${goal.reward}</span>
                                        </div>
                                    ` : ''}
                                </div>
                                
                                <div class="mt-6 border-t border-white/10 pt-4 flex items-center justify-between">
                                    <div>
                                        <div class="text-xs text-slate-400 mb-1">Kalan Süre</div>
                                        <div class="timer-${goal.id} text-lg">...</div>
                                    </div>
                                    <button onclick="app.requestApproval('${goal.id}')" class="btn-primary px-5 py-2.5 rounded-xl font-semibold flex items-center gap-2 text-sm">
                                        Tamamla <i class="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                });

                if (childHasActive) {
                    childActiveList.classList.remove('hidden');
                    childEmptyState.classList.add('hidden');
                } else {
                    childActiveList.classList.add('hidden');
                    childEmptyState.classList.remove('hidden');
                }

                // Saatleri anında bir kez güncelle ki "Hesaplanıyor..." yazısı kalmasın
                this.updateTimerUIs();
            },

            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                let icon, bgClass;
                
                if(type === 'success') {
                    icon = '<i class="fa-solid fa-check-circle text-emerald-400"></i>';
                    bgClass = 'bg-[#1e293b] border-emerald-500/50';
                } else if(type === 'error') {
                    icon = '<i class="fa-solid fa-triangle-exclamation text-rose-400"></i>';
                    bgClass = 'bg-[#1e293b] border-rose-500/50';
                } else {
                    icon = '<i class="fa-solid fa-info-circle text-sky-400"></i>';
                    bgClass = 'bg-[#1e293b] border-sky-500/50';
                }

                toast.className = `toast-enter flex items-center gap-3 px-5 py-3 rounded-xl border shadow-2xl text-slate-200 text-sm font-medium ${bgClass}`;
                toast.innerHTML = `${icon} <span>${message}</span>`;
                
                const container = document.getElementById('toastContainer');
                container.appendChild(toast);

                setTimeout(() => {
                    toast.classList.replace('toast-enter', 'toast-leave');
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>

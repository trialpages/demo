<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akademik Panel - Optimize</title><style>
:root{
  --bg:#0b0b0c;
  --card:#1c1c1e;
  --accent:#0A84FF;
  --green:#30D158;
  --text:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{max-width:1000px;margin:auto;padding:16px}

.card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}

button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  transform:translateX(-100%);
  transition:transform .25s ease;
  will-change:transform;
  z-index:50;
}
#sidebar.open{transform:translateX(0)}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
#overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.6);
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:500px;
}

/* CHAT */
.chat{
  position:fixed;
  bottom:20px;
  right:20px;
}

.chat-box{
  width:260px;
  height:320px;
  background:var(--card);
  border-radius:12px;
  display:flex;
  flex-direction:column;
  transform:scale(.9);
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.chat-box.open{
  transform:scale(1);
  opacity:1;
  pointer-events:auto;
}

.chat-messages{
  flex:1;
  padding:10px;
  overflow:auto;
  font-size:14px;
}

input{
  width:100%;
  padding:10px;
  border:none;
  outline:none;
  background:#111;
  color:#fff;
}

.msg{margin-bottom:6px}
.user{color:#30D158}
</style></head><body><div id="overlay" onclick="closeAll()"></div><!-- SIDEBAR --><div id="sidebar">
  <h3>Menü</h3>
  <br>
  <button onclick="openModal('cv')">CV</button><br><br>
  <button onclick="openModal('projeler')">Projeler</button>
</div><div class="container">
  <button onclick="toggleSidebar()">☰ Menü</button>  <div class="card">
    <h2>Dr. Ahmet Yasin</h2>
    <p>İslam Hukuku Öğretim Üyesi</p>
  </div>  <div class="card">
    <h3>Duyurular</h3>
    <p>Sınav tarihi güncellendi.</p>
  </div>
</div><!-- MODALS --><div id="cv" class="modal">
  <div class="modal-box">
    <h3>CV</h3>
    <p>Akademik bilgiler burada yer alacak.</p>
    <br>
    <button onclick="closeAll()">Kapat</button>
  </div>
</div><div id="projeler" class="modal">
  <div class="modal-box">
    <h3>Projeler</h3>
    <p>Projeler burada listelenecek.</p>
    <br>
    <button onclick="closeAll()">Kapat</button>
  </div>
</div><!-- CHAT --><div class="chat">
  <button onclick="toggleChat()">💬</button>
  <div id="chatBox" class="chat-box">
    <div class="chat-messages" id="messages"></div>
    <input id="msg" placeholder="Mesaj yaz..." onkeydown="send(event)">
  </div>
</div><script>
function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('overlay');

  const open=s.classList.toggle('open');
  o.classList.toggle('show',open);
  document.body.style.overflow=open?'hidden':'';
}

function openModal(id){
  document.getElementById(id).classList.add('active');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeAll(){
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
}

function toggleChat(){
  document.getElementById('chatBox').classList.toggle('open');
}

function send(e){
  if(e.key==='Enter'){
    const input=e.target;
    const val=input.value.trim();
    if(!val) return;

    const box=document.getElementById('messages');

    const user=document.createElement('div');
    user.className='msg user';
    user.textContent='Sen: '+val;

    box.appendChild(user);

    const bot=document.createElement('div');
    bot.className='msg';
    bot.textContent='Asistan: Mesaj alındı';

    setTimeout(()=>box.appendChild(bot),500);

    input.value='';
    box.scrollTop=box.scrollHeight;
  }
}
</script></body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İslami Hayat - Fetva Sor</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 120px; resize: none; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #219150; }
        #status-message { text-align: center; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Fetva Sorun</h2>
    <form id="contact-form">
        <div class="input-group">
            <label>Adınız Soyadınız</label>
            <input type="text" name="from_name" id="from_name" placeholder="Örn: Ahmet Yılmaz" required>
        </div>
        
        <div class="input-group">
            <label>E-posta Adresiniz</label>
            <input type="email" name="user_email" id="user_email" placeholder="Örn: ahmet@mail.com" required>
        </div>
        
        <div class="input-group">
            <label>Sorunuz</label>
            <textarea name="message" id="message" placeholder="Sormak istediğiniz meseleyi detaylıca yazınız..." required></textarea>
        </div>
        
        <button type="submit" id="submit-btn">Mesajı Gönder</button>
    </form>
    <div id="status-message"></div>
</div>

<script type="text/javascript">
    (function() {
        // Senin Public Key'in
        emailjs.init("ddMWRT_150MJUhlbO");
    })();

    const contactForm = document.getElementById('contact-form');
    const statusMsg = document.getElementById('status-message');
    const submitBtn = document.getElementById('submit-btn');

    contactForm.addEventListener('submit', function(event) {
        event.preventDefault();
        
        // Butonu geçici olarak devre dışı bırakalım (çift gönderimi engellemek için)
        submitBtn.innerText = "Gönderiliyor...";
        submitBtn.disabled = true;

        // Senin Service ID ve Template ID bilgilerin
        emailjs.sendForm('service_fut374l', 'template_x4zgxdp', this)
            .then(function() {
                statusMsg.style.display = "block";
                statusMsg.style.color = "green";
                statusMsg.innerText = "Sitemize gönderdiğiniz sorunuz tarafımıza ulaşmıştır. Mümkün olan en kısa sürede cevaplanacaktır. Teşekkürler.";
                contactForm.reset();
                submitBtn.innerText = "Mesajı Gönder";
                submitBtn.disabled = false;
            }, function(error) {
                statusMsg.style.display = "block";
                statusMsg.style.color = "red";
                statusMsg.innerText = "Hata oluştu: " + JSON.stringify(error);
                submitBtn.innerText = "Tekrar Dene";
                submitBtn.disabled = false;
            });
    });
</script>

</body>
</html>

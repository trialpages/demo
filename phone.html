<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS - VibeCoder</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#3b82f6' }
                    }
                }
            }
        }
    </script>
    <style>
        /* Kaydırma çubuğunu (Scrollbar) tamamen gizler ama kaydırmayı engellemez */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4">

    <div class="relative w-full max-w-[375px] h-[812px] bg-gradient-to-br from-indigo-900 via-purple-900 to-black rounded-[3rem] border-[12px] border-black shadow-2xl overflow-hidden flex flex-col">
        
        <div class="flex justify-between items-center px-6 pt-3 pb-2 text-white text-xs font-medium z-10">
            <div id="status-time" class="tracking-wider">00:00</div>
            <div class="flex items-center gap-1.5">
                <i class="ph-fill ph-cell-signal-full text-sm"></i>
                <i class="ph-fill ph-wifi-high text-sm"></i>
                <i class="ph-fill ph-battery-full text-lg"></i>
            </div>
        </div>

        <div class="px-6 pt-6 z-10">
            <div id="status-date" class="text-white/80 text-sm font-medium mb-1">...</div>
            <div class="text-white text-3xl font-semibold flex items-center gap-2">
                <i class="ph-fill ph-cloud-sun text-yellow-400"></i>
                24°C
            </div>
            <div class="text-white/60 text-xs mt-1">Ödemiş, İzmir</div>
        </div>

        <div class="flex-1 w-full mt-8 overflow-x-auto snap-x snap-mandatory hide-scrollbar flex">
            
            <div class="min-w-full h-full px-6 grid grid-cols-4 gap-y-8 gap-x-4 content-start snap-center">
                
                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-tr from-yellow-400 to-yellow-200 rounded-2xl flex items-center justify-center shadow-lg group-hover:shadow-yellow-500/20 transition-all">
                        <i class="ph ph-notepad text-2xl text-yellow-900"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Notlar</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-tr from-gray-300 to-white rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-address-book text-2xl text-gray-700"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Rehber</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-lg relative transition-all">
                        <div class="absolute top-1 text-[8px] text-red-500 font-bold uppercase" id="cal-month">AY</div>
                        <i class="ph ph-calendar-blank text-2xl text-gray-800 mt-2"></i>
                        <div class="absolute top-6 text-sm font-bold text-gray-800" id="cal-day">00</div>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Takvim</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-lg transition-all overflow-hidden relative">
                        <div class="absolute inset-0 bg-gradient-to-tr from-pink-500 via-red-500 to-yellow-500 opacity-20"></div>
                        <i class="ph-fill ph-image text-2xl text-pink-600 z-10"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Galeri</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-br from-green-400 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-wallet text-2xl text-white"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Cüzdan</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-heartbeat text-2xl text-red-500"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Sağlık</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-tr from-blue-100 to-green-100 rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-map-pin text-2xl text-blue-600"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Haritalar</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-br from-gray-500 to-gray-700 rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-gear text-2xl text-gray-200"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Ayarlar</span>
                </button>
            </div>

            <div class="min-w-full h-full px-6 grid grid-cols-4 gap-y-8 gap-x-4 content-start snap-center">
                
                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-calculator text-2xl text-white"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Hesap Mak.</span>
                </button>

                <button class="flex flex-col items-center gap-2 group transition-transform active:scale-95">
                    <div class="w-14 h-14 bg-gradient-to-tr from-rose-400 to-red-500 rounded-2xl flex items-center justify-center shadow-lg transition-all">
                        <i class="ph-fill ph-music-notes text-2xl text-white"></i>
                    </div>
                    <span class="text-white/90 text-[10px] font-medium tracking-wide">Müzik</span>
                </button>
                
                </div>
            
        </div>

        <div class="flex justify-center gap-2 mb-28 z-10">
            <div class="w-1.5 h-1.5 rounded-full bg-white"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-white/40"></div>
        </div>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/20 backdrop-blur-xl border border-white/10 rounded-[2rem] p-4 flex justify-between items-center shadow-2xl z-20">
            
            <button class="w-12 h-12 bg-gradient-to-br from-green-400 to-green-500 rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-90">
                <i class="ph-fill ph-phone text-2xl text-white"></i>
            </button>

            <button class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-90">
                <i class="ph-fill ph-compass text-2xl text-blue-500"></i>
            </button>

            <button class="w-12 h-12 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-90 relative">
                <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-transparent bg-clip-padding">3</span>
                <i class="ph-fill ph-chat-circle-text text-2xl text-white"></i>
            </button>

            <button class="w-12 h-12 bg-gradient-to-br from-gray-100 to-gray-300 rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-90">
                <i class="ph-fill ph-camera text-2xl text-gray-800"></i>
            </button>

        </div>

        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-white/50 rounded-full z-20"></div>

    </div>

    <script>
        // Saat ve Tarih Güncelleme Sistemi (Kök neden: Kullanıcıya anlık geri bildirim hissi vermek)
        function updateDateTime() {
            const now = new Date();
            
            // Saati güncelle
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('status-time').textContent = `${hours}:${minutes}`;

            // Tarihi güncelle
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            
            const dayName = days[now.getDay()];
            const day = now.getDate();
            const monthName = months[now.getMonth()];
            
            document.getElementById('status-date').textContent = `${day} ${monthName}, ${dayName}`;

            // Takvim ikonunun üzerindeki tarihi güncelle
            const shortMonths = ['OCA', 'ŞUB', 'MAR', 'NİS', 'MAY', 'HAZ', 'TEM', 'AĞU', 'EYL', 'EKİ', 'KAS', 'ARA'];
            document.getElementById('cal-month').textContent = shortMonths[now.getMonth()];
            document.getElementById('cal-day').textContent = String(day).padStart(2, '0');
        }

        // İlk yüklemede çalıştır
        updateDateTime();
        
        // Her 1 saniyede bir saati güncelle
        setInterval(updateDateTime, 1000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top left, #0d1b2a, #020617);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    /* Özel Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
  </style>
</head>
<body class="text-slate-200 antialiased font-sans">

  <div class="max-w-4xl mx-auto px-4 py-8">
    <header class="text-center mb-10">
      <div class="inline-block p-3 rounded-2xl glass mb-4">
        <span class="text-4xl">📚</span>
      </div>
      <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300 uppercase tracking-tighter">
        Mektebe-i Şamile <span class="text-sm font-light text-blue-500 block mt-1 tracking-widest">Digital Pro Library</span>
      </h1>
    </header>

    <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl overflow-hidden relative">
      <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-blue-500/10 rounded-full blur-3xl"></div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="space-y-2">
          <label class="text-xs font-semibold text-blue-400 ml-1 uppercase tracking-wider">Kitap Adı</label>
          <input type="text" id="title" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder-slate-600" placeholder="Arama yapın...">
        </div>
        <div class="space-y-2">
          <label class="text-xs font-semibold text-blue-400 ml-1 uppercase tracking-wider">Yazar</label>
          <input type="text" id="author" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder-slate-600" placeholder="Müellif ismi...">
        </div>
        <div class="md:col-span-2 space-y-2">
          <label class="text-xs font-semibold text-blue-400 ml-1 uppercase tracking-wider">İçerik Metni (Detaylı Arama)</label>
          <input type="text" id="content" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-cyan-500 focus:outline-none transition-all placeholder-slate-600" placeholder="Cümle veya kelime öbeği yazın...">
        </div>
        <div class="space-y-2">
          <label class="text-xs font-semibold text-blue-400 ml-1 uppercase tracking-wider">Dil</label>
          <select id="lang" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none text-slate-400">
            <option>Tümü</option><option>Türkçe</option><option>Arapça</option><option>Osmanlıca</option>
          </select>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-semibold text-blue-400 ml-1 uppercase tracking-wider">Kategori</label>
          <select id="cat" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none text-slate-400">
            <option>Tümü</option><option>Fıkıh</option><option>Tefsir</option><option>Hadis</option><option>Tarih</option>
          </select>
        </div>
      </div>

      <div class="mt-8 flex flex-col md:flex-row gap-3">
        <button onclick="search()" class="flex-1 bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
          KÜTÜPHANEYİ TARA
        </button>
        <button onclick="reset()" class="bg-slate-800 text-slate-400 px-6 py-4 rounded-xl hover:bg-slate-700 transition-all">
          Sıfırla
        </button>
      </div>
    </div>

    <div id="loader" class="hidden mt-12 text-center">
      <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-cyan-400 mb-4"></div>
      <p class="text-cyan-400 animate-pulse text-sm tracking-widest">DİJİTAL RAFLAR İNCELENİYOR...</p>
    </div>

    <div id="results" class="mt-12 space-y-4">
      </div>
  </div>

  <script>
    function search() {
      const p = {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        content: document.getElementById('content').value,
        lang: document.getElementById('lang').value,
        cat: document.getElementById('cat').value
      };
      
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('results').innerHTML = '';

      google.script.run.withSuccessHandler(res => {
        document.getElementById('loader').classList.add('hidden');
        if(!res.results || res.results.length === 0) {
          document.getElementById('results').innerHTML = '<div class="text-center py-10 glass rounded-3xl text-slate-500">Eşleşen eser bulunamadı.</div>';
          return;
        }
        
        res.results.forEach(file => {
          const card = `
            <div class="glass glass-card p-5 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition-all">
              <div class="flex-1">
                <h3 class="font-bold text-lg text-blue-100 mb-1 leading-tight capitalize">${file.name.replace('.pdf','').toLowerCase()}</h3>
                <div class="flex flex-wrap gap-3 text-xs text-slate-500 uppercase tracking-widest">
                  <span>📅 ${file.date}</span>
                  <span class="text-cyan-600">💾 ${file.size}</span>
                </div>
              </div>
              <a href="${file.url}" target="_blank" class="w-full md:w-auto text-center px-6 py-2 bg-blue-500/10 border border-blue-500/50 text-blue-400 rounded-lg font-bold hover:bg-blue-500 hover:text-white transition-all">
                OKU
              </a>
            </div>
          `;
          document.getElementById('results').innerHTML += card;
        });
      }).proSearchInDrive(p);
    }

    function reset() {
      ['title','author','content'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('results').innerHTML = '';
    }
  </script>
</body>
</html>

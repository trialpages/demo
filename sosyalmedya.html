<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Sosyal Medya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1da1f2;
            --primary-hover: #1a91da;
            --bg-color: #f7f9f9;
            --container-bg: #ffffff;
            --text-main: #0f1419;
            --text-muted: #536471;
            --border-color: #eff3f4;
            --danger: #f4212e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        /* Layout */
        .app-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px;
            padding: 20px;
            border-right: 1px solid var(--border-color);
            background: var(--container-bg);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            font-size: 18px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 30px;
            margin-bottom: 10px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: #e7f5fe;
            color: var(--primary);
            font-weight: 600;
        }

        /* Main Feed Area */
        .main-content {
            flex: 1;
            max-width: 600px;
            border-right: 1px solid var(--border-color);
            background: var(--container-bg);
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 20px;
            font-weight: 700;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        /* Post Composer */
        .composer {
            display: flex;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--border-color);
        }

        .composer-body {
            flex: 1;
        }

        .composer textarea {
            width: 100%;
            border: none;
            resize: none;
            font-size: 18px;
            outline: none;
            min-height: 50px;
            padding-top: 10px;
        }

        .composer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .tools-left {
            display: flex;
            gap: 15px;
            color: var(--primary);
            font-size: 18px;
        }

        .tools-left i {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .tools-left i:hover {
            background: #e7f5fe;
        }
        
        .recording-indicator {
            color: var(--danger);
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }

        /* Posts */
        .post {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            transition: background 0.2s;
        }

        .post:hover { background: #fcfcfc; }

        .post-content { flex: 1; }

        .post-header {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .post-name { font-weight: 700; }
        .post-meta { color: var(--text-muted); font-size: 14px; }

        .post-text {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .post-media img {
            width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }

        .post-media iframe {
            width: 100%;
            height: 315px;
            border-radius: 15px;
            margin-top: 10px;
            border: none;
        }

        .post-media audio {
            width: 100%;
            margin-top: 10px;
            height: 35px;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: var(--text-muted);
            max-width: 400px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .action-btn:hover { color: var(--primary); }
        .action-btn.liked { color: var(--danger); }
        
        .comments-section {
            margin-top: 15px;
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
        }
        
        .comment-input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .comment-input-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
        }
        
        .comment {
            background: var(--bg-color);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-size: 14px;
        }

        /* Profile Page */
        .profile-header-cover {
            height: 150px;
            background: var(--primary);
        }

        .profile-details {
            padding: 20px;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--container-bg);
            margin-top: -80px;
            background: white;
            object-fit: cover;
        }

        .edit-profile-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .profile-form input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
        }

        /* Utilities */
        .hidden { display: none !important; }
        #fileInput { display: none; }
        
        /* Previews */
        .preview-area {
            position: relative;
            margin-top: 10px;
        }
        .preview-img {
            max-width: 100%;
            border-radius: 15px;
            max-height: 200px;
            object-fit: cover;
        }
        .remove-preview {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="app-wrapper">
    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-bolt"></i> hmdysn
        </div>
        <div class="nav-link active" onclick="app.switchTab('home')">
            <i class="fa-solid fa-house"></i> Anasayfa
        </div>
        <div class="nav-link" onclick="app.switchTab('profile')">
            <i class="fa-regular fa-user"></i> Profil
        </div>
    </nav>

    <main class="main-content">
        <div id="homeTab">
            <div class="header">Anasayfa</div>
            
            <div class="composer">
                <img src="" alt="Avatar" class="avatar current-user-avatar">
                <div class="composer-body">
                    <textarea id="postText" placeholder="Neler oluyor? (YouTube linkleri otomatik videoya dönüşür)"></textarea>
                    
                    <div id="mediaPreview" class="preview-area hidden"></div>
                    <div id="audioPreview" class="preview-area hidden"></div>

                    <div class="composer-tools">
                        <div class="tools-left">
                            <i class="fa-regular fa-image" title="Medya Yükle" onclick="document.getElementById('fileInput').click()"></i>
                            <input type="file" id="fileInput" accept="image/*" onchange="app.handleImageSelect(event)">
                            
                            <i class="fa-solid fa-microphone" id="micBtn" title="Ses Kaydet" onmousedown="app.startRecording()" onmouseup="app.stopRecording()"></i>
                            <span class="recording-indicator" id="recordingIndicator"><i class="fa-solid fa-circle"></i> Kaydediliyor...</span>
                        </div>
                        <button class="btn" onclick="app.createPost()">Paylaş</button>
                    </div>
                </div>
            </div>

            <div id="feedContainer">
                </div>
        </div>

        <div id="profileTab" class="hidden">
            <div class="header">Profil</div>
            <div class="profile-header-cover"></div>
            <div class="profile-details">
                <img src="" alt="Avatar" class="profile-avatar current-user-avatar" id="profileAvatarDisplay">
                <button class="btn edit-profile-btn" id="editProfileToggleBtn" onclick="app.toggleEditProfile()">Profili Düzenle</button>
                
                <div id="profileInfoDisplay" style="margin-top: 15px;">
                    <h2 class="post-name" style="font-size: 24px;" id="displayName"></h2>
                    <div class="post-meta" style="font-size: 16px; margin-top: 5px;" id="displayProfession"></div>
                </div>

                <div id="profileEditForm" class="profile-form hidden">
                    <input type="text" id="editName" placeholder="Ad">
                    <input type="text" id="editSurname" placeholder="Soyad">
                    <input type="text" id="editProfession" placeholder="Meslek / Unvan">
                    <div>
                        <label style="font-size: 14px; color: var(--text-muted);">Profil Resmi (Önerilen 1:1 format):</label>
                        <input type="file" id="editAvatarInput" accept="image/*" style="border: none; padding: 0;">
                    </div>
                    <button class="btn" onclick="app.saveProfile()">Kaydet</button>
                </div>
            </div>
            
            <div class="header" style="font-size: 18px; border-top: 1px solid var(--border-color);">Gönderilerim</div>
            <div id="profileFeedContainer">
                </div>
        </div>
    </main>
</div>

<script>
const app = {
    // Default Data
    currentUser: {
        id: 'user_01',
        name: 'Ahmet',
        surname: 'Küçüktiryaki',
        profession: 'Dr. Öğretim Üyesi',
        avatar: 'https://ui-avatars.com/api/?name=Ahmet+Küçüktiryaki&background=1da1f2&color=fff&size=128'
    },
    posts: [],
    
    // Media States
    selectedImage: null,
    recordedAudio: null,
    mediaRecorder: null,
    audioChunks: [],

    init() {
        // Load data from LocalStorage
        const savedUser = localStorage.getItem('hmdysn_profile');
        if (savedUser) this.currentUser = JSON.parse(savedUser);
        
        const savedPosts = localStorage.getItem('hmdysn_posts');
        if (savedPosts) this.posts = JSON.parse(savedPosts);

        this.updateProfileUI();
        this.renderPosts();
    },

    // --- UTILS ---
    saveData() {
        localStorage.setItem('hmdysn_profile', JSON.stringify(this.currentUser));
        localStorage.setItem('hmdysn_posts', JSON.stringify(this.posts));
    },

    switchTab(tab) {
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById('homeTab').classList.add('hidden');
        document.getElementById('profileTab').classList.add('hidden');
        
        if (tab === 'home') {
            document.getElementById('homeTab').classList.remove('hidden');
            document.querySelector('.nav-link:nth-child(2)').classList.add('active');
            this.renderPosts();
        } else {
            document.getElementById('profileTab').classList.remove('hidden');
            document.querySelector('.nav-link:nth-child(3)').classList.add('active');
            this.renderPosts('profile');
        }
    },

    parseText(text) {
        // Simple YouTube Parser
        const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
        const match = text.match(ytRegex);
        
        let processedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); // XSS protection
        
        let iframeHtml = '';
        if (match) {
            iframeHtml = `<iframe src="https://www.youtube.com/embed/${match[1]}" allowfullscreen></iframe>`;
            // Remove the URL from text to keep it clean, or keep it. Let's remove it for premium feel.
            processedText = processedText.replace(match[0], `<a href="${match[0]}" target="_blank" style="color:var(--primary)">[Video Linki]</a>`);
        }
        
        return { text: processedText, iframe: iframeHtml };
    },

    // --- PROFILE ---
    updateProfileUI() {
        const fullName = `${this.currentUser.name} ${this.currentUser.surname}`;
        document.querySelectorAll('.current-user-avatar').forEach(img => img.src = this.currentUser.avatar);
        document.getElementById('displayName').innerText = fullName;
        document.getElementById('displayProfession').innerText = this.currentUser.profession;
        
        document.getElementById('editName').value = this.currentUser.name;
        document.getElementById('editSurname').value = this.currentUser.surname;
        document.getElementById('editProfession').value = this.currentUser.profession;
    },

    toggleEditProfile() {
        const form = document.getElementById('profileEditForm');
        const info = document.getElementById('profileInfoDisplay');
        const btn = document.getElementById('editProfileToggleBtn');
        
        if (form.classList.contains('hidden')) {
            form.classList.remove('hidden');
            info.classList.add('hidden');
            btn.innerText = "İptal";
        } else {
            form.classList.add('hidden');
            info.classList.remove('hidden');
            btn.innerText = "Profili Düzenle";
        }
    },

    async saveProfile() {
        this.currentUser.name = document.getElementById('editName').value;
        this.currentUser.surname = document.getElementById('editSurname').value;
        this.currentUser.profession = document.getElementById('editProfession').value;
        
        const avatarInput = document.getElementById('editAvatarInput');
        if (avatarInput.files && avatarInput.files[0]) {
            this.currentUser.avatar = await this.fileToBase64(avatarInput.files[0]);
        }

        this.saveData();
        this.updateProfileUI();
        this.toggleEditProfile();
        this.renderPosts(); // Refresh avatars in posts
    },

    // --- POST CREATION ---
    handleImageSelect(event) {
        const file = event.target.files[0];
        if (file) {
            this.fileToBase64(file).then(base64 => {
                this.selectedImage = base64;
                const preview = document.getElementById('mediaPreview');
                preview.innerHTML = `
                    <img src="${base64}" class="preview-img">
                    <div class="remove-preview" onclick="app.clearMedia()"><i class="fa-solid fa-xmark"></i></div>
                `;
                preview.classList.remove('hidden');
            });
        }
    },

    clearMedia() {
        this.selectedImage = null;
        document.getElementById('mediaPreview').classList.add('hidden');
        document.getElementById('fileInput').value = "";
    },

    clearAudio() {
        this.recordedAudio = null;
        document.getElementById('audioPreview').classList.add('hidden');
    },

    // Audio Recording Logic
    async startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            this.mediaRecorder = new MediaRecorder(stream);
            this.audioChunks = [];

            this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
            this.mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(this.audioChunks, { type: 'audio/mp3' });
                this.recordedAudio = await this.fileToBase64(audioBlob);
                
                const preview = document.getElementById('audioPreview');
                preview.innerHTML = `
                    <audio controls src="${this.recordedAudio}"></audio>
                    <div class="remove-preview" onclick="app.clearAudio()" style="right:-30px;"><i class="fa-solid fa-xmark"></i></div>
                `;
                preview.classList.remove('hidden');
                
                // Stop all tracks to release mic
                stream.getTracks().forEach(track => track.stop());
            };

            this.mediaRecorder.start();
            document.getElementById('recordingIndicator').style.display = 'flex';
            document.getElementById('micBtn').style.color = 'var(--danger)';
        } catch (err) {
            alert("Mikrofon erişimi reddedildi veya cihaz bulunamadı.");
        }
    },

    stopRecording() {
        if (this.mediaRecorder && this.mediaRecorder.state === "recording") {
            this.mediaRecorder.stop();
            document.getElementById('recordingIndicator').style.display = 'none';
            document.getElementById('micBtn').style.color = 'var(--primary)';
        }
    },

    createPost() {
        const textInput = document.getElementById('postText');
        const text = textInput.value.trim();
        
        if (!text && !this.selectedImage && !this.recordedAudio) return;

        const newPost = {
            id: Date.now().toString(),
            author: this.currentUser,
            text: text,
            image: this.selectedImage,
            audio: this.recordedAudio,
            timestamp: new Date().toISOString(),
            likes: 0,
            isLiked: false,
            comments: []
        };

        this.posts.unshift(newPost);
        this.saveData();
        
        // Reset form
        textInput.value = '';
        this.clearMedia();
        this.clearAudio();
        
        this.renderPosts();
    },

    // --- POST RENDER & INTERACTIONS ---
    renderPosts(filter = 'home') {
        const container = filter === 'home' ? document.getElementById('feedContainer') : document.getElementById('profileFeedContainer');
        container.innerHTML = '';

        const postsToRender = filter === 'home' ? this.posts : this.posts.filter(p => p.author.id === this.currentUser.id);

        if (postsToRender.length === 0) {
            container.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-muted);">Henüz bir gönderi yok.</div>`;
            return;
        }

        postsToRender.forEach(post => {
            const parsed = this.parseText(post.text);
            const timeAgo = this.timeSince(new Date(post.timestamp));
            
            let mediaHtml = '';
            if (post.image) mediaHtml += `<img src="${post.image}">`;
            if (parsed.iframe) mediaHtml += parsed.iframe;
            if (post.audio) mediaHtml += `<audio controls src="${post.audio}"></audio>`;

            let commentsHtml = post.comments.map(c => `
                <div class="comment"><strong>${c.authorName}:</strong> ${c.text}</div>
            `).join('');

            const postEl = document.createElement('div');
            postEl.className = 'post';
            postEl.innerHTML = `
                <img src="${post.author.avatar}" class="avatar">
                <div class="post-content">
                    <div class="post-header">
                        <span class="post-name">${post.author.name} ${post.author.surname}</span>
                        <span class="post-meta">· ${post.author.profession} · ${timeAgo}</span>
                    </div>
                    <div class="post-text">${parsed.text}</div>
                    <div class="post-media">${mediaHtml}</div>
                    
                    <div class="post-actions">
                        <div class="action-btn ${post.isLiked ? 'liked' : ''}" onclick="app.toggleLike('${post.id}')">
                            <i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                            <span>${post.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="app.toggleComments('${post.id}')">
                            <i class="fa-regular fa-comment"></i>
                            <span>${post.comments.length || 0}</span>
                        </div>
                        <div class="action-btn" onclick="app.sharePost()">
                            <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        </div>
                    </div>

                    <div class="comments-section" id="comments-${post.id}">
                        <div class="comment-input-box">
                            <input type="text" id="commentInput-${post.id}" placeholder="Yanıtını yaz...">
                            <button class="btn" style="padding: 8px 15px; font-size:14px;" onclick="app.addComment('${post.id}')">Gönder</button>
                        </div>
                        <div id="commentList-${post.id}">
                            ${commentsHtml}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(postEl);
        });
    },

    toggleLike(postId) {
        const post = this.posts.find(p => p.id === postId);
        if (post) {
            post.isLiked = !post.isLiked;
            post.likes += post.isLiked ? 1 : -1;
            this.saveData();
            this.renderPosts(document.getElementById('homeTab').classList.contains('hidden') ? 'profile' : 'home');
        }
    },

    toggleComments(postId) {
        const section = document.getElementById(`comments-${postId}`);
        section.style.display = section.style.display === 'block' ? 'none' : 'block';
    },

    addComment(postId) {
        const input = document.getElementById(`commentInput-${postId}`);
        const text = input.value.trim();
        if (!text) return;

        const post = this.posts.find(p => p.id === postId);
        if (post) {
            post.comments.unshift({
                authorName: `${this.currentUser.name} ${this.currentUser.surname}`,
                text: text
            });
            this.saveData();
            this.renderPosts(document.getElementById('homeTab').classList.contains('hidden') ? 'profile' : 'home');
            // Re-open comments section after render
            document.getElementById(`comments-${postId}`).style.display = 'block';
        }
    },

    sharePost() {
        alert("Bağlantı panoya kopyalandı! (Simülasyon)");
    },

    // --- HELPERS ---
    fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    },

    timeSince(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + "y";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + "a";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + "g";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + "s";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + "d";
        return Math.floor(seconds) + "sn";
    }
};

// Start application
document.addEventListener('DOMContentLoaded', () => app.init());
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Sosyal Medya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1da1f2;
            --primary-hover: #1a91da;
            --bg-color: #f7f9f9;
            --container-bg: #ffffff;
            --text-main: #0f1419;
            --text-muted: #536471;
            --border-color: #eff3f4;
            --danger: #f4212e;
            --hover-bg: #f3f4f6;
            --modal-bg: rgba(0, 0, 0, 0.9);
        }

        [data-theme="dark"] {
            --bg-color: #15202b;
            --container-bg: #15202b;
            --text-main: #ffffff;
            --text-muted: #8899a6;
            --border-color: #38444d;
            --hover-bg: #1e2732;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; overflow-x: hidden; }

        /* Login Screen */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: var(--container-bg); padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px;
            border: 1px solid var(--border-color);
        }
        .login-box h2 { margin-bottom: 20px; color: var(--primary); }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 16px; background: var(--bg-color); color: var(--text-main);
        }
        .login-box button { width: 100%; }
        .login-hint { font-size: 12px; color: var(--text-muted); margin-top: 15px; }

        /* Layout */
        .app-wrapper { display: none; width: 100%; max-width: 1000px; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px; padding: 20px; border-right: 1px solid var(--border-color);
            background: var(--container-bg); position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column;
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-link {
            display: flex; align-items: center; gap: 15px; padding: 12px 20px; font-size: 18px;
            color: var(--text-main); text-decoration: none; border-radius: 30px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
        }
        .nav-link:hover, .nav-link.active { background: var(--hover-bg); color: var(--primary); font-weight: 600; }
        .nav-link i { width: 24px; text-align: center; }

        /* Main Content */
        .main-content { flex: 1; max-width: 600px; border-right: 1px solid var(--border-color); background: var(--container-bg); margin-bottom: 60px; /* for mobile */ }
        .header {
            padding: 15px 20px; border-bottom: 1px solid var(--border-color); font-size: 20px; font-weight: 700;
            position: sticky; top: 0; background: var(--container-bg); z-index: 10;
        }

        /* Buttons & Inputs */
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--primary-hover); }
        .btn-sm { padding: 5px 10px; font-size: 13px; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Composer */
        .composer { display: flex; padding: 20px; border-bottom: 1px solid var(--border-color); gap: 15px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: var(--border-color); flex-shrink: 0; }
        .composer-body { flex: 1; min-width: 0; }
        .composer textarea {
            width: 100%; border: none; resize: none; font-size: 18px; outline: none;
            min-height: 50px; background: transparent; color: var(--text-main);
        }
        .composer-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .tools-left { display: flex; gap: 15px; color: var(--primary); font-size: 18px; }
        .tools-left i { cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .tools-left i:hover { background: var(--hover-bg); }
        .recording { color: var(--danger) !important; animation: pulse 1.5s infinite; }

        /* Posts */
        .post { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; gap: 15px; transition: 0.2s; }
        .post:hover { background: var(--hover-bg); }
        .post-content { flex: 1; min-width: 0; }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .post-name { font-weight: 700; color: var(--text-main); }
        .post-meta { color: var(--text-muted); font-size: 14px; }
        .post-text { font-size: 15px; line-height: 1.5; margin-bottom: 10px; word-wrap: break-word; }
        .post-text a { color: var(--primary); text-decoration: none; }
        .post-text a:hover { text-decoration: underline; }
        
        /* Cropped Image for Feed */
        .post-media-img {
            width: 100%; max-height: 300px; object-fit: cover; border-radius: 15px;
            margin-top: 10px; border: 1px solid var(--border-color); cursor: pointer;
        }
        .post-media iframe { width: 100%; height: 250px; border-radius: 15px; margin-top: 10px; border: none; }
        .post-media audio { width: 100%; margin-top: 10px; height: 35px; outline: none; }

        .post-actions { display: flex; justify-content: space-between; margin-top: 15px; color: var(--text-muted); max-width: 400px; }
        .action-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { color: var(--primary); }
        .action-btn.liked { color: var(--danger); }

        /* Profile */
        .profile-header-cover {
            height: 150px; background-color: var(--primary); background-size: cover; background-position: center; cursor: pointer; position: relative;
        }
        .cover-edit-hint { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; pointer-events: none; }
        .profile-details { padding: 20px; position: relative; border-bottom: 1px solid var(--border-color); }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--container-bg); margin-top: -70px; background: white; object-fit: cover; }
        .profile-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .profile-form input { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-main); }
        
        /* Lightbox (Image Modal) */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--modal-bg); z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
        }
        #lightbox-img { max-width: 90%; max-height: 70vh; border-radius: 10px; object-fit: contain; }
        #lightbox-text { color: white; margin-top: 20px; max-width: 90%; text-align: center; font-size: 16px; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; cursor: pointer; }

        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .app-wrapper { flex-direction: column; }
            .sidebar {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; flex-direction: row;
                justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid var(--border-color); z-index: 100;
            }
            .logo { display: none; }
            .nav-link { margin: 0; padding: 10px; border-radius: 10px; flex-direction: column; gap: 3px; font-size: 10px; }
            .nav-link span { display: none; } /* Hide text, show only icons on bottom nav */
            .nav-link i { font-size: 20px; }
            .main-content { max-width: 100%; border-right: none; margin-bottom: 60px; }
            .post-actions { max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2><i class="fa-solid fa-bolt"></i> Giriş Yap</h2>
        <input type="email" id="loginEmail" placeholder="E-posta" value="test@demo.com">
        <input type="password" id="loginPass" placeholder="Şifre" value="123456">
        <button class="btn" onclick="app.login()">Giriş</button>
        <div class="login-hint">Bilgiler test amaçlı doldurulmuştur.</div>
    </div>
</div>

<div id="lightbox" onclick="app.closeLightbox(event)">
    <i class="fa-solid fa-xmark close-lightbox" onclick="app.closeLightbox(event, true)"></i>
    <img id="lightbox-img" src="">
    <div id="lightbox-text"></div>
</div>

<div class="app-wrapper" id="appWrapper">
    <nav class="sidebar">
        <div class="logo"><i class="fa-solid fa-bolt"></i> hmdysn</div>
        <div class="nav-link active" onclick="app.switchTab('home')">
            <i class="fa-solid fa-house"></i> <span>Anasayfa</span>
        </div>
        <div class="nav-link" onclick="app.switchTab('profile')">
            <i class="fa-regular fa-user"></i> <span>Profil</span>
        </div>
        <div class="nav-link" onclick="alert('Yer imleri yakında eklenecek!')">
            <i class="fa-regular fa-bookmark"></i> <span>Yer İmleri</span>
        </div>
        <div class="nav-link" onclick="alert('Ayarlar modülü yapım aşamasında.')">
            <i class="fa-solid fa-gear"></i> <span>Ayarlar</span>
        </div>
        <div class="nav-link" onclick="app.toggleTheme()">
            <i class="fa-solid fa-moon" id="themeIcon"></i> <span id="themeText">Karanlık Mod</span>
        </div>
    </nav>

    <main class="main-content">
        <div id="homeTab">
            <div class="header">Anasayfa</div>
            <div class="composer">
                <img src="" class="avatar current-user-avatar">
                <div class="composer-body">
                    <textarea id="postText" placeholder="Neler oluyor? (#etiket ve linkler otomatik tanınır)"></textarea>
                    
                    <div id="mediaPreview" class="hidden" style="position:relative; margin-top:10px;"></div>
                    <div id="audioPreview" class="hidden" style="position:relative; margin-top:10px;"></div>

                    <div class="composer-tools">
                        <div class="tools-left">
                            <i class="fa-regular fa-image" title="Resim Yükle" onclick="document.getElementById('fileInput').click()"></i>
                            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="app.handleImageSelect(event)">
                            
                            <i class="fa-solid fa-microphone" id="micBtn" title="Ses Kaydet" onclick="app.toggleRecording()"></i>
                        </div>
                        <button class="btn" onclick="app.createPost()">Paylaş</button>
                    </div>
                </div>
            </div>
            <div id="feedContainer"></div>
        </div>

        <div id="profileTab" class="hidden">
            <div class="header">Profil</div>
            <div class="profile-header-cover" id="coverPhoto" onclick="document.getElementById('coverInput').click()">
                <div class="cover-edit-hint"><i class="fa-solid fa-camera"></i> Kapak Değiştir</div>
            </div>
            <input type="file" id="coverInput" accept="image/*" class="hidden" onchange="app.handleCoverSelect(event)">

            <div class="profile-details">
                <img src="" class="profile-avatar current-user-avatar">
                <button class="btn btn-sm" style="position:absolute; right:20px; top:20px; background:var(--bg-color); color:var(--text-main); border:1px solid var(--border-color);" id="editProfileToggleBtn" onclick="app.toggleEditProfile()">Düzenle</button>
                
                <div id="profileInfoDisplay" style="margin-top: 15px;">
                    <h2 class="post-name" style="font-size: 22px;" id="displayName"></h2>
                    <div class="post-meta" style="font-size: 15px; margin-top: 5px;" id="displayProfession"></div>
                </div>

                <div id="profileEditForm" class="profile-form hidden">
                    <input type="text" id="editName" placeholder="Ad">
                    <input type="text" id="editSurname" placeholder="Soyad">
                    <input type="text" id="editProfession" placeholder="Meslek / Unvan">
                    <div>
                        <label style="font-size: 12px; color: var(--text-muted);">Profil Resmi:</label>
                        <input type="file" id="editAvatarInput" accept="image/*" style="border:none; padding:0;">
                    </div>
                    <button class="btn" onclick="app.saveProfile()">Kaydet</button>
                </div>
            </div>
            <div class="header" style="font-size: 16px; border-top: 1px solid var(--border-color);">Gönderilerim</div>
            <div id="profileFeedContainer"></div>
        </div>
    </main>
</div>

<script>
const app = {
    currentUser: {
        id: 'user_01', name: 'Ahmet', surname: 'Küçüktiryaki', profession: 'Dr. Öğretim Üyesi',
        avatar: 'https://ui-avatars.com/api/?name=Ahmet+Küçüktiryaki&background=1da1f2&color=fff&size=128',
        cover: ''
    },
    posts: [],
    selectedImage: null, recordedAudio: null, mediaRecorder: null, audioChunks: [], isRecording: false, isDarkMode: false,

    init() {
        // Tema Yükle
        const savedTheme = localStorage.getItem('hmdysn_theme');
        if (savedTheme === 'dark') this.setDarkTheme(true);

        const savedUser = localStorage.getItem('hmdysn_profile');
        if (savedUser) this.currentUser = JSON.parse(savedUser);
        
        const savedPosts = localStorage.getItem('hmdysn_posts');
        if (savedPosts) this.posts = JSON.parse(savedPosts);

        this.updateProfileUI();
        this.renderPosts();
    },

    login() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        if(email === 'test@demo.com' && pass === '123456') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appWrapper').style.display = 'flex';
            this.init();
        } else {
            alert("Hatalı e-posta veya şifre!");
        }
    },

    toggleTheme() {
        this.isDarkMode = !this.isDarkMode;
        this.setDarkTheme(this.isDarkMode);
    },

    setDarkTheme(isDark) {
        this.isDarkMode = isDark;
        const root = document.documentElement;
        const icon = document.getElementById('themeIcon');
        const text = document.getElementById('themeText');
        
        if (isDark) {
            root.setAttribute('data-theme', 'dark');
            icon.className = 'fa-solid fa-sun';
            text.innerText = 'Aydınlık Mod';
            localStorage.setItem('hmdysn_theme', 'dark');
        } else {
            root.setAttribute('data-theme', 'light');
            icon.className = 'fa-solid fa-moon';
            text.innerText = 'Karanlık Mod';
            localStorage.setItem('hmdysn_theme', 'light');
        }
    },

    saveData() {
        localStorage.setItem('hmdysn_profile', JSON.stringify(this.currentUser));
        localStorage.setItem('hmdysn_posts', JSON.stringify(this.posts));
    },

    switchTab(tab) {
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById('homeTab').classList.add('hidden');
        document.getElementById('profileTab').classList.add('hidden');
        
        if (tab === 'home') {
            document.getElementById('homeTab').classList.remove('hidden');
            document.querySelector('.nav-link:nth-child(2)').classList.add('active');
            this.renderPosts();
        } else {
            document.getElementById('profileTab').classList.remove('hidden');
            document.querySelector('.nav-link:nth-child(3)').classList.add('active');
            this.renderPosts('profile');
        }
    },

    parseText(text) {
        // Güvenlik (XSS engelleme)
        let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // YouTube Link
        const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
        const ytMatch = safeText.match(ytRegex);
        let iframeHtml = '';
        if (ytMatch) {
            iframeHtml = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen></iframe>`;
            safeText = safeText.replace(ytMatch[0], ''); // Metinden yt linkini çıkar
        }

        // Linkleri (URL) köprüye çevir
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        safeText = safeText.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');

        // Etiketleri (#hashtag) köprüye çevir
        const hashRegex = /#(\w+)/g;
        safeText = safeText.replace(hashRegex, '<a href="#" onclick="event.preventDefault()">#$1</a>');
        
        return { text: safeText, iframe: iframeHtml };
    },

    updateProfileUI() {
        const fullName = `${this.currentUser.name} ${this.currentUser.surname}`;
        document.querySelectorAll('.current-user-avatar').forEach(img => img.src = this.currentUser.avatar);
        document.getElementById('displayName').innerText = fullName;
        document.getElementById('displayProfession').innerText = this.currentUser.profession;
        
        if (this.currentUser.cover) {
            document.getElementById('coverPhoto').style.backgroundImage = `url(${this.currentUser.cover})`;
        }

        document.getElementById('editName').value = this.currentUser.name;
        document.getElementById('editSurname').value = this.currentUser.surname;
        document.getElementById('editProfession').value = this.currentUser.profession;
    },

    toggleEditProfile() {
        const form = document.getElementById('profileEditForm');
        const info = document.getElementById('profileInfoDisplay');
        const btn = document.getElementById('editProfileToggleBtn');
        form.classList.toggle('hidden');
        info.classList.toggle('hidden');
        btn.innerText = form.classList.contains('hidden') ? "Düzenle" : "İptal";
    },

    async handleCoverSelect(e) {
        if(e.target.files[0]) {
            this.currentUser.cover = await this.fileToBase64(e.target.files[0]);
            this.saveData();
            this.updateProfileUI();
        }
    },

    async saveProfile() {
        this.currentUser.name = document.getElementById('editName').value;
        this.currentUser.surname = document.getElementById('editSurname').value;
        this.currentUser.profession = document.getElementById('editProfession').value;
        
        const avatarInput = document.getElementById('editAvatarInput');
        if (avatarInput.files[0]) this.currentUser.avatar = await this.fileToBase64(avatarInput.files[0]);

        this.saveData();
        this.updateProfileUI();
        this.toggleEditProfile();
        this.renderPosts();
    },

    handleImageSelect(e) {
        if (e.target.files[0]) {
            this.fileToBase64(e.target.files[0]).then(b64 => {
                this.selectedImage = b64;
                const prev = document.getElementById('mediaPreview');
                prev.innerHTML = `<img src="${b64}" style="width:100px; border-radius:10px;"><i class="fa-solid fa-xmark" style="position:absolute;top:0;left:110px;cursor:pointer;color:red;" onclick="app.clearMedia()"></i>`;
                prev.classList.remove('hidden');
            });
        }
    },
    clearMedia() { this.selectedImage = null; document.getElementById('mediaPreview').classList.add('hidden'); document.getElementById('fileInput').value=""; },

    // Ses Kaydı (Toggle ile)
    async toggleRecording() {
        const micBtn = document.getElementById('micBtn');
        if (this.isRecording) {
            // Durdur
            this.mediaRecorder.stop();
            this.isRecording = false;
            micBtn.classList.remove('recording');
        } else {
            // Başlat
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                this.mediaRecorder = new MediaRecorder(stream);
                this.audioChunks = [];
                this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
                this.mediaRecorder.onstop = async () => {
                    const blob = new Blob(this.audioChunks, { type: 'audio/mp3' });
                    this.recordedAudio = await this.fileToBase64(blob);
                    document.getElementById('audioPreview').innerHTML = `<audio controls src="${this.recordedAudio}"></audio> <i class="fa-solid fa-xmark" style="cursor:pointer;color:red;" onclick="app.clearAudio()"></i>`;
                    document.getElementById('audioPreview').classList.remove('hidden');
                    stream.getTracks().forEach(t => t.stop());
                };
                this.mediaRecorder.start();
                this.isRecording = true;
                micBtn.classList.add('recording');
            } catch (err) {
                alert("Mikrofon erişimi sağlanamadı.");
            }
        }
    },
    clearAudio() { this.recordedAudio = null; document.getElementById('audioPreview').classList.add('hidden'); },

    createPost() {
        const input = document.getElementById('postText');
        if (!input.value.trim() && !this.selectedImage && !this.recordedAudio) return;

        this.posts.unshift({
            id: Date.now().toString(), author: {...this.currentUser}, text: input.value.trim(),
            image: this.selectedImage, audio: this.recordedAudio, timestamp: new Date().toISOString(),
            likes: 0, isLiked: false, comments: []
        });

        this.saveData(); input.value = ''; this.clearMedia(); this.clearAudio(); this.renderPosts();
    },

    deletePost(id) {
        if(confirm("Gönderiyi silmek istediğine emin misin?")) {
            this.posts = this.posts.filter(p => p.id !== id);
            this.saveData();
            this.renderPosts(document.getElementById('homeTab').classList.contains('hidden') ? 'profile' : 'home');
        }
    },

    renderPosts(filter = 'home') {
        const container = document.getElementById(filter === 'home' ? 'feedContainer' : 'profileFeedContainer');
        container.innerHTML = '';
        const list = filter === 'home' ? this.posts : this.posts.filter(p => p.author.id === this.currentUser.id);

        if(!list.length) { container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-muted);">Gönderi yok.</div>`; return; }

        list.forEach(post => {
            const pText = this.parseText(post.text);
            const timeAgo = this.timeSince(new Date(post.timestamp));
            
            // Medya oluştur
            let media = '';
            // Resim tıklanınca lightbox açılır (post text ile birlikte)
            if (post.image) media += `<img src="${post.image}" class="post-media-img" onclick="app.openLightbox('${post.image}', \`${post.text.replace(/"/g, '&quot;')}\`)">`;
            if (pText.iframe) media += pText.iframe;
            if (post.audio) media += `<audio controls src="${post.audio}"></audio>`;

            const isOwner = post.author.id === this.currentUser.id;
            const delBtn = isOwner ? `<button class="btn btn-sm btn-danger" onclick="app.deletePost('${post.id}')"><i class="fa-solid fa-trash"></i></button>` : '';

            container.innerHTML += `
                <div class="post">
                    <img src="${post.author.avatar}" class="avatar">
                    <div class="post-content">
                        <div class="post-header">
                            <div><span class="post-name">${post.author.name} ${post.author.surname}</span> <span class="post-meta">· ${timeAgo}</span></div>
                            ${delBtn}
                        </div>
                        <div class="post-text">${pText.text}</div>
                        <div class="post-media">${media}</div>
                        <div class="post-actions">
                            <div class="action-btn ${post.isLiked?'liked':''}" onclick="app.toggleLike('${post.id}')"><i class="${post.isLiked?'fa-solid':'fa-regular'} fa-heart"></i> ${post.likes||0}</div>
                            <div class="action-btn"><i class="fa-regular fa-comment"></i> ${post.comments?.length||0}</div>
                            <div class="action-btn"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
                        </div>
                    </div>
                </div>
            `;
        });
    },

    toggleLike(id) {
        const p = this.posts.find(x => x.id === id);
        if(p) { p.isLiked = !p.isLiked; p.likes += p.isLiked ? 1 : -1; this.saveData(); this.renderPosts(document.getElementById('homeTab').classList.contains('hidden') ? 'profile' : 'home'); }
    },

    openLightbox(imgSrc, text) {
        document.getElementById('lightbox-img').src = imgSrc;
        document.getElementById('lightbox-text').innerText = text;
        document.getElementById('lightbox').style.display = 'flex';
    },

    closeLightbox(e, force = false) {
        if(force || e.target.id === 'lightbox') {
            document.getElementById('lightbox').style.display = 'none';
        }
    },

    fileToBase64(file) { return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); }); },
    timeSince(date) {
        const s = Math.floor((new Date() - date)/1000);
        if(s<60) return s+"s"; if(s<3600) return Math.floor(s/60)+"d"; if(s<86400) return Math.floor(s/3600)+"s"; return Math.floor(s/86400)+"g";
    }
};

document.addEventListener('DOMContentLoaded', () => {
    // Sayfa yüklendiğinde app gizli, login açık
    document.getElementById('appWrapper').style.display = 'none';
});
</script>

</body>
</html>

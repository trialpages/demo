<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baybas Bag | Yönetim Paneli</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { brand: { DEFAULT: '#d4af37', dark: '#2c2c2c', light: '#fdfbf7' } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div id="toast" class="fixed top-5 right-5 bg-gray-900 text-white px-6 py-3 rounded shadow-lg transform transition-transform duration-300 translate-x-full opacity-0 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toastMsg">İşlem başarılı!</span>
    </div>

    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-store text-brand text-2xl"></i>
                <h1 class="text-xl font-semibold tracking-wide">Baybas Bag <span class="text-sm text-gray-400 font-normal ml-2">| Yönetim Paneli</span></h1>
            </div>
            <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-brand transition"><i class="fa-solid fa-arrow-up-right-from-square mr-1"></i> Siteyi Görüntüle</a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 sticky top-24">
                <h2 class="text-lg font-semibold mb-6 border-b pb-2">Yeni Ürün Ekle</h2>
                
                <form id="addProductForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ürün Adı</label>
                        <input type="text" id="pName" required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand focus:border-brand outline-none transition">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Fiyat (TL)</label>
                            <input type="number" id="pPrice" required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand focus:border-brand outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">İndirimli Fiyat (Opsiyonel)</label>
                            <input type="number" id="pDiscount" class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand focus:border-brand outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ImgBB Görsel Linki</label>
                        <input type="url" id="pImage" placeholder="https://i.ibb.co/..." required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-brand focus:border-brand outline-none transition">
                        <p class="text-xs text-gray-400 mt-1">ImgBB'den aldığınız doğrudan bağlantıyı yapıştırın.</p>
                    </div>

                    <button type="submit" class="w-full bg-brand-dark text-white font-medium py-2.5 rounded hover:bg-black transition mt-4">
                        <i class="fa-solid fa-plus mr-2"></i> Ürünü Kaydet
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6 border-b pb-2">
                    <h2 class="text-lg font-semibold">Mevcut Ürünler</h2>
                    <span id="demoBadge" class="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2.5 py-0.5 rounded border border-yellow-200 hidden">Demo Modu Aktif</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-sm text-gray-500 border-b">
                                <th class="pb-3 font-medium">Görsel</th>
                                <th class="pb-3 font-medium">Ürün Detayı</th>
                                <th class="pb-3 font-medium">Durum</th>
                                <th class="pb-3 font-medium text-right">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="productList" class="text-sm">
                            <tr><td colspan="4" class="text-center py-8 text-gray-400">Ürünler yükleniyor...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        // Firebase kütüphanelerini içe aktarma
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔴 BURASI SİZİN İÇİN: Firebase projesi açtığımızda kodları buraya yapıştıracağız.
        const firebaseConfig = {
            apiKey: "BURAYA_GELECEK",
            authDomain: "BURAYA_GELECEK",
            projectId: "BURAYA_GELECEK",
            storageBucket: "BURAYA_GELECEK",
            messagingSenderId: "BURAYA_GELECEK",
            appId: "BURAYA_GELECEK"
        };

        // Firebase anahtarı girilmiş mi kontrolü
        const isFirebaseConfigured = firebaseConfig.apiKey !== "BURAYA_GELECEK";
        
        let db;
        if (isFirebaseConfigured) {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } else {
            document.getElementById('demoBadge').classList.remove('hidden');
        }

        // State (Durum Yönetimi) - Demo modu için geçici veri
        let products = [
            { id: "demo1", name: "Klasik Deri Omuz Çantası", price: 1250, discount: null, image: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?auto=format&fit=crop&w=150&q=80", isActive: true, isSoldOut: false },
            { id: "demo2", name: "Süet Sırt Çantası", price: 1450, discount: null, image: "https://images.unsplash.com/photo-1591561954557-26941169b49e?auto=format&fit=crop&w=150&q=80", isActive: false, isSoldOut: false },
            { id: "demo3", name: "Günlük Bez Shopper", price: 450, discount: 360, image: "https://images.unsplash.com/photo-1622560480605-d83c853bc5c3?auto=format&fit=crop&w=150&q=80", isActive: true, isSoldOut: true },
        ];

        // Ürünleri Ekrana Çizme Fonksiyonu
        function renderProducts() {
            const listEl = document.getElementById('productList');
            listEl.innerHTML = ''; // Listeyi temizle

            if (products.length === 0) {
                listEl.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-400">Henüz ürün eklenmemiş.</td></tr>`;
                return;
            }

            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="py-4">
                        <img src="${p.image}" class="w-12 h-12 rounded object-cover border">
                    </td>
                    <td class="py-4">
                        <p class="font-medium text-gray-900 ${!p.isActive ? 'line-through text-gray-400' : ''}">${p.name}</p>
                        <p class="text-xs text-gray-500">${p.discount ? `<span class="line-through mr-1">${p.price}₺</span> <span class="text-brand font-semibold">${p.discount}₺</span>` : `${p.price}₺`}</p>
                    </td>
                    <td class="py-4">
                        ${p.isActive 
                            ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-medium">Yayında</span>` 
                            : `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-medium">Pasif</span>`}
                        
                        ${p.isSoldOut 
                            ? `<span class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-xs font-medium ml-1">Tükendi</span>` 
                            : ''}
                    </td>
                    <td class="py-4 text-right space-x-2">
                        <button onclick="toggleSoldOut('${p.id}', ${p.isSoldOut})" class="text-xs font-medium px-3 py-1.5 rounded border transition ${p.isSoldOut ? 'border-gray-300 text-gray-500 hover:bg-gray-100' : 'border-brand text-brand hover:bg-brand hover:text-white'}">
                            ${p.isSoldOut ? 'Stokta Var' : 'Tükendi Yap'}
                        </button>
                        
                        <button onclick="toggleActive('${p.id}', ${p.isActive})" class="text-xs font-medium px-3 py-1.5 rounded border transition ${p.isActive ? 'border-red-300 text-red-500 hover:bg-red-50' : 'border-green-300 text-green-600 hover:bg-green-50'}">
                            ${p.isActive ? '<i class="fa-regular fa-eye-slash"></i> Kaldır' : '<i class="fa-regular fa-eye"></i> Yayınla'}
                        </button>
                    </td>
                `;
                listEl.appendChild(tr);
            });
        }

        // Verileri Yükleme
        async function fetchProducts() {
            if (!isFirebaseConfigured) {
                renderProducts(); // Demo veriyi çiz
                return;
            }
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                renderProducts();
            } catch (error) {
                showToast("Veriler çekilirken hata oluştu!", true);
                console.error(error);
            }
        }

        // Ürün Ekleme (Form Submit)
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newProduct = {
                name: document.getElementById('pName').value,
                price: Number(document.getElementById('pPrice').value),
                discount: document.getElementById('pDiscount').value ? Number(document.getElementById('pDiscount').value) : null,
                image: document.getElementById('pImage').value,
                isActive: true, // Varsayılan olarak yayında
                isSoldOut: false, // Varsayılan olarak stokta var
                createdAt: new Date().toISOString()
            };

            if (!isFirebaseConfigured) {
                newProduct.id = "demo" + Math.random();
                products.unshift(newProduct);
                renderProducts();
                document.getElementById('addProductForm').reset();
                showToast("Ürün demo listeye eklendi.");
                return;
            }

            try {
                const docRef = await addDoc(collection(db, "products"), newProduct);
                newProduct.id = docRef.id;
                products.unshift(newProduct);
                renderProducts();
                document.getElementById('addProductForm').reset();
                showToast("Ürün başarıyla eklendi.");
            } catch (error) {
                showToast("Ürün eklenirken hata oluştu!", true);
                console.error(error);
            }
        });

        // Yayında / Pasif Durumunu Değiştir (HTML içinden çağrılabilmesi için window'a ekliyoruz)
        window.toggleActive = async (id, currentStatus) => {
            if (!isFirebaseConfigured) {
                const index = products.findIndex(p => p.id === id);
                products[index].isActive = !currentStatus;
                renderProducts();
                showToast(currentStatus ? "Ürün yayından kaldırıldı." : "Ürün yayına alındı.");
                return;
            }

            try {
                const productRef = doc(db, "products", id);
                await updateDoc(productRef, { isActive: !currentStatus });
                const index = products.findIndex(p => p.id === id);
                products[index].isActive = !currentStatus;
                renderProducts();
                showToast(currentStatus ? "Ürün yayından kaldırıldı." : "Ürün yayına alındı.");
            } catch (error) {
                showToast("Hata oluştu!", true);
            }
        };

        // Tükendi / Stokta Var Durumunu Değiştir
        window.toggleSoldOut = async (id, currentStatus) => {
            if (!isFirebaseConfigured) {
                const index = products.findIndex(p => p.id === id);
                products[index].isSoldOut = !currentStatus;
                renderProducts();
                showToast(!currentStatus ? "Ürün tükendi olarak işaretlendi." : "Ürün stokta olarak işaretlendi.");
                return;
            }

            try {
                const productRef = doc(db, "products", id);
                await updateDoc(productRef, { isSoldOut: !currentStatus });
                const index = products.findIndex(p => p.id === id);
                products[index].isSoldOut = !currentStatus;
                renderProducts();
                showToast(!currentStatus ? "Ürün tükendi olarak işaretlendi." : "Ürün stokta olarak işaretlendi.");
            } catch (error) {
                showToast("Hata oluştu!", true);
            }
        };

        // Toast Bildirim Fonksiyonu
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const icon = toast.querySelector('i');
            
            toastMsg.innerText = message;
            
            if (isError) {
                icon.className = "fa-solid fa-circle-exclamation text-red-400";
            } else {
                icon.className = "fa-solid fa-circle-check text-green-400";
            }

            toast.classList.remove('translate-x-full', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-x-full', 'opacity-0'), 3000);
        }

        // Sayfa yüklendiğinde verileri getir
        fetchProducts();

    </script>
</body>
</html>

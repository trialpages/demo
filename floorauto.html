<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kat Otomasyonu | Akıllı Ofis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4299e1;
            --success: #48bb78;
            --danger: #f56565;
            --outside: #a0aec0;
            --other-office: #9f7aea;
            --offline: #cbd5e0;
            --open-treat: #0d9488; /* Yeni: Çay/Kahve bekleyen durumu için Teal rengi */
            --coffee: #8c6b5d;
            --tea: #d97706;
            --action-bg: #f7fafc;
            --border: #e2e8f0;
            --input-bg: #edf2f7;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 10px 0; }
        header h1 { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

        .user-profile { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 8px 16px; border-radius: 30px; box-shadow: var(--shadow); font-weight: 500; font-size: 0.9rem; }

        /* --- Kontrol Paneli --- */
        .control-panel {
            width: 100%; max-width: 1000px; background: var(--card-bg); border-radius: var(--radius); padding: 24px;
            box-shadow: var(--shadow); margin-bottom: 32px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; transition: var(--transition);
        }

        .control-group { display: flex; flex-direction: column; gap: 12px; }
        .control-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; }

        .segment-control { display: flex; flex-wrap: wrap; background: var(--bg-color); border-radius: 12px; padding: 4px; gap: 4px; }
        .segment-btn {
            flex: 1 1 30%; min-width: 90px; border: none; background: transparent; padding: 10px 8px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        }
        .segment-btn:hover:not(:disabled) { background: rgba(0,0,0,0.03); }
        .segment-btn.active-offline { background: var(--card-bg); color: var(--text-muted); box-shadow: var(--shadow); }
        .segment-btn.active-success { background: var(--card-bg); color: var(--success); box-shadow: var(--shadow); }
        .segment-btn.active-danger { background: var(--card-bg); color: var(--danger); box-shadow: var(--shadow); }
        .segment-btn.active-outside { background: var(--card-bg); color: var(--outside); box-shadow: var(--shadow); }
        .segment-btn.active-other-office { background: var(--card-bg); color: var(--other-office); box-shadow: var(--shadow); }
        .segment-btn.active-open-treat { background: var(--card-bg); color: var(--open-treat); box-shadow: var(--shadow); } /* YENİ: 6. Durum rengi */
        .segment-btn.active-treat { background: var(--card-bg); color: var(--primary); box-shadow: var(--shadow); flex-direction: row; }

        .segment-btn:disabled, .time-input:disabled, .text-input:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

        .input-row { display: flex; gap: 12px; align-items: center; }
        .input-column { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        
        .time-input, .text-input, select.text-input {
            width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text-main); font-size: 0.95rem; font-weight: 500; outline: none; transition: var(--transition);
            appearance: none;
        }
        select.text-input { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23718096%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right .7em top 50%; background-size: .65em auto; }
        .time-input:focus, .text-input:focus { border-color: var(--primary); background: var(--card-bg); box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15); }

        .slide-down { animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Çipler */
        .guests-control { display: flex; flex-wrap: wrap; gap: 8px; }
        .guest-chip { padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-muted); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 4px; }
        .guest-chip:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .guest-chip.selected { background: var(--primary); color: #ffffff; border-color: var(--primary); }
        .guest-chip:disabled { opacity: 0.4; cursor: not-allowed; }

        /* --- Kat Planı --- */
        .floor-plan-title { width: 100%; max-width: 1000px; font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }
        .grid-container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }

        .room-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); transition: var(--transition); border: 1px solid transparent; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
        
        .room-card.interactive { cursor: pointer; }
        .room-card.interactive:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--border); }
        
        .room-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--text-muted); border-radius: var(--radius) 0 0 var(--radius); transition: var(--transition); }

        .room-card.status-offline::before { background: var(--offline); }
        .room-card.status-available::before { background: var(--success); }
        .room-card.status-busy::before { background: var(--danger); }
        .room-card.status-out::before { background: var(--outside); }
        .room-card.status-other-office::before { background: var(--other-office); }
        .room-card.status-open_to_treat::before { background: var(--open-treat); } /* YENİ */

        .room-header { display: flex; justify-content: space-between; align-items: flex-start; padding-left: 10px; }
        .person-info { display: flex; flex-direction: column; gap: 4px; width: 100%;}
        .person-name { font-size: 1.1rem; font-weight: 600; display: flex; justify-content: space-between; align-items: center;}
        
        .status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-offline .status-dot { background: var(--offline); } .status-offline .status-text { color: var(--text-muted); }
        .status-available .status-dot { background: var(--success); } .status-available .status-text { color: var(--success); }
        .status-busy .status-dot { background: var(--danger); } .status-busy .status-text { color: var(--danger); }
        .status-out .status-dot { background: var(--outside); } .status-out .status-text { color: var(--outside); }
        .status-other-office .status-dot { background: var(--other-office); } .status-other-office .status-text { color: var(--other-office); }
        .status-open_to_treat .status-dot { background: var(--open-treat); } .status-open_to_treat .status-text { color: var(--open-treat); } /* YENİ */

        .host-office-badge { font-size: 0.8rem; color: var(--other-office); background: rgba(159, 122, 234, 0.1); padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; margin-top: 4px; }
        .time-badge { font-size: 0.75rem; color: var(--text-muted); background: var(--bg-color); padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; font-weight: 500; }

        .treat-container { padding-left: 10px; display: flex; align-items: center; gap: 12px; }
        .treat-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .treat-badge.tea { background: rgba(217, 119, 6, 0.1); color: var(--tea); }
        .treat-badge.coffee { background: rgba(140, 107, 93, 0.1); color: var(--coffee); }
        .no-treat { color: var(--text-muted); font-size: 0.85rem; font-style: italic; }

        .guests-inline-display { padding-left: 10px; font-size: 0.85rem; color: var(--text-main); display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; background: var(--bg-color); padding: 8px 12px; border-radius: 8px; }
        .guests-inline-display .material-symbols-rounded { font-size: 1.1rem; color: var(--primary); margin-top: 1px;}
        .guests-text-content { flex: 1; }
        .guests-text-content strong { color: var(--primary); font-weight: 600; }

        .card-action-menu { display: flex; gap: 8px; margin-top: 8px; padding-left: 10px; animation: slideDown 0.2s ease-out forwards; }
        .card-action-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); }
        .btn-join { background: rgba(72, 187, 120, 0.1); color: var(--success); }
        .btn-join:hover { background: var(--success); color: white; }
        .btn-decline { background: var(--input-bg); color: var(--text-muted); }
        .btn-decline:hover { background: #e2e8f0; color: var(--text-main); }

        .joining-display { padding-left: 10px; font-size: 0.8rem; color: var(--other-office); display: flex; align-items: center; gap: 6px; margin-top: 4px; font-weight: 500; }
        .joining-display .material-symbols-rounded { font-size: 1rem; }

        @media (max-width: 768px) { body { padding: 12px; } .control-panel { padding: 16px; grid-template-columns: 1fr; gap: 20px; } .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1><span class="material-symbols-rounded">domain</span> Kat Planı</h1>
        <div class="user-profile">
            <span class="material-symbols-rounded">account_circle</span>
            <span id="logged-in-user">Ahmet Yasin</span>
        </div>
    </header>

    <section class="control-panel" id="main-control-panel">
        
        <div style="display: flex; flex-direction: column; gap: 24px;">
            <div class="control-group">
                <div class="control-label">Mevcut Durumun</div>
                <div class="segment-control">
                    <button class="segment-btn" id="btn-offline" onclick="updateMyStatus('offline')">
                        <span class="material-symbols-rounded">person_off</span> Çevrimdışı
                    </button>
                    <button class="segment-btn active-success" id="btn-available" onclick="updateMyStatus('available')">
                        <span class="material-symbols-rounded">check_circle</span> Müsait
                    </button>
                    <button class="segment-btn" id="btn-open-treat" onclick="updateMyStatus('open_to_treat')">
                        <span class="material-symbols-rounded">local_cafe</span> İkrama Açık
                    </button>
                    <button class="segment-btn" id="btn-busy" onclick="updateMyStatus('busy')">
                        <span class="material-symbols-rounded">do_not_disturb_on</span> Meşgul
                    </button>
                    <button class="segment-btn" id="btn-out" onclick="updateMyStatus('out')">
                        <span class="material-symbols-rounded">directions_run</span> Dışarıda
                    </button>
                    <button class="segment-btn" id="btn-other-office" onclick="updateMyStatus('other_office')">
                        <span class="material-symbols-rounded">meeting_room</span> Başka Ofiste
                    </button>
                </div>
            </div>

            <div class="control-group" id="host-office-group">
                <div class="control-label">Kimin Ofisindesin / Neredesin?</div>
                <div class="input-row">
                    <span class="material-symbols-rounded" style="color:var(--text-muted)">location_on</span>
                    <div class="input-column">
                        <select id="select-host-office" class="text-input" onchange="updateMyHostOffice(this.value)" disabled>
                            <option value="">Seçiniz...</option>
                        </select>
                        <input type="text" id="input-custom-host" class="text-input" placeholder="Örn: Toplantı Odası..." style="display: none;" onkeyup="updateMyCustomHost(this.value)">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <div class="control-label">İkram (Müsaitken / Başka Ofisteyken)</div>
                <div class="segment-control" style="flex-wrap: nowrap;">
                    <button class="segment-btn active-treat" id="btn-treat-none" style="flex-direction: row;" onclick="updateMyTreat('none')">
                        <span class="material-symbols-rounded">block</span> Yok
                    </button>
                    <button class="segment-btn" id="btn-treat-tea" style="flex-direction: row;" onclick="updateMyTreat('tea')">
                        <span class="material-symbols-rounded">emoji_food_beverage</span> Çay
                    </button>
                    <button class="segment-btn" id="btn-treat-coffee" style="flex-direction: row;" onclick="updateMyTreat('coffee')">
                        <span class="material-symbols-rounded">local_cafe</span> Kahve
                    </button>
                </div>
            </div>
            
            <div class="control-group">
                <div class="control-label">Kaça Kadar Müsaitsin / Oradasın?</div>
                <div class="input-row">
                    <span class="material-symbols-rounded" style="color:var(--text-muted)">schedule</span>
                    <input type="time" id="input-time-until" class="time-input" onchange="updateMyTimeUntil(this.value)">
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <div class="control-group">
                <div class="control-label">Ekip İçi Misafir (Yanında Kimler Var?)</div>
                <div class="guests-control" id="guests-control-container"></div>
            </div>

            <div class="control-group">
                <div class="control-label">Dışarıdan Misafir Var Mı?</div>
                <div class="input-row">
                    <span class="material-symbols-rounded" style="color:var(--text-muted)">badge</span>
                    <input type="text" id="input-external-guest" class="text-input" placeholder="Örn: Müşteri, Kurye..." onblur="updateMyExternalGuest(this.value)">
                </div>
            </div>
        </div>

    </section>

    <div class="floor-plan-title">Odalar & Kişiler</div>
    <div class="grid-container" id="rooms-container"></div>

    <script>
        const MOCK_USERS = ["Elif Hilal", "Halil", "Huzeyfe", "Ahmet Yasin", "Fatih", "İkbal", "Bekir", "Mustafa", "Hilmi"];
        let roomStates = {};
        const LOGGED_IN_USER = "Ahmet Yasin"; 
        let activeActionCard = null;

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        }

        function initStates() {
            MOCK_USERS.forEach(user => {
                const statuses = ['offline', 'available', 'busy', 'out', 'other_office', 'open_to_treat'];
                let randomStatus = 'available';
                if(Math.random() > 0.6) randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
                const treats = ['none', 'tea', 'coffee'];
                
                let host = ''; let customHost = '';
                if(randomStatus === 'other_office') {
                    if (Math.random() > 0.5) {
                        const others = MOCK_USERS.filter(u => u !== user);
                        host = others[Math.floor(Math.random() * others.length)];
                    } else { host = 'other'; customHost = 'A Toplantı Odası'; }
                }

                roomStates[user] = {
                    status: randomStatus,
                    hostOffice: host, customHostOffice: customHost,
                    treat: (randomStatus === 'available' || randomStatus === 'other_office') ? treats[Math.floor(Math.random() * treats.length)] : 'none',
                    guests: [], externalGuest: '', joining: [],
                    availableSince: (randomStatus === 'available' || randomStatus === 'other_office' || randomStatus === 'open_to_treat') ? '09:00' : '',
                    availableUntil: ''
                };
            });
            
            roomStates[LOGGED_IN_USER] = { 
                status: 'available', hostOffice: '', customHostOffice: '', treat: 'none', guests: [], externalGuest: '', joining: [],
                availableSince: getCurrentTime(), availableUntil: ''
            };
        }

        // --- Kart Etkileşim (Sosyal) İşlemleri ---
        function toggleActionMenu(targetUser) {
            if (activeActionCard === targetUser) activeActionCard = null;
            else activeActionCard = targetUser;
            renderRooms();
        }

        function handleJoinAction(event, targetUser, action) {
            event.stopPropagation();
            const targetState = roomStates[targetUser];
            let currentJoiners = targetState.joining || [];

            if (action === 'join') {
                if (!currentJoiners.includes(LOGGED_IN_USER)) currentJoiners.push(LOGGED_IN_USER);
            } else if (action === 'decline') {
                currentJoiners = currentJoiners.filter(u => u !== LOGGED_IN_USER);
            }

            targetState.joining = currentJoiners;
            activeActionCard = null; 
            renderRooms();
        }

        // --- Kontrol Paneli İşlemleri ---
        function updateMyStatus(newStatus) {
            const state = roomStates[LOGGED_IN_USER];
            const oldStatus = state.status;
            
            document.querySelectorAll('.segment-btn').forEach(btn => btn.classList.remove('active-offline', 'active-success', 'active-danger', 'active-outside', 'active-other-office', 'active-open-treat'));
            
            if(newStatus === 'available' || newStatus === 'other_office' || newStatus === 'open_to_treat') {
                
                // Müsait veya Çay/Kahve Arıyor ise ofis kendi ofisidir
                if (newStatus === 'available' || newStatus === 'open_to_treat') {
                    if(newStatus === 'available') document.getElementById('btn-available').classList.add('active-success');
                    if(newStatus === 'open_to_treat') document.getElementById('btn-open-treat').classList.add('active-open-treat');
                    
                    document.getElementById('select-host-office').disabled = true;
                    state.hostOffice = ''; state.customHostOffice = '';
                    document.getElementById('select-host-office').value = '';
                    toggleCustomHostInput(false);
                } else {
                    document.getElementById('btn-other-office').classList.add('active-other-office');
                    document.getElementById('select-host-office').disabled = false;
                }
                
                // Kontrolleri aç/kapat
                enableSecondaryControlsForStatus(newStatus);

                if (oldStatus !== 'available' && oldStatus !== 'other_office' && oldStatus !== 'open_to_treat') state.availableSince = getCurrentTime();
            } else {
                if(newStatus === 'offline') document.getElementById('btn-offline').classList.add('active-offline');
                if(newStatus === 'busy') document.getElementById('btn-busy').classList.add('active-danger');
                if(newStatus === 'out') document.getElementById('btn-out').classList.add('active-outside');
                clearAndDisableAllSecondary();
            }

            state.status = newStatus;
            updateGuestChipsState();
            renderRooms();
        }

        function enableSecondaryControlsForStatus(status) {
            // Zaman ve misafir inputları 3 aktif durumda da açıktır
            document.getElementById('input-time-until').disabled = false;
            document.getElementById('input-external-guest').disabled = false;

            // Ancak ikram verme butonları "Çay/Kahve varsa içerim" durumunda KAPANIR
            if (status === 'open_to_treat') {
                document.getElementById('btn-treat-none').disabled = true;
                document.getElementById('btn-treat-tea').disabled = true;
                document.getElementById('btn-treat-coffee').disabled = true;
                updateMyTreat('none'); // Otomatik olarak ikramı yoka çek (çünkü arayan kişi)
            } else {
                document.getElementById('btn-treat-none').disabled = false;
                document.getElementById('btn-treat-tea').disabled = false;
                document.getElementById('btn-treat-coffee').disabled = false;
            }
        }

        function updateMyHostOffice(hostValue) {
            roomStates[LOGGED_IN_USER].hostOffice = hostValue;
            if (hostValue === 'other') { toggleCustomHostInput(true); document.getElementById('input-custom-host').focus(); } 
            else { toggleCustomHostInput(false); roomStates[LOGGED_IN_USER].customHostOffice = ''; }
            renderRooms();
        }

        function updateMyCustomHost(text) { roomStates[LOGGED_IN_USER].customHostOffice = text.trim(); renderRooms(); }
        function toggleCustomHostInput(show) {
            const input = document.getElementById('input-custom-host');
            if (show) { input.style.display = 'block'; input.classList.add('slide-down'); } 
            else { input.style.display = 'none'; input.classList.remove('slide-down'); input.value = ''; }
        }

        function clearAndDisableAllSecondary() {
            ['btn-treat-none', 'btn-treat-tea', 'btn-treat-coffee', 'input-time-until', 'input-external-guest'].forEach(id => {
                document.getElementById(id).disabled = true;
            });
            const state = roomStates[LOGGED_IN_USER];
            updateMyTreat('none');
            state.guests = []; state.externalGuest = ''; state.hostOffice = ''; state.customHostOffice = ''; state.availableSince = ''; state.availableUntil = '';
            document.getElementById('input-external-guest').value = ''; document.getElementById('input-time-until').value = '';
            document.getElementById('select-host-office').value = ''; document.getElementById('select-host-office').disabled = true;
            toggleCustomHostInput(false);
        }

        function updateMyTreat(newTreat) {
            if(roomStates[LOGGED_IN_USER].status === 'open_to_treat') return; // Bu durumdayken değişemez
            if(roomStates[LOGGED_IN_USER].status !== 'available' && roomStates[LOGGED_IN_USER].status !== 'other_office') return;
            
            document.querySelectorAll('#btn-treat-none, #btn-treat-tea, #btn-treat-coffee').forEach(el => el.classList.remove('active-treat'));
            if(newTreat === 'none') document.getElementById('btn-treat-none').classList.add('active-treat');
            if(newTreat === 'tea') document.getElementById('btn-treat-tea').classList.add('active-treat');
            if(newTreat === 'coffee') document.getElementById('btn-treat-coffee').classList.add('active-treat');
            roomStates[LOGGED_IN_USER].treat = newTreat; renderRooms();
        }

        function updateMyTimeUntil(timeValue) { if(roomStates[LOGGED_IN_USER].status !== 'available' && roomStates[LOGGED_IN_USER].status !== 'other_office' && roomStates[LOGGED_IN_USER].status !== 'open_to_treat') return; roomStates[LOGGED_IN_USER].availableUntil = timeValue; renderRooms(); }
        function updateMyExternalGuest(guestText) { if(roomStates[LOGGED_IN_USER].status !== 'available' && roomStates[LOGGED_IN_USER].status !== 'other_office' && roomStates[LOGGED_IN_USER].status !== 'open_to_treat') return; roomStates[LOGGED_IN_USER].externalGuest = guestText.trim(); renderRooms(); }

        function renderDropdownsAndChips() {
            const chipContainer = document.getElementById('guests-control-container');
            const hostSelect = document.getElementById('select-host-office');
            
            MOCK_USERS.forEach(user => {
                if (user !== LOGGED_IN_USER) {
                    const option = document.createElement('option');
                    option.value = user; option.text = `${user}'nin Ofisi`;
                    hostSelect.appendChild(option);

                    const btn = document.createElement('button');
                    btn.className = 'guest-chip'; btn.id = `guest-chip-${user.replace(/\s+/g, '')}`;
                    btn.innerHTML = `<span class="material-symbols-rounded" style="font-size: 16px;">person_add</span> ${user}`;
                    btn.onclick = () => toggleMyGuest(user);
                    chipContainer.appendChild(btn);
                }
            });
            const otherOption = document.createElement('option'); otherOption.value = 'other'; otherOption.text = 'Diğer (Ekip Dışı)...';
            hostSelect.appendChild(otherOption);
            updateGuestChipsState();
        }

        function toggleMyGuest(guestName) {
            const state = roomStates[LOGGED_IN_USER];
            if (state.status !== 'available' && state.status !== 'other_office' && state.status !== 'open_to_treat') return;
            let myGuests = state.guests || [];
            if (myGuests.includes(guestName)) myGuests = myGuests.filter(name => name !== guestName);
            else myGuests.push(guestName);
            state.guests = myGuests; updateGuestChipsState(); renderRooms();
        }

        function updateGuestChipsState() {
            const state = roomStates[LOGGED_IN_USER];
            const canHaveGuests = (state.status === 'available' || state.status === 'other_office' || state.status === 'open_to_treat');
            MOCK_USERS.forEach(user => {
                if (user === LOGGED_IN_USER) return;
                const chip = document.getElementById(`guest-chip-${user.replace(/\s+/g, '')}`);
                if (chip) {
                    chip.disabled = !canHaveGuests;
                    if ((state.guests || []).includes(user) && canHaveGuests) {
                        chip.classList.add('selected'); chip.querySelector('span').innerText = 'check';
                    } else {
                        chip.classList.remove('selected'); chip.querySelector('span').innerText = 'person_add';
                    }
                }
            });
        }

        // --- Ana Render Motoru ---
        function renderRooms() {
            const container = document.getElementById('rooms-container');
            container.innerHTML = '';

            MOCK_USERS.forEach(user => {
                const data = roomStates[user];
                
                // 6. Durum için etkileşim izni de aktif
                const isInteractive = (user !== LOGGED_IN_USER) && (data.status === 'available' || data.status === 'other_office' || data.status === 'open_to_treat');
                const cardClass = `room-card status-${data.status} ${isInteractive ? 'interactive' : ''}`;
                
                // 1. Durumlar ve Zaman
                let statusText = 'Çevrimdışı';
                if (data.status === 'available') statusText = 'Müsait';
                if (data.status === 'busy') statusText = 'Meşgul';
                if (data.status === 'out') statusText = 'Dışarıda';
                if (data.status === 'other_office') statusText = 'Başka Ofiste';
                if (data.status === 'open_to_treat') statusText = 'Çay/Kahve Varsa İçerim'; // YENİ 6. DURUM METNİ

                let timeHtml = '';
                if ((data.status === 'available' || data.status === 'other_office' || data.status === 'open_to_treat') && data.availableSince) {
                    timeHtml += `<span class="material-symbols-rounded" style="font-size:14px">login</span> ${data.availableSince}'ten beri`;
                    if (data.availableUntil) timeHtml += ` &bull; <span class="material-symbols-rounded" style="font-size:14px">update</span> ${data.availableUntil}'e kadar`;
                }

                let hostHtml = '';
                if (data.status === 'other_office') {
                    if (data.hostOffice === 'other') {
                        const locName = data.customHostOffice || 'Belirtilmeyen bir yerde';
                        hostHtml = `<div class="host-office-badge"><span class="material-symbols-rounded" style="font-size:14px">location_on</span> ${locName}</div>`;
                    } else if (data.hostOffice) {
                        hostHtml = `<div class="host-office-badge"><span class="material-symbols-rounded" style="font-size:14px">meeting_room</span> ${data.hostOffice}'nin ofisinde</div>`;
                    }
                }

                // 2. İkram
                let treatHtml = '';
                if (data.status === 'available' || data.status === 'other_office') {
                    if (data.treat === 'tea') treatHtml = `<div class="treat-badge tea"><span class="material-symbols-rounded">emoji_food_beverage</span> Çay Var</div>`;
                    else if (data.treat === 'coffee') treatHtml = `<div class="treat-badge coffee"><span class="material-symbols-rounded">local_cafe</span> Kahve Var</div>`;
                    else treatHtml = `<div class="no-treat">İkram yok</div>`;
                } else if (data.status === 'open_to_treat') {
                    treatHtml = `<div class="no-treat" style="color: var(--open-treat); font-weight: 500;">İkram davetine açık 👀</div>`;
                } else if (data.status === 'busy') treatHtml = `<div class="no-treat">Lütfen rahatsız etmeyiniz</div>`;
                else if (data.status === 'out') treatHtml = `<div class="no-treat">Ofis dışında</div>`;
                else if (data.status === 'offline') treatHtml = `<div class="no-treat">Sistemde aktif değil</div>`;

                // 3. Mevcut Misafirler
                let guestsHtml = '';
                let allGuests = [];
                if (data.status === 'available' || data.status === 'other_office' || data.status === 'open_to_treat') {
                    if (data.guests && data.guests.length > 0) allGuests.push(...data.guests);
                    if (data.externalGuest && data.externalGuest.trim() !== '') allGuests.push(`${data.externalGuest} (Misafir)`);
                }
                if (allGuests.length > 0) {
                    guestsHtml = `
                        <div class="guests-inline-display">
                            <span class="material-symbols-rounded">groups</span>
                            <div class="guests-text-content"><strong>${allGuests.join(', ')}</strong> ile beraber</div>
                        </div>
                    `;
                }

                // 4. Uğrayacaklar Listesi
                let joiningHtml = '';
                if (data.joining && data.joining.length > 0 && (data.status === 'available' || data.status === 'other_office' || data.status === 'open_to_treat')) {
                    joiningHtml = `
                        <div class="joining-display">
                            <span class="material-symbols-rounded">directions_walk</span>
                            <span><strong>${data.joining.join(', ')}</strong> birazdan uğrayacak</span>
                        </div>
                    `;
                }

                // 5. Etkileşim Menüsü
                let actionMenuHtml = '';
                if (isInteractive && activeActionCard === user) {
                    actionMenuHtml = `
                        <div class="card-action-menu">
                            <button class="card-action-btn btn-join" onclick="handleJoinAction(event, '${user}', 'join')">
                                <span class="material-symbols-rounded">directions_run</span> Birazdan uğrarım
                            </button>
                            <button class="card-action-btn btn-decline" onclick="handleJoinAction(event, '${user}', 'decline')">
                                <span class="material-symbols-rounded">waving_hand</span> Afiyet olsun
                            </button>
                        </div>
                    `;
                }

                const onclickAction = isInteractive ? `onclick="toggleActionMenu('${user}')"` : '';

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div ${onclickAction} style="width: 100%; height: 100%; display: flex; flex-direction: column; gap: 12px;">
                        <div class="room-header">
                            <div class="person-info">
                                <div class="person-name">
                                    <span>${user} ${user === LOGGED_IN_USER ? '<span style="color:var(--text-muted); font-size:0.9rem">(Sen)</span>' : ''}</span>
                                </div>
                                <div style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; margin-top:4px;">
                                    <div class="status-badge">
                                        <div class="status-dot"></div>
                                        <span class="status-text">${statusText}</span>
                                    </div>
                                    ${hostHtml}
                                    ${timeHtml ? `<div class="time-badge">${timeHtml}</div>` : ''}
                                </div>
                            </div>
                        </div>
                        ${treatHtml ? `<div class="treat-container">${treatHtml}</div>` : ''}
                        ${guestsHtml}
                        ${joiningHtml}
                    </div>
                    ${actionMenuHtml}
                `;
                container.appendChild(card);
            });
        }

        // Sistemi Başlat
        initStates();
        renderDropdownsAndChips();
        renderRooms();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeChat | Pure P2P Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hide { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-green { animation: pulse 2s infinite; }
        .recording-pulse { animation: recPulse 1.5s infinite; color: #ef4444; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes recPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        /* Dosya inputunu gizle */
        #file-input { display: none; }
    </style>
</head>
<body class="text-slate-800 h-screen w-screen overflow-hidden flex items-center justify-center">

    <div id="login-screen" class="w-full max-w-md p-8 glass-panel rounded-3xl shadow-sm border border-slate-200 transition-all duration-500">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">VibeChat</h1>
            <p class="text-sm text-slate-500 mt-2">Sıfır Sunucu, %100 P2P</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">Adınız</label>
                <input type="text" id="username-input" placeholder="Örn: VibeCoder" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">Oda Kodu (5 Haneli)</label>
                <input type="text" id="room-input" maxlength="5" placeholder="AB12C" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors uppercase font-mono tracking-widest text-center text-lg">
            </div>
            <button id="join-btn" class="w-full bg-slate-900 text-white font-medium py-3 rounded-xl hover:bg-slate-800 transition-colors flex justify-center items-center gap-2">
                Bağlan <i class="ph ph-arrow-right"></i>
            </button>
            <p id="status-text" class="text-center text-xs text-slate-400 mt-2 h-4"></p>
        </div>
    </div>

    <div id="chat-screen" class="hide w-full h-full max-w-5xl md:py-6 md:px-4 flex flex-col transition-all duration-500">
        <div class="flex-1 glass-panel md:rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative">
            
            <div class="h-20 border-b border-slate-100 px-6 flex justify-between items-center bg-white/50 z-10">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-semibold" id="header-avatar">?</div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-slate-400 rounded-full border-2 border-white" id="online-status" title="Bağlanıyor..."></div>
                    </div>
                    <div>
                        <h2 class="font-semibold text-slate-800 text-lg" id="header-room-display">Oda: -----</h2>
                        <p class="text-xs text-slate-500 flex items-center gap-1" id="peer-status-text">
                            <i class="ph ph-spinner animate-spin"></i> Karşı taraf bekleniyor...
                        </p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 text-slate-400">
                    <button id="voice-call-btn" class="p-2 hover:bg-slate-100 hover:text-slate-800 rounded-full transition-colors" title="Sesli Arama">
                        <i class="ph ph-phone text-xl"></i>
                    </button>
                    <button id="video-call-btn" class="p-2 hover:bg-slate-100 hover:text-slate-800 rounded-full transition-colors" title="Görüntülü Arama">
                        <i class="ph ph-video-camera text-xl"></i>
                    </button>
                    <div class="w-px h-6 bg-slate-200 mx-1"></div>
                    <button id="leave-btn" class="p-2 hover:bg-red-50 hover:text-red-500 rounded-full transition-colors" title="Odadan Çık">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </div>
            </div>

            <div id="video-overlay" class="hide w-full h-48 bg-slate-900 border-b border-slate-700 flex relative overflow-hidden transition-all duration-300">
                <div class="flex-1 relative border-r border-slate-800">
                    <p class="absolute inset-0 flex items-center justify-center text-slate-500 text-xs">Karşı Taraf</p>
                    <video id="remote-video" autoplay playsinline class="w-full h-full object-cover relative z-10"></video>
                </div>
                <div class="w-1/3 relative bg-slate-800 shadow-lg">
                    <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
                </div>
                <button id="end-call-btn" class="absolute bottom-2 left-1/2 transform -translate-x-1/2 bg-red-500 text-white p-2 rounded-full hover:bg-red-600 shadow-lg z-20">
                    <i class="ph ph-phone-disconnect text-xl"></i>
                </button>
            </div>

            <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-hide bg-slate-50/50">
                <div class="flex justify-center">
                    <span class="text-xs bg-slate-100 text-slate-400 px-3 py-1 rounded-full">Sistem başlatıldı. Bağlantı bekleniyor...</span>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-slate-100 pointer-events-none opacity-50 transition-opacity" id="input-area">
                <div class="flex items-end gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-200 focus-within:border-blue-300 focus-within:ring-1 focus-within:ring-blue-300 transition-all">
                    
                    <input type="file" id="file-input">
                    <button id="attachment-btn" class="p-3 text-slate-400 hover:text-blue-500 transition-colors" title="Dosya Gönder">
                        <i class="ph ph-paperclip text-xl"></i>
                    </button>
                    
                    <textarea id="message-input" rows="1" placeholder="Bir mesaj yazın..." class="flex-1 bg-transparent resize-none outline-none text-slate-700 py-3 max-h-32 scrollbar-hide" style="min-height: 48px;"></textarea>
                    
                    <button id="record-audio-btn" class="p-3 text-slate-400 hover:text-red-500 transition-colors" title="Basılı tutarak ses kaydet">
                        <i class="ph ph-microphone text-xl" id="mic-icon"></i>
                    </button>

                    <button id="send-btn" class="p-3 text-white bg-blue-500 hover:bg-blue-600 rounded-xl transition-colors shadow-sm mb-0.5">
                        <i class="ph ph-paper-plane-right text-xl"></i>
                    </button>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // --- UI Elementleri ---
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const roomInput = document.getElementById('room-input');
        const joinBtn = document.getElementById('join-btn');
        const leaveBtn = document.getElementById('leave-btn');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages-container');
        const headerRoomDisplay = document.getElementById('header-room-display');
        const headerAvatar = document.getElementById('header-avatar');
        const onlineStatus = document.getElementById('online-status');
        const peerStatusText = document.getElementById('peer-status-text');
        const inputArea = document.getElementById('input-area');
        const statusText = document.getElementById('status-text');
        
        // Medya Elementleri
        const attachmentBtn = document.getElementById('attachment-btn');
        const fileInput = document.getElementById('file-input');
        const recordAudioBtn = document.getElementById('record-audio-btn');
        const micIcon = document.getElementById('mic-icon');
        const videoCallBtn = document.getElementById('video-call-btn');
        const voiceCallBtn = document.getElementById('voice-call-btn');
        const endCallBtn = document.getElementById('end-call-btn');
        const videoOverlay = document.getElementById('video-overlay');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');

        // --- P2P Değişkenleri ---
        let peer = null;
        let conn = null;
        let currentCall = null;
        let localStream = null;
        let currentUser = "";
        let currentRoom = "";
        
        // Ses Kayıt Değişkenleri
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // --- Yardımcı Fonksiyonlar ---
        const scrollToBottom = () => {
            messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
        };

        const sysMsg = (text) => {
            const div = document.createElement('div');
            div.className = 'flex justify-center';
            div.innerHTML = `<span class="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full border border-slate-200">${text}</span>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        };

        const createMessageBubble = (data, isMine) => {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full flex-col ${isMine ? 'items-end' : 'items-start'}`;
            
            // İsim etiketi (Sadece karşı taraf için)
            if(!isMine) {
                const nameLabel = document.createElement('span');
                nameLabel.className = 'text-[10px] text-slate-400 ml-1 mb-1 font-medium';
                nameLabel.textContent = data.name;
                wrapper.appendChild(nameLabel);
            }

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] md:max-w-[60%] rounded-2xl px-5 py-3 shadow-sm flex flex-col gap-1 ${
                isMine 
                ? 'bg-blue-500 text-white rounded-tr-sm' 
                : 'bg-white text-slate-800 border border-slate-100 rounded-tl-sm'
            }`;
            
            // Veri tipine göre içerik oluştur
            if(data.type === 'text') {
                const textEl = document.createElement('p');
                textEl.className = 'text-sm leading-relaxed whitespace-pre-wrap';
                textEl.textContent = data.content;
                bubble.appendChild(textEl);
            } 
            else if(data.type === 'file') {
                const fileLink = document.createElement('a');
                fileLink.href = data.content; // Base64 veya Blob URL
                fileLink.download = data.fileName;
                fileLink.className = `flex items-center gap-2 text-sm font-medium ${isMine ? 'text-white underline' : 'text-blue-500 underline'}`;
                fileLink.innerHTML = `<i class="ph ph-file-arrow-down text-lg"></i> ${data.fileName}`;
                bubble.appendChild(fileLink);
            }
            else if(data.type === 'audio') {
                const audioEl = document.createElement('audio');
                audioEl.controls = true;
                audioEl.src = data.content;
                audioEl.className = 'h-10 w-48';
                bubble.appendChild(audioEl);
            }

            const timeStamp = document.createElement('span');
            timeStamp.className = `text-[10px] block mt-1 text-right ${isMine ? 'text-blue-200' : 'text-slate-400'}`;
            timeStamp.textContent = data.time;

            bubble.appendChild(timeStamp);
            wrapper.appendChild(bubble);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
        };

        // --- P2P Mimari Algoritması (Zeki Oda Sistemi) ---
        const initP2P = (room, name) => {
            const hostId = `vibechat-room-${room}-host`;
            
            statusText.textContent = "Bağlantı kuruluyor...";
            
            // 1. Önce Host olmayı dene
            peer = new Peer(hostId);

            peer.on('open', (id) => {
                // Başarılı! Demek ki odada kimse yok. Host biziz.
                sysMsg("Oda oluşturuldu. Bekleniyor...");
                setupPeerEvents();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // ID dolu! Demek ki Host zaten var. Biz Guest (Misafir) olmalıyız.
                    peer.destroy(); // Hatalı peer'ı yok et
                    
                    peer = new Peer(); // Rastgele ID ile yeni peer
                    peer.on('open', (id) => {
                        // Host'a doğrudan bağlan
                        statusText.textContent = "Oda bulundu, bağlanılıyor...";
                        conn = peer.connect(hostId);
                        setupConnectionEvents(conn);
                        setupPeerEvents();
                    });
                } else {
                    alert("Ağ hatası: " + err.message);
                    resetUI();
                }
            });
        };

        const setupPeerEvents = () => {
            // Arayüze geç
            loginScreen.classList.add('hide');
            chatScreen.classList.remove('hide');
            
            // Eğer bize bir bağlantı gelirse (Host isek bu çalışır)
            peer.on('connection', (connection) => {
                if(conn) {
                    // Üçüncü bir kişi gelirse reddet (Sadece 2 kişi)
                    connection.on('open', () => { connection.send({ type: 'sys', content: 'Oda dolu!' }); setTimeout(()=>connection.close(), 500); });
                    return;
                }
                conn = connection;
                setupConnectionEvents(conn);
            });

            // Gelen Medya Çağrılarını Dinle
            peer.on('call', (call) => {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then((stream) => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    call.answer(stream); // Çağrıyı yanıtla
                    setupCallEvents(call);
                })
                .catch(err => {
                    alert("Kamera/Mikrofon izni reddedildi.");
                    call.close();
                });
            });
        };

        const setupConnectionEvents = (connection) => {
            connection.on('open', () => {
                // Bağlantı Kuruldu! Arayüzü aktifleştir.
                onlineStatus.classList.replace('bg-slate-400', 'bg-green-500');
                onlineStatus.classList.add('pulse-green');
                peerStatusText.innerHTML = `<i class="ph ph-lock-key text-green-500"></i> P2P Güvenli Bağlantı Aktif`;
                inputArea.classList.remove('pointer-events-none', 'opacity-50');
                
                sysMsg("Karşı taraf bağlandı. Sohbet uçtan uca şifrelidir.");

                // Tanışma mesajı gönder (İsmimizi karşıya iletelim)
                connection.send({ type: 'sys_name', name: currentUser });
            });

            connection.on('data', (data) => {
                // Gelen Veriyi İşle
                if(data.type === 'sys_name') {
                    // Karşı tarafın adını başlıkta göster
                    document.getElementById('header-room-display').textContent = data.name;
                    headerAvatar.textContent = data.name.charAt(0).toUpperCase();
                } 
                else if (data.type === 'text' || data.type === 'file' || data.type === 'audio') {
                    createMessageBubble(data, false);
                }
            });

            connection.on('close', () => {
                sysMsg("Karşı taraf ayrıldı.");
                resetConnectionUI();
                conn = null;
            });
        };

        // --- Veri Gönderme Fonksiyonu ---
        const sendData = (type, content, fileName = "") => {
            if(!conn || !conn.open) return alert("Bağlantı koptu veya henüz kurulamadı.");
            
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const payload = { type, content, fileName, name: currentUser, time };
            
            conn.send(payload); // Karşıya gönder
            createMessageBubble(payload, true); // Kendimizde göster
        };

        // --- Arayüz ve UI Olayları ---
        
        // 1. Odaya Bağlan
        joinBtn.addEventListener('click', () => {
            currentUser = usernameInput.value.trim();
            currentRoom = roomInput.value.trim().toUpperCase();

            if(currentUser.length < 2) return alert("Lütfen geçerli bir isim girin.");
            if(currentRoom.length !== 5) return alert("Oda kodu 5 haneli olmalıdır.");

            headerRoomDisplay.textContent = `Oda: ${currentRoom}`;
            headerAvatar.textContent = currentUser.charAt(0).toUpperCase();
            
            initP2P(currentRoom, currentUser);
        });

        // 2. Metin Gönder
        const handleSendText = () => {
            const text = messageInput.value.trim();
            if(!text) return;
            sendData('text', text);
            messageInput.value = '';
            messageInput.style.height = '48px';
        };

        sendBtn.addEventListener('click', handleSendText);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendText(); }
        });
        messageInput.addEventListener('input', function() {
            this.style.height = '48px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // 3. Dosya Gönder
        attachmentBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            // Dosyayı Base64'e çevirip yolla (P2P kanalı ArrayBuffer veya Base64 destekler)
            const reader = new FileReader();
            reader.onload = (event) => {
                sendData('file', event.target.result, file.name);
            };
            reader.readAsDataURL(file);
            fileInput.value = ''; // Reset
        });

        // 4. Ses Kaydı Gönder
        recordAudioBtn.addEventListener('mousedown', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (event) => sendData('audio', event.target.result);
                    reader.readAsDataURL(audioBlob);
                    
                    // Mikrofonu kapat
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                micIcon.classList.add('recording-pulse');
            } catch (err) {
                alert("Mikrofon erişimi sağlanamadı.");
            }
        });

        recordAudioBtn.addEventListener('mouseup', () => {
            if(mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                micIcon.classList.remove('recording-pulse');
            }
        });
        recordAudioBtn.addEventListener('mouseleave', () => {
            if(mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                micIcon.classList.remove('recording-pulse');
            }
        });

        // 5. Medya Aramaları (Video/Ses)
        const startCall = (videoEnabled) => {
            if(!conn || !conn.open) return alert("Bağlantı yok.");
            
            navigator.mediaDevices.getUserMedia({ video: videoEnabled, audio: true })
            .then((stream) => {
                localStream = stream;
                localVideo.srcObject = stream;
                
                // Karşı tarafı ara (Bağlandığımız conn.peer ID'sini kullanarak)
                currentCall = peer.call(conn.peer, stream);
                setupCallEvents(currentCall);
            })
            .catch(err => alert("Kamera/Mikrofon izni gerekli."));
        };

        const setupCallEvents = (call) => {
            videoOverlay.classList.remove('hide');
            currentCall = call;
            
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });
            
            call.on('close', () => {
                endMediaSession();
            });
        };

        videoCallBtn.addEventListener('click', () => startCall(true));
        voiceCallBtn.addEventListener('click', () => startCall(false));

        endCallBtn.addEventListener('click', () => {
            if(currentCall) currentCall.close();
            endMediaSession();
        });

        const endMediaSession = () => {
            videoOverlay.classList.add('hide');
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            currentCall = null;
        };

        // 6. Çıkış ve Temizlik
        const resetConnectionUI = () => {
            onlineStatus.classList.replace('bg-green-500', 'bg-slate-400');
            onlineStatus.classList.remove('pulse-green');
            peerStatusText.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Karşı taraf bekleniyor...`;
            inputArea.classList.add('pointer-events-none', 'opacity-50');
            document.getElementById('header-room-display').textContent = `Oda: ${currentRoom}`;
            headerAvatar.textContent = "?";
            endMediaSession();
        };

        const resetUI = () => {
            if(conn) conn.close();
            if(peer) peer.destroy();
            resetConnectionUI();
            chatScreen.classList.add('hide');
            loginScreen.classList.remove('hide');
            messagesContainer.innerHTML = '';
            statusText.textContent = "";
        };

        leaveBtn.addEventListener('click', resetUI);

    </script>
</body>
</html>

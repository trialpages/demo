<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeChat | Pro P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        darkpanel: '#1e293b',
                        darkborder: '#334155',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overscroll-behavior: none; }
        .hide { display: none !important; }
        .h-dvh { height: 100vh; height: 100dvh; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); }
        .recording-pulse { animation: recPulse 1.5s infinite; color: #ef4444; }
        .online-dot { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes recPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .animate-slide-down { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        #file-input { display: none; }
        /* Lightbox resmi için optimizasyon */
        #lightbox-img { max-height: 90vh; max-width: 90vw; object-fit: contain; }
    </style>
</head>
<body class="h-dvh w-screen overflow-hidden flex items-center justify-center">

    <div id="lightbox" class="hide fixed inset-0 z-[100] bg-black/95 flex items-center justify-center transition-opacity">
        <button id="close-lightbox" class="absolute top-6 right-6 p-2 text-slate-300 hover:text-white transition-colors bg-white/10 rounded-full">
            <i class="ph ph-x text-2xl"></i>
        </button>
        <img id="lightbox-img" src="" alt="Görsel" class="rounded-lg shadow-2xl">
    </div>

    <div id="incoming-call-modal" class="hide fixed top-6 left-1/2 transform -translate-x-1/2 z-[60] bg-darkpanel border border-blue-500/50 rounded-2xl shadow-2xl p-4 w-11/12 max-w-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div id="call-type-icon" class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
                <i class="ph ph-phone-ringing text-xl"></i>
            </div>
            <div>
                <p id="incoming-caller-name" class="text-sm font-semibold text-white">-----</p>
                <p id="incoming-call-text" class="text-xs text-blue-300 animate-pulse">Gelen Çağrı...</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="reject-call-btn" class="p-2.5 bg-red-500/10 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-colors">
                <i class="ph ph-phone-slash text-xl"></i>
            </button>
            <button id="accept-call-btn" class="p-2.5 bg-green-500 text-white rounded-full hover:bg-green-600 transition-colors shadow-lg shadow-green-500/20">
                <i class="ph ph-phone text-xl" id="accept-call-icon"></i>
            </button>
        </div>
    </div>

    <div id="login-screen" class="w-full max-w-sm p-8 glass-panel rounded-3xl shadow-2xl border border-darkborder mx-4 transition-all duration-500">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold tracking-tight text-white">VibeChat</h1>
            <p class="text-xs text-slate-400 mt-2">Sıfır Sunucu, Kusursuz P2P</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <input type="text" id="username-input" placeholder="Kullanıcı Adınız" class="w-full px-4 py-3 bg-darkbg border border-darkborder rounded-xl focus:outline-none focus:border-blue-500 text-white transition-colors text-sm">
            </div>
            <div>
                <input type="text" id="room-input" maxlength="5" placeholder="ODA KODU (5 Hane)" class="w-full px-4 py-3 bg-darkbg border border-darkborder rounded-xl focus:outline-none focus:border-blue-500 text-white transition-colors uppercase font-mono tracking-widest text-center text-sm">
            </div>
            <button id="join-btn" class="w-full bg-blue-600 text-white font-medium py-3 rounded-xl hover:bg-blue-500 transition-colors flex justify-center items-center gap-2 text-sm mt-2 shadow-lg shadow-blue-900/50">
                Bağlantı Kur <i class="ph ph-arrow-right"></i>
            </button>
            <p id="status-text" class="text-center text-xs text-slate-500 h-4"></p>
        </div>
    </div>

    <div id="chat-screen" class="hide w-full h-full max-w-4xl md:py-4 md:px-4 flex flex-col transition-all duration-500 relative">
        
        <div id="voice-banner" class="hide absolute top-4 left-1/2 transform -translate-x-1/2 bg-darkpanel border border-blue-500/30 px-5 py-2.5 rounded-full shadow-2xl flex items-center gap-4 z-50 text-sm">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="voice-timer" class="font-mono text-blue-400">00:00</span>
            </div>
            <div class="w-px h-4 bg-darkborder"></div>
            <button id="mute-mic-btn" class="text-slate-300 hover:text-white transition-colors" title="Mikrofonu Kapat">
                <i class="ph ph-microphone text-lg" id="mute-icon"></i>
            </button>
            <button id="end-voice-btn" class="text-red-400 hover:text-red-500 transition-colors bg-red-400/10 p-1.5 rounded-full" title="Çağrıyı Sonlandır">
                <i class="ph ph-phone-disconnect text-lg"></i>
            </button>
        </div>

        <div class="flex-1 glass-panel md:rounded-3xl border-0 md:border md:border-darkborder flex flex-col overflow-hidden relative">
            
            <div class="h-16 md:h-20 border-b border-darkborder px-4 md:px-6 flex justify-between items-center bg-darkpanel/80 z-10 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <div class="w-10 h-10 bg-blue-900/50 rounded-full flex items-center justify-center text-blue-400 font-semibold text-lg border border-blue-800/50" id="header-avatar">?</div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-slate-500 rounded-full border-2 border-darkpanel" id="online-status"></div>
                    </div>
                    <div class="flex flex-col">
                        <h2 class="font-medium text-white text-base md:text-lg leading-tight truncate max-w-[120px] md:max-w-[200px]" id="header-room-display">-----</h2>
                        <p class="text-[11px] text-slate-400 flex items-center gap-1" id="peer-status-text">
                            Bekleniyor...
                        </p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 md:gap-3 text-slate-300">
                    <button id="voice-call-btn" class="p-2 hover:bg-darkborder rounded-full transition-colors">
                        <i class="ph ph-phone text-xl"></i>
                    </button>
                    <button id="video-call-btn" class="p-2 hover:bg-darkborder rounded-full transition-colors">
                        <i class="ph ph-video-camera text-xl"></i>
                    </button>
                    <button id="leave-btn" class="p-2 hover:bg-red-900/30 hover:text-red-400 rounded-full transition-colors ml-1">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </div>
            </div>

            <div id="video-overlay" class="hide absolute inset-0 bg-black z-40 flex flex-col">
                <div class="flex-1 relative">
                    <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
                    <div class="absolute bottom-24 md:bottom-6 right-4 w-28 md:w-40 aspect-[3/4] bg-darkpanel rounded-2xl overflow-hidden shadow-2xl border-2 border-darkborder z-50">
                        <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover transform scale-x-[-1]"></video>
                    </div>
                    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex items-center gap-4 bg-darkpanel/80 backdrop-blur px-6 py-3 rounded-full border border-darkborder z-50">
                        <button id="switch-cam-btn" class="p-3 bg-darkbg text-white rounded-full hover:bg-darkborder transition-colors">
                            <i class="ph ph-camera-rotate text-xl"></i>
                        </button>
                        <button id="video-mute-btn" class="p-3 bg-darkbg text-white rounded-full hover:bg-darkborder transition-colors">
                            <i class="ph ph-microphone text-xl" id="video-mute-icon"></i>
                        </button>
                        <button id="end-video-btn" class="p-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">
                            <i class="ph ph-phone-disconnect text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 scrollbar-hide bg-darkbg">
                <div class="flex justify-center">
                    <span class="text-[10px] uppercase tracking-wider bg-darkborder text-slate-400 px-3 py-1 rounded-full">Sistem Başlatıldı</span>
                </div>
            </div>

            <div class="p-2 md:p-4 bg-darkpanel border-t border-darkborder shrink-0 pointer-events-none opacity-50 transition-opacity" id="input-area">
                <div class="flex items-end gap-1 md:gap-2 bg-darkbg p-1.5 md:p-2 rounded-2xl border border-darkborder focus-within:border-blue-500/50 transition-colors">
                    
                    <input type="file" id="file-input">
                    <button id="attachment-btn" class="p-2.5 text-slate-400 hover:text-blue-400 transition-colors">
                        <i class="ph ph-paperclip text-xl md:text-2xl"></i>
                    </button>
                    
                    <textarea id="message-input" rows="1" placeholder="Mesaj yaz..." class="flex-1 bg-transparent resize-none outline-none text-slate-100 py-2.5 text-sm md:text-base max-h-24 scrollbar-hide" style="min-height: 40px;"></textarea>
                    
                    <button id="record-audio-btn" class="p-2.5 text-slate-400 hover:text-red-400 transition-colors touch-none select-none">
                        <i class="ph ph-microphone text-xl md:text-2xl" id="mic-icon"></i>
                    </button>

                    <button id="send-btn" class="p-2.5 text-white bg-blue-600 hover:bg-blue-500 rounded-xl transition-colors shadow-sm mb-0.5 ml-1">
                        <i class="ph ph-paper-plane-right text-lg md:text-xl"></i>
                    </button>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // --- Değişkenler ve Seçiciler ---
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const roomInput = document.getElementById('room-input');
        const messagesContainer = document.getElementById('messages-container');
        const headerRoomDisplay = document.getElementById('header-room-display');
        const headerAvatar = document.getElementById('header-avatar');
        const onlineStatus = document.getElementById('online-status');
        const peerStatusText = document.getElementById('peer-status-text');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        
        // Modal & Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const incomingCallModal = document.getElementById('incoming-call-modal');
        const incomingCallerName = document.getElementById('incoming-caller-name');
        const incomingCallText = document.getElementById('incoming-call-text');
        const callTypeIcon = document.getElementById('call-type-icon');
        const acceptCallIcon = document.getElementById('accept-call-icon');
        
        let peer = null, conn = null, currentCall = null, localStream = null;
        let currentUser = "", currentRoom = "", peerName = "Karşı Taraf";
        let pendingCall = null, isVideoCallPending = false;
        
        // Ses Kayıt State'i
        let mediaRecorder, audioChunks = [];
        let isRecording = false;
        let recordStartTime = 0;

        // --- Arayüz Yardımcıları ---
        const scrollToBottom = () => { messagesContainer.scrollTop = messagesContainer.scrollHeight; };

        const sysMsg = (text) => {
            const div = document.createElement('div');
            div.className = 'flex justify-center my-2';
            div.innerHTML = `<span class="text-[10px] uppercase tracking-wider bg-darkborder text-slate-400 px-3 py-1 rounded-full">${text}</span>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        };

        const openLightbox = (src) => {
            lightboxImg.src = src;
            lightbox.classList.remove('hide');
        };
        document.getElementById('close-lightbox').onclick = () => lightbox.classList.add('hide');

        const createMessageBubble = (data, isMine) => {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full flex-col ${isMine ? 'items-end' : 'items-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `px-3 py-2 md:px-4 md:py-2.5 rounded-2xl w-fit max-w-[80%] md:max-w-[65%] shadow-sm flex flex-col ${
                isMine ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-darkpanel border border-darkborder text-slate-100 rounded-tl-sm'
            }`;
            
            if(data.type === 'text') {
                const textEl = document.createElement('p');
                textEl.className = 'text-[13px] md:text-sm leading-snug whitespace-pre-wrap break-words';
                textEl.textContent = data.content;
                bubble.appendChild(textEl);
            } 
            else if(data.type === 'file') {
                // Eğer dosya bir resimse (MIME tipi image ile başlıyorsa)
                if(data.fileType && data.fileType.startsWith('image/')) {
                    const imgPreview = document.createElement('img');
                    imgPreview.src = data.content;
                    imgPreview.className = "w-48 md:w-64 rounded-lg object-cover cursor-pointer border border-white/10 hover:opacity-90 transition-opacity";
                    imgPreview.onclick = () => openLightbox(data.content);
                    bubble.appendChild(imgPreview);
                } else {
                    const fileLink = document.createElement('a');
                    fileLink.href = data.content;
                    fileLink.download = data.fileName;
                    fileLink.className = `flex items-center gap-2 text-sm font-medium ${isMine ? 'text-white' : 'text-blue-400'} hover:underline`;
                    fileLink.innerHTML = `<i class="ph ph-file-arrow-down text-lg"></i> <span class="truncate max-w-[150px]">${data.fileName}</span>`;
                    bubble.appendChild(fileLink);
                }
            }
            else if(data.type === 'audio') {
                const audioEl = document.createElement('audio');
                audioEl.controls = true;
                audioEl.src = data.content;
                audioEl.className = 'h-8 w-44 md:w-56';
                bubble.appendChild(audioEl);
            }

            const timeStamp = document.createElement('span');
            timeStamp.className = `text-[9px] block mt-1 text-right ${isMine ? 'text-blue-200/80' : 'text-slate-500'}`;
            timeStamp.textContent = data.time;
            bubble.appendChild(timeStamp);

            wrapper.appendChild(bubble);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
        };

        // --- P2P ve Çağrı (Call) Mimarisi ---
        const initP2P = (room) => {
            const hostId = `vbc-${room}-host`;
            document.getElementById('status-text').textContent = "Ağa bağlanılıyor...";
            
            peer = new Peer(hostId);
            peer.on('open', () => { sysMsg("Oda açıldı. Bekleniyor..."); setupPeerEvents(); });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    peer = new Peer();
                    peer.on('open', () => {
                        document.getElementById('status-text').textContent = "Eşleşiliyor...";
                        conn = peer.connect(hostId);
                        setupConnectionEvents(conn);
                        setupPeerEvents();
                    });
                } else {
                    alert("Ağ hatası.");
                    location.reload();
                }
            });
        };

        const setupPeerEvents = () => {
            loginScreen.classList.add('hide');
            chatScreen.classList.remove('hide');
            
            peer.on('connection', (connection) => {
                if(conn) { setTimeout(()=>connection.close(), 500); return; }
                conn = connection;
                setupConnectionEvents(conn);
            });

            // Gelen Arama (Custom Modal ile)
            peer.on('call', (call) => {
                if(currentCall) { call.close(); return; } // Zaten arama varsa reddet
                
                pendingCall = call;
                isVideoCallPending = call.metadata && call.metadata.type === 'video';
                
                // UI Güncelle
                incomingCallerName.textContent = peerName;
                if(isVideoCallPending) {
                    incomingCallText.textContent = "Görüntülü arıyor...";
                    callTypeIcon.innerHTML = '<i class="ph ph-video-camera text-xl"></i>';
                    acceptCallIcon.className = "ph ph-video-camera text-xl";
                } else {
                    incomingCallText.textContent = "Sesli arıyor...";
                    callTypeIcon.innerHTML = '<i class="ph ph-phone-ringing text-xl"></i>';
                    acceptCallIcon.className = "ph ph-phone text-xl";
                }
                
                incomingCallModal.classList.remove('hide');
                incomingCallModal.classList.add('animate-slide-down');
            });
        };

        const setupConnectionEvents = (connection) => {
            connection.on('open', () => {
                onlineStatus.classList.replace('bg-slate-500', 'bg-green-500');
                onlineStatus.classList.add('online-dot');
                peerStatusText.innerHTML = `<i class="ph ph-lock-key text-green-400"></i> P2P Aktif`;
                inputArea.classList.remove('pointer-events-none', 'opacity-50');
                sysMsg("Bağlantı kuruldu.");
                connection.send({ type: 'sys_name', name: currentUser });
            });

            connection.on('data', (data) => {
                if(data.type === 'sys_name') {
                    peerName = data.name;
                    headerRoomDisplay.textContent = peerName;
                    headerAvatar.textContent = peerName.charAt(0).toUpperCase();
                } else {
                    createMessageBubble(data, false);
                }
            });

            connection.on('close', () => location.reload());
        };

        const sendPayload = (type, content, fileObj = {}) => {
            if(!conn || !conn.open) return;
            const payload = { type, content, fileName: fileObj.name || "", fileType: fileObj.type || "", time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            conn.send(payload);
            createMessageBubble(payload, true);
        };

        // --- Etkileşimler (Olay Dinleyicileri) ---
        document.getElementById('join-btn').onclick = () => {
            currentUser = usernameInput.value.trim() || "Kullanıcı";
            currentRoom = roomInput.value.trim().toUpperCase();
            if(currentRoom.length !== 5) return alert("Oda kodu 5 haneli olmalıdır.");
            initP2P(currentRoom);
        };

        const handleSend = () => {
            const text = messageInput.value.trim();
            if(!text) return;
            sendPayload('text', text);
            messageInput.value = '';
            messageInput.style.height = '40px';
        };

        document.getElementById('send-btn').onclick = handleSend;
        messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        
        const fileInput = document.getElementById('file-input');
        document.getElementById('attachment-btn').onclick = () => fileInput.click();
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendPayload('file', ev.target.result, file);
            reader.readAsDataURL(file);
            fileInput.value = '';
        });

        // --- Ses Kaydı Mimarisi (Mükemmelleştirildi) ---
        const micBtn = document.getElementById('record-audio-btn');
        const micIcon = document.getElementById('mic-icon');

        const startRecording = async () => {
            if(isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isRecording = true;
                recordStartTime = Date.now();
                
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const duration = Date.now() - recordStartTime;
                    isRecording = false;
                    micIcon.classList.remove('recording-pulse');
                    stream.getTracks().forEach(t => t.stop()); // Donanımı kesinlikle kapat

                    // Çok kısa tıklamaları (boş kayıt) engelle
                    if(duration > 500 && audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (ev) => sendPayload('audio', ev.target.result);
                        reader.readAsDataURL(blob);
                    }
                };
                mediaRecorder.start();
                micIcon.classList.add('recording-pulse');
            } catch (e) {
                isRecording = false;
            }
        };

        const stopRecording = () => {
            if(mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        };

        // Modern Event yönetimi (Mouse ve Touch çakışmasını engeller)
        micBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            micBtn.setPointerCapture(e.pointerId);
            startRecording();
        });
        
        micBtn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            micBtn.releasePointerCapture(e.pointerId);
            stopRecording();
        });
        
        micBtn.addEventListener('pointercancel', stopRecording); // Ekran dışına çıkma/Arama gelme durumu

        // --- Arama ve Medya Kontrolleri ---
        const endMediaSession = () => {
            document.getElementById('video-overlay').classList.add('hide');
            document.getElementById('voice-banner').classList.add('hide');
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            currentCall = null;
            localStream = null;
        };

        const setupCallEvents = (call, isVideo) => {
            currentCall = call;
            if(isVideo) {
                document.getElementById('video-overlay').classList.remove('hide');
            } else {
                document.getElementById('voice-banner').classList.remove('hide');
                // Timer vs buraya eklenebilir
            }
            call.on('stream', (rStream) => {
                if(isVideo) document.getElementById('remote-video').srcObject = rStream;
                else { const audio = new Audio(); audio.srcObject = rStream; audio.play(); }
            });
            call.on('close', endMediaSession);
        };

        const startCall = (isVideo) => {
            if(!conn || !conn.open) return;
            navigator.mediaDevices.getUserMedia({ video: isVideo ? { facingMode: "user" } : false, audio: true })
            .then((stream) => {
                localStream = stream;
                if(isVideo) document.getElementById('local-video').srcObject = stream;
                // Metadata ile aramanın türünü belirtiyoruz!
                currentCall = peer.call(conn.peer, stream, { metadata: { type: isVideo ? 'video' : 'audio' } });
                setupCallEvents(currentCall, isVideo);
            }).catch(() => alert("Kamera/Mikrofon izni gerekli."));
        };

        document.getElementById('video-call-btn').onclick = () => startCall(true);
        document.getElementById('voice-call-btn').onclick = () => startCall(false);
        document.getElementById('end-video-btn').onclick = () => { if(currentCall) currentCall.close(); endMediaSession(); };
        document.getElementById('end-voice-btn').onclick = () => { if(currentCall) currentCall.close(); endMediaSession(); };
        document.getElementById('leave-btn').onclick = () => location.reload();

        // Gelen Arama Butonları (Custom Modal)
        document.getElementById('reject-call-btn').onclick = () => {
            if(pendingCall) pendingCall.close();
            incomingCallModal.classList.add('hide');
            pendingCall = null;
        };

        document.getElementById('accept-call-btn').onclick = () => {
            incomingCallModal.classList.add('hide');
            if(!pendingCall) return;
            
            navigator.mediaDevices.getUserMedia({ video: isVideoCallPending ? {facingMode: "user"} : false, audio: true })
            .then(stream => {
                localStream = stream;
                if(isVideoCallPending) document.getElementById('local-video').srcObject = stream;
                pendingCall.answer(stream);
                setupCallEvents(pendingCall, isVideoCallPending);
                pendingCall = null;
            }).catch(() => {
                pendingCall.close();
                pendingCall = null;
            });
        };

    </script>
</body>
</html>

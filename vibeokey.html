<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeOkey | P2P Düello</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        /* --- TAILWIND VIBE & CASINO GREEN THEME --- */
        :root {
            --bg-table: #064e3b; /* Koyu Zümrüt Yeşili (Çuha) */
            --bg-dark: #022c22;
            --surface: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            
            /* Taş Renkleri */
            --tile-red: #dc2626;
            --tile-black: #171717;
            --tile-blue: #2563eb;
            --tile-yellow: #d97706; /* Turuncu/Sarı */
            --tile-bg: #fdfbf7; /* Fildişi */
            
            --primary: #10b981; 
            --primary-hover: #059669;
            
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-table); color: var(--surface); height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at center, #064e3b 0%, #022c22 100%); }

        /* --- BAĞLANTI EKRANI --- */
        #connection-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; gap: 2rem; overflow-y: auto;
        }

        .logo { font-size: 3rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        
        .conn-card {
            background: rgba(255,255,255,0.05); padding: 2rem; border-radius: var(--radius-lg);
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px;
            display: flex; flex-direction: column; gap: 1.5rem; backdrop-filter: blur(10px);
        }

        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; text-transform: uppercase; }
        
        .id-display { font-size: 2.5rem; font-weight: 900; color: var(--surface); text-align: center; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: var(--radius-md); letter-spacing: 4px; }
        
        input[type="text"] { 
            padding: 1rem; border-radius: var(--radius-md); border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-size: 1.1rem; text-align: center; font-weight: 700; outline: none; transition: var(--transition);
        }
        input[type="text"]:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        button { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: var(--radius-md); font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 0.5rem; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);}
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);}
        button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

        /* --- OYUN EKRANI --- */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; position: relative;}

        /* Üst Bar (Skor & Rakip) */
        .header-bar {
            background: rgba(0,0,0,0.4); padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px); flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .player-info { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 0.95rem; }
        .score-badge { background: var(--primary); color: white; padding: 0.2rem 0.6rem; border-radius: 8px; font-size: 1.1rem; }

        /* Orta Masa (Çuha Alanı - Deste ve Taş Atma) */
        .table-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; position: relative; padding: 1rem;
        }

        .center-board {
            display: flex; gap: 2rem; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 100px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .deck-area { position: relative; width: 44px; height: 60px; cursor: pointer; transition: transform 0.2s;}
        .deck-area:hover { transform: scale(1.05); }
        .deck-tile { position: absolute; width: 100%; height: 100%; background: #e5e5e5; border-radius: 6px; box-shadow: -2px 2px 5px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;}
        .deck-tile::after { content: 'V'; font-size: 1.5rem; font-weight: 900; color: #ccc; }
        /* Deste Yığını Efekti */
        .deck-tile:nth-child(1) { top: -4px; left: 4px; }
        .deck-tile:nth-child(2) { top: -2px; left: 2px; }
        .deck-tile:nth-child(3) { top: 0; left: 0; }

        .gosterge-area { width: 44px; height: 60px; }

        .discard-piles { display: flex; gap: 2rem; width: 100%; max-width: 500px; justify-content: space-between; position: absolute; top: 1rem; padding: 0 2rem;}
        .discard-pile { width: 50px; height: 68px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; display: flex; justify-content: center; align-items: center; position: relative; }
        .discard-label { position: absolute; top: -20px; font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; white-space: nowrap;}
        
        .pile-clickable { cursor: pointer; transition: transform 0.2s; }
        .pile-clickable:hover { transform: scale(1.05); border-color: var(--primary); }

        /* TAŞ (TILE) TASARIMI */
        .tile {
            width: 44px; height: 60px; background: var(--tile-bg); border-radius: 6px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1.8rem; position: relative; user-select: none;
        }
        .tile.red { color: var(--tile-red); }
        .tile.black { color: var(--tile-black); }
        .tile.blue { color: var(--tile-blue); }
        .tile.yellow { color: var(--tile-yellow); }
        .tile.fake { color: #555; font-size: 1rem; }
        
        /* Okey Taşı Belirteci */
        .tile.is-okey::before { content: ''; position: absolute; top: 4px; right: 4px; width: 10px; height: 10px; background: var(--tile-yellow); border-radius: 50%; border: 1px solid #000; box-shadow: 0 0 5px rgba(217, 119, 6, 0.8);}
        /* Seçili Taş */
        .tile.selected { transform: translateY(-10px); box-shadow: 0 10px 15px rgba(0,0,0,0.5), 0 0 0 3px var(--primary); z-index: 20;}

        /* --- ISTAKA (RACK) BÖLÜMÜ --- */
        .rack-area {
            background: linear-gradient(to bottom, #78350f, #451a03); /* Ahşap Rengi */
            padding: 1rem 0.5rem; border-top: 4px solid #92400e; box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0;
        }

        .rack-row { display: flex; justify-content: center; gap: 2px; }
        
        .rack-slot {
            width: 46px; height: 62px; background: rgba(0,0,0,0.3); border-radius: 6px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 1px;
            cursor: pointer;
        }
        .rack-slot:hover { background: rgba(255,255,255,0.1); }
        .rack-slot.highlight { background: rgba(16, 185, 129, 0.3); border: 1px dashed var(--primary); }

        /* Istaka Altı Kontroller (Dizme vb.) */
        .rack-controls { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; flex-wrap: wrap; gap: 0.5rem;}
        .btn-small { padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); font-weight: 700; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 0.3rem;}
        .btn-small:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .btn-small:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-win { background: #ef4444; border-color: #ef4444; color: white;}
        .btn-win:hover:not(:disabled) { background: #dc2626; box-shadow: 0 0 10px rgba(239,68,68,0.5);}

        /* Durum Bildirgesi (Sıra Kimde) */
        .turn-banner { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 1rem 2rem; border-radius: 30px; font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; border: 1px solid var(--primary); color: var(--primary); backdrop-filter: blur(5px); z-index: 10; transition: opacity 0.3s; pointer-events: none;}
        .turn-banner.wait { border-color: #ef4444; color: #ef4444; }
        .hidden { opacity: 0; }

        /* --- SOHBET (OVERLAY CHAT) --- */
        .chat-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 200; display: none; flex-direction: column; justify-content: flex-end;
        }
        .chat-box { background: var(--bg-dark); height: 70%; border-top-left-radius: var(--radius-lg); border-top-right-radius: var(--radius-lg); display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 700; }
        .chat-messages { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
        .msg { font-size: 0.9rem; padding: 0.6rem 1rem; border-radius: 12px; width: fit-content; max-width: 85%; line-height: 1.4; color: white;}
        .msg.me { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 0; }
        .msg.peer { background: #334155; align-self: flex-start; border-bottom-left-radius: 0; }
        .msg.system { background: transparent; color: var(--text-muted); align-self: center; font-size: 0.8rem; font-style: italic; }
        .chat-input { display: flex; padding: 1rem; gap: 0.5rem; background: rgba(0,0,0,0.3); }
        .chat-input input { flex: 1; padding: 0.75rem 1rem; border-radius: 20px; border: none; background: #0f172a; color: white; outline: none; }
        .chat-input button { padding: 0.5rem; border-radius: 50%; width: 44px; height: 44px; }

        /* Yüzen Sohbet Butonu */
        .fab-chat { position: absolute; bottom: 120px; left: 10px; background: var(--primary); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; z-index: 50; border: none;}
        .fab-chat.has-new { animation: pulseChat 1s infinite; background: #ef4444; }
        @keyframes pulseChat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Toast */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px;}
        .toast { background: var(--surface); color: var(--text-main); padding: 1rem 1.5rem; border-radius: 16px; font-weight: 700; font-size: 0.9rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; transform: translateY(-20px); transition: all 0.3s; display: flex; align-items: center; gap: 0.5rem;}
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Bitiş Ekranı Modal */
        #endgame-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:300; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .endgame-content { background: var(--bg-dark); border: 1px solid var(--primary); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 1.5rem; text-align: center;}
        
        /* MOBİL UYUM */
        @media (max-width: 600px) {
            .tile { width: 8.5vw; height: 11.5vw; font-size: 1.2rem; border-radius: 4px; }
            .tile.is-okey::before { width: 6px; height: 6px; top: 2px; right: 2px;}
            .rack-slot { width: 8.8vw; height: 12vw; border-radius: 4px;}
            .discard-pile { width: 9vw; height: 12vw; }
            .deck-area { width: 8.5vw; height: 11.5vw; }
            .gosterge-area { width: 8.5vw; height: 11.5vw; }
            .btn-small { padding: 0.4rem 0.6rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div id="connection-screen">
        <div class="logo"><span class="material-symbols-rounded" style="font-size: 3rem;">grid_view</span> VibeOkey</div>
        
        <div class="conn-card">
            <div class="input-group">
                <label>Oyuncu Adınız</label>
                <input type="text" id="player-name" placeholder="Örn: Efsane">
            </div>

            <div class="input-group" style="margin-top: 1rem;">
                <label>Oda Kodunuz (HOST)</label>
                <div class="id-display" id="my-id">...</div>
                <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 0.5rem;">Arkadaşınıza bu kodu verin.</p>
            </div>

            <div style="display:flex; align-items:center; gap: 1rem; color: #444; margin: 0.5rem 0;">
                <hr style="flex:1; border-color:#444;"><span style="font-size:0.8rem; font-weight:700;">VEYA BAĞLAN</span><hr style="flex:1; border-color:#444;">
            </div>

            <div class="input-group">
                <label>Arkadaşının Kodu (MİSAFİR)</label>
                <input type="text" id="target-id" placeholder="KOD GİR">
                <button onclick="connectToPeer()" id="btn-connect" style="margin-top: 0.5rem;">Masaya Katıl</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        
        <div class="header-bar">
            <div class="player-info">
                <span class="material-symbols-rounded">person</span>
                <span id="opp-name-display">Rakip Bekleniyor</span>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div style="font-size: 0.8rem; color: var(--text-muted);">Skor</div>
                <div class="score-badge" id="score-opp">0</div>
                <div style="font-weight: 900;">-</div>
                <div class="score-badge" id="score-me" style="background: white; color: var(--primary);">0</div>
            </div>
        </div>

        <div class="turn-banner" id="turn-banner">Sıra Sende</div>

        <div class="table-area">
            
            <div class="discard-piles" style="top: 1rem; justify-content: center;">
                <div class="discard-pile pile-clickable" id="opp-discard-pile" onclick="drawFromDiscard()">
                    <div class="discard-label">Rakibin Attığı</div>
                </div>
            </div>

            <div class="center-board">
                <div class="deck-area" onclick="drawFromDeck()" title="Desteden Taş Çek">
                    <div class="deck-tile"></div>
                    <div class="deck-tile"></div>
                    <div class="deck-tile"></div>
                </div>

                <div class="gosterge-area" id="gosterge-slot" title="Gösterge">
                    </div>
            </div>

            <div class="discard-piles" style="bottom: 1rem; top: auto; justify-content: flex-end;">
                <div class="discard-pile pile-clickable" id="my-discard-pile" onclick="discardSelectedTile()">
                    <div class="discard-label">Taş At (Iskarta)</div>
                </div>
            </div>
        </div>

        <button class="fab-chat" id="btn-open-chat" onclick="toggleChat()"><span class="material-symbols-rounded">chat</span></button>

        <div class="rack-area">
            <div class="rack-controls">
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn-small" onclick="sortRack('color')"><span class="material-symbols-rounded">palette</span> Renk Diz</button>
                    <button class="btn-small" onclick="sortRack('run')"><span class="material-symbols-rounded">format_list_numbered</span> Seri Diz</button>
                </div>
                <button class="btn-small btn-win" id="btn-win" onclick="declareWin()" disabled><span class="material-symbols-rounded">emoji_events</span> BİT (Kazan)</button>
            </div>
            
            <div class="rack-row" id="rack-row-1"></div>
            <div class="rack-row" id="rack-row-2"></div>
        </div>

        <div class="chat-overlay" id="chat-overlay">
            <div class="chat-box">
                <div class="chat-header">
                    <span>Masa Sohbeti</span>
                    <button onclick="toggleChat()" style="background:transparent; color:white; padding:0;"><span class="material-symbols-rounded">close</span></button>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="msg system">VibeOkey'e hoş geldiniz. İyi oyunlar!</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="msg-input" placeholder="Mesaj yazın..." onkeypress="handleKeypress(event)">
                    <button onclick="sendChatMessage()"><span class="material-symbols-rounded">send</span></button>
                </div>
            </div>
        </div>

        <div id="endgame-modal">
            <div class="endgame-content">
                <h2 style="color: var(--primary); font-size: 2rem;" id="endgame-title">Oyuncu Bitti!</h2>
                <p style="color: var(--text-muted);">Rakibin Istakası:</p>
                <div style="background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 12px; display: flex; flex-direction: column; gap: 0.5rem;" id="endgame-rack">
                    </div>
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;">
                    <button onclick="acceptWin()" style="background: var(--primary);">Sonucu Onayla & Yeni El</button>
                </div>
            </div>
        </div>

    </div>

    <div id="toast-container"></div>

    <script>
        // --- SES MOTORU ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.addEventListener('click', initAudio, { once: true });

        function playSound(type) {
            try {
                if (!audioCtx) initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'tap') { // Taş seçme/koyma sesi
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                } else if (type === 'turn') { // Sıra sende sesi
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'msg') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); 
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch (e) {}
        }

        // --- P2P & STATE YÖNETİMİ ---
        let peer = null; let conn = null; let myPeerId = '';
        let isHost = false; 
        let myName = ""; let oppName = "";
        let myScore = 0; let oppScore = 0;

        // Okey State
        let gameState = {
            status: 'waiting', // waiting, playing, finished
            deck: [],
            gosterge: null,
            okey: null,
            turn: 'host', // 'host' veya 'guest'
            hostRack: Array(22).fill(null),
            guestRack: Array(22).fill(null),
            hostDiscard: [],
            guestDiscard: [],
            hasDrawnThisTurn: false // Bu tur taş çekildi mi?
        };

        // Lokal State (Sadece UI için)
        let selectedSlotIndex = null; 
        
        function generateShortId() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = '';
            for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        function showToast(msg, icon='info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span class="material-symbols-rounded" style="color:var(--primary)">${icon}</span> <span>${msg}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- BAĞLANTI (HANDSHAKE) ---
        function initPeer() {
            myPeerId = generateShortId();
            peer = new Peer(myPeerId);

            peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });

            // Host Olarak Bağlantı Karşılama
            peer.on('connection', (connection) => {
                if (conn) return; 
                conn = connection;
                isHost = true;
                myName = document.getElementById('player-name').value.trim() || "Host";
                
                setupConnectionDataHandlers();
            });
        }

        window.connectToPeer = () => {
            const targetId = document.getElementById('target-id').value.trim().toUpperCase();
            myName = document.getElementById('player-name').value.trim() || "Misafir";
            if (!targetId) return;

            document.getElementById('btn-connect').innerText = "Bağlanıyor...";
            conn = peer.connect(targetId, { reliable: true });
            isHost = false; 
            
            setupConnectionDataHandlers();
        };

        function setupConnectionDataHandlers() {
            conn.on('open', () => {
                // Handshake (İsimleri değiştir)
                conn.send({ type: 'handshake', name: myName });
            });

            conn.on('data', (data) => {
                if (data.type === 'handshake') {
                    oppName = data.name;
                    document.getElementById('opp-name-display').innerText = oppName;
                    startGameUI();
                    
                    if(isHost) {
                        // Host oyunu kurar ve ilk state'i yollar
                        startNewRound();
                    }
                } 
                else if(data.type === 'sync') {
                    gameState = data.state;
                    selectedSlotIndex = null;
                    renderAll();
                    checkTurnNotification();
                } 
                else if(data.type === 'action') {
                    // SADECE HOST action kabul eder, işler ve sync yollar
                    if(isHost) processActionFromGuest(data.actionData);
                }
                else if(data.type === 'chat') {
                    addMessage(data.text, 'peer', oppName);
                    playSound('msg');
                    const overlay = document.getElementById('chat-overlay');
                    if(overlay.style.display !== 'flex') {
                        document.getElementById('btn-open-chat').classList.add('has-new');
                        showToast(`${oppName}: ${data.text}`, 'chat');
                    }
                }
                else if(data.type === 'declare_win') {
                    showEndGameModal(data.rack, false);
                }
                else if(data.type === 'accept_win') {
                    myScore++;
                    document.getElementById('endgame-modal').style.display = 'none';
                    showToast("Rakip elinizi onayladı!", 'emoji_events');
                    if(isHost) setTimeout(startNewRound, 1000);
                }
            });

            conn.on('close', () => {
                showToast("Rakip ayrıldı. Sayfa yenileniyor.");
                setTimeout(() => location.reload(), 2000);
            });
        }

        function startGameUI() {
            document.getElementById('connection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            // Istaka slotlarını HTML'e bas
            const r1 = document.getElementById('rack-row-1');
            const r2 = document.getElementById('rack-row-2');
            r1.innerHTML=''; r2.innerHTML='';
            for(let i=0; i<11; i++) {
                r1.innerHTML += `<div class="rack-slot" onclick="handleSlotClick(${i})" id="slot-${i}"></div>`;
                r2.innerHTML += `<div class="rack-slot" onclick="handleSlotClick(${i+11})" id="slot-${i+11}"></div>`;
            }
        }

        // --- OKEY MATEMATİĞİ (SADECE HOST ÇALIŞTIRIR) ---
        function generateTiles() {
            let tiles = [];
            const colors = ['red', 'black', 'blue', 'yellow'];
            let idCounter = 1;

            // 1-13 arası 4 renk, her birinden 2'şer adet
            for (let set = 0; set < 2; set++) {
                for (let c of colors) {
                    for (let v = 1; v <= 13; v++) {
                        tiles.push({ id: idCounter++, color: c, value: v, isOkey: false });
                    }
                }
            }
            // 2 Sahte Okey
            tiles.push({ id: idCounter++, color: 'fake', value: 0, isOkey: false });
            tiles.push({ id: idCounter++, color: 'fake', value: 0, isOkey: false });
            
            // Fisher-Yates Karıştırma
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }
            return tiles;
        }

        function startNewRound() {
            if(!isHost) return;
            
            let deck = generateTiles();
            
            // Gösterge seçimi (Sahte okey olamaz)
            let gIndex = deck.findIndex(t => t.color !== 'fake');
            let gosterge = deck.splice(gIndex, 1)[0];
            
            // Okey taşını belirle
            let okeyColor = gosterge.color;
            let okeyValue = gosterge.value === 13 ? 1 : gosterge.value + 1;

            // Destedeki Okeyleri işaretle
            deck.forEach(t => {
                if(t.color === okeyColor && t.value === okeyValue) t.isOkey = true;
            });

            gameState.gosterge = gosterge;
            gameState.okey = { color: okeyColor, value: okeyValue };
            gameState.hostDiscard = [];
            gameState.guestDiscard = [];
            gameState.hostRack = Array(22).fill(null);
            gameState.guestRack = Array(22).fill(null);
            
            // Dağıtım: Host'a 15, Guest'e 14 taş
            for(let i=0; i<15; i++) gameState.hostRack[i] = deck.pop();
            for(let i=0; i<14; i++) gameState.guestRack[i] = deck.pop();
            
            gameState.deck = deck;
            gameState.turn = 'host';
            gameState.hasDrawnThisTurn = true; // Host ilk elde taş çekmez, direkt atar
            gameState.status = 'playing';

            broadcastSync();
            renderAll();
        }

        function broadcastSync() {
            if(conn && conn.open && isHost) {
                conn.send({ type: 'sync', state: gameState });
            }
        }

        // --- HOST İŞLEM MOTORU (GUEST İSTEKLERİNİ İŞLER) ---
        function processActionFromGuest(act) {
            const role = 'guest';
            
            if(gameState.turn !== role) return;

            if(act.type === 'draw_deck') {
                if(gameState.hasDrawnThisTurn || gameState.deck.length === 0) return;
                const tile = gameState.deck.pop();
                const emptyIdx = gameState.guestRack.indexOf(null);
                if(emptyIdx !== -1) gameState.guestRack[emptyIdx] = tile;
                gameState.hasDrawnThisTurn = true;
            } 
            else if (act.type === 'draw_discard') {
                if(gameState.hasDrawnThisTurn || gameState.hostDiscard.length === 0) return;
                const tile = gameState.hostDiscard.pop();
                const emptyIdx = gameState.guestRack.indexOf(null);
                if(emptyIdx !== -1) gameState.guestRack[emptyIdx] = tile;
                gameState.hasDrawnThisTurn = true;
            }
            else if (act.type === 'discard') {
                if(!gameState.hasDrawnThisTurn) return;
                // Guest ıskartaya atar (guestDiscard)
                const tile = gameState.guestRack[act.slotIndex];
                gameState.guestRack[act.slotIndex] = null;
                gameState.guestDiscard.push(tile);
                // Sıra Host'a geçer
                gameState.turn = 'host';
                gameState.hasDrawnThisTurn = false;
            }
            else if (act.type === 'rearrange') {
                // İstaka içi hareket
                const temp = gameState.guestRack[act.from];
                gameState.guestRack[act.from] = gameState.guestRack[act.to];
                gameState.guestRack[act.to] = temp;
            }
            else if (act.type === 'auto_sort') {
                gameState.guestRack = performAutoSort(gameState.guestRack, act.sortType);
            }

            broadcastSync();
            renderAll();
            checkTurnNotification();
        }

        // --- GUEST VEYA HOST AKSİYONLARI (UI TETİKLEYİCİLER) ---
        
        function getMyRole() { return isHost ? 'host' : 'guest'; }
        function getMyRack() { return isHost ? gameState.hostRack : gameState.guestRack; }
        function getOppDiscard() { return isHost ? gameState.guestDiscard : gameState.hostDiscard; }

        function sendAction(actionData) {
            playSound('tap');
            if(isHost) {
                // Host kendi eylemini direkt işler
                const fakeAct = { type: actionData.type, slotIndex: actionData.slotIndex, from: actionData.from, to: actionData.to, sortType: actionData.sortType };
                // processAction mantığını Host için kopyala:
                if(fakeAct.type === 'draw_deck') {
                    if(!gameState.hasDrawnThisTurn && gameState.deck.length > 0) {
                        const emptyIdx = gameState.hostRack.indexOf(null);
                        if(emptyIdx !== -1) { gameState.hostRack[emptyIdx] = gameState.deck.pop(); gameState.hasDrawnThisTurn = true; }
                    }
                } else if(fakeAct.type === 'draw_discard') {
                    if(!gameState.hasDrawnThisTurn && gameState.guestDiscard.length > 0) {
                        const emptyIdx = gameState.hostRack.indexOf(null);
                        if(emptyIdx !== -1) { gameState.hostRack[emptyIdx] = gameState.guestDiscard.pop(); gameState.hasDrawnThisTurn = true; }
                    }
                } else if(fakeAct.type === 'discard') {
                    if(gameState.hasDrawnThisTurn) {
                        gameState.hostDiscard.push(gameState.hostRack[fakeAct.slotIndex]);
                        gameState.hostRack[fakeAct.slotIndex] = null;
                        gameState.turn = 'guest'; gameState.hasDrawnThisTurn = false;
                    }
                } else if(fakeAct.type === 'rearrange') {
                    const temp = gameState.hostRack[fakeAct.from];
                    gameState.hostRack[fakeAct.from] = gameState.hostRack[fakeAct.to];
                    gameState.hostRack[fakeAct.to] = temp;
                } else if(fakeAct.type === 'auto_sort') {
                    gameState.hostRack = performAutoSort(gameState.hostRack, fakeAct.sortType);
                }
                
                broadcastSync();
                renderAll();
                checkTurnNotification();
            } else {
                // Guest eylemi Host'a yollar
                conn.send({ type: 'action', actionData });
            }
        }

        window.drawFromDeck = () => {
            if(gameState.turn !== getMyRole()) { showToast("Sıra rakipte!"); return; }
            if(gameState.hasDrawnThisTurn) { showToast("Zaten taş çektiniz. Bir taş atın."); return; }
            sendAction({ type: 'draw_deck' });
        };

        window.drawFromDiscard = () => {
            if(gameState.turn !== getMyRole()) { showToast("Sıra rakipte!"); return; }
            if(gameState.hasDrawnThisTurn) { showToast("Zaten taş çektiniz."); return; }
            if(getOppDiscard().length === 0) { showToast("İçi boş."); return; }
            sendAction({ type: 'draw_discard' });
        };

        window.discardSelectedTile = () => {
            if(gameState.turn !== getMyRole()) { showToast("Sıra rakipte!"); return; }
            if(!gameState.hasDrawnThisTurn) { showToast("Önce taş çekmelisiniz."); return; }
            if(selectedSlotIndex === null || getMyRack()[selectedSlotIndex] === null) { showToast("Atılacak taşı seçin."); return; }

            sendAction({ type: 'discard', slotIndex: selectedSlotIndex });
            selectedSlotIndex = null;
        };

        window.handleSlotClick = (index) => {
            const rack = getMyRack();
            
            // Eğer önceden seçili bir slot yoksa ve tıklanan boş değilse SEÇ
            if(selectedSlotIndex === null) {
                if(rack[index] !== null) {
                    selectedSlotIndex = index;
                    playSound('tap');
                    renderRack();
                }
                return;
            }

            // Zaten seçili bir taş varsa ve farklı bir slota tıkladıysa YER DEĞİŞTİR
            if(selectedSlotIndex !== index) {
                sendAction({ type: 'rearrange', from: selectedSlotIndex, to: index });
            }
            
            selectedSlotIndex = null; // Seçimi kaldır
            renderRack();
        };

        // --- OTO-DİZGİ (AUTO-SORT) MANTIĞI ---
        window.sortRack = (type) => {
            sendAction({ type: 'auto_sort', sortType: type });
            selectedSlotIndex = null;
        };

        function performAutoSort(rackArr, type) {
            // Sadece dolu taşları al
            let tiles = rackArr.filter(t => t !== null);
            
            if(type === 'color') {
                // Renk -> Sayı sıralaması
                const colorOrder = { 'red': 1, 'black': 2, 'blue': 3, 'yellow': 4, 'fake': 5 };
                tiles.sort((a,b) => {
                    if(colorOrder[a.color] !== colorOrder[b.color]) return colorOrder[a.color] - colorOrder[b.color];
                    return a.value - b.value;
                });
            } else if(type === 'run') {
                // Sayı -> Renk sıralaması
                tiles.sort((a,b) => {
                    if(a.value !== b.value) return a.value - b.value;
                    const colorOrder = { 'red': 1, 'black': 2, 'blue': 3, 'yellow': 4, 'fake': 5 };
                    return colorOrder[a.color] - colorOrder[b.color];
                });
            }

            // Yeni 22'lik diziye yerleştir (Aralarda boşluk bırakarak gruplama yapılabilir ama basitçe peşpeşe diziyoruz)
            let newRack = Array(22).fill(null);
            for(let i=0; i<tiles.length; i++) newRack[i] = tiles[i];
            return newRack;
        }

        // --- BİTİŞ ONAY SİSTEMİ (SANDBOX) ---
        window.declareWin = () => {
            // Sadece elinde 14 taş varsa bitilebilir (Yani taş çekmiş ve henüz atmamış olmalı veya 15 taşla bitiyor olmalı)
            const rack = getMyRack();
            const tileCount = rack.filter(t => t !== null).length;
            if(tileCount !== 14 && tileCount !== 15) {
                showToast("Bitebilmek için ıstakanız kurallara uygun olmalıdır.", "error"); return;
            }

            conn.send({ type: 'declare_win', rack: rack });
            showToast("Bitiş isteği rakibe gönderildi. Onay bekleniyor...");
        };

        window.acceptWin = () => {
            oppScore++;
            document.getElementById('endgame-modal').style.display = 'none';
            conn.send({ type: 'accept_win' });
            if(isHost) setTimeout(startNewRound, 1000);
        };

        function showEndGameModal(opponentRack, isMeWinner) {
            const modal = document.getElementById('endgame-modal');
            modal.style.display = 'flex';
            document.getElementById('endgame-title').innerText = isMeWinner ? "Kazandınız!" : "Rakip Bitti!";
            
            const rackDiv = document.getElementById('endgame-rack');
            rackDiv.innerHTML = '';
            
            let rowHtml = '<div style="display:flex; gap:2px; flex-wrap:wrap; justify-content:center;">';
            opponentRack.forEach(t => {
                if(t) rowHtml += createTileHTML(t);
            });
            rowHtml += '</div>';
            rackDiv.innerHTML = rowHtml;
        }

        // --- GÖRSELLEŞTİRME (RENDER) ---
        function checkTurnNotification() {
            if(gameState.turn === getMyRole()) {
                playSound('turn');
            }
        }

        function createTileHTML(t) {
            if(!t) return '';
            let valStr = t.color === 'fake' ? '★' : t.value;
            let okeyClass = t.isOkey ? 'is-okey' : '';
            return `<div class="tile ${t.color} ${okeyClass}"><span>${valStr}</span></div>`;
        }

        function renderAll() {
            if(gameState.status === 'waiting') return;

            document.getElementById('score-me').innerText = myScore;
            document.getElementById('score-opp').innerText = oppScore;

            const banner = document.getElementById('turn-banner');
            const btnWin = document.getElementById('btn-win');
            
            if(gameState.turn === getMyRole()) {
                banner.innerText = "SIRA SENDE";
                banner.className = "turn-banner";
                banner.classList.remove('hidden');
                setTimeout(() => banner.classList.add('hidden'), 2000);
                
                // Eğer çekildiyse kazanma butonu aktif olur
                btnWin.disabled = !gameState.hasDrawnThisTurn;
            } else {
                banner.innerText = "SIRA RAKİPTE";
                banner.className = "turn-banner wait";
                banner.classList.remove('hidden');
                btnWin.disabled = true;
            }

            // Masa Ortası
            const gSlot = document.getElementById('gosterge-slot');
            gSlot.innerHTML = createTileHTML(gameState.gosterge);

            // Iskarta Alanları
            const myDisc = isHost ? gameState.hostDiscard : gameState.guestDiscard;
            const oppDisc = isHost ? gameState.guestDiscard : gameState.hostDiscard;

            const myDiscEl = document.getElementById('my-discard-pile');
            if(myDisc.length > 0) {
                myDiscEl.innerHTML = createTileHTML(myDisc[myDisc.length-1]) + '<div class="discard-label" style="bottom:-20px; top:auto;">Attığın</div>';
            } else {
                myDiscEl.innerHTML = '<div class="discard-label" style="bottom:-20px; top:auto;">Attığın</div>';
            }

            const oppDiscEl = document.getElementById('opp-discard-pile');
            if(oppDisc.length > 0) {
                oppDiscEl.innerHTML = createTileHTML(oppDisc[oppDisc.length-1]) + '<div class="discard-label">Rakibin Attığı</div>';
            } else {
                oppDiscEl.innerHTML = '<div class="discard-label">Rakibin Attığı</div>';
            }

            renderRack();
        }

        function renderRack() {
            const rack = getMyRack();
            for(let i=0; i<22; i++) {
                const slot = document.getElementById(`slot-${i}`);
                slot.innerHTML = createTileHTML(rack[i]);
                
                if(selectedSlotIndex === i) slot.classList.add('highlight');
                else slot.classList.remove('highlight');
            }
        }

        // --- SOHBET OVERLAY (UX) ---
        window.toggleChat = () => {
            const overlay = document.getElementById('chat-overlay');
            const btn = document.getElementById('btn-open-chat');
            
            if(overlay.style.display === 'flex') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
                btn.classList.remove('has-new');
                const msgBox = document.getElementById('chat-messages');
                msgBox.scrollTop = msgBox.scrollHeight;
            }
        };

        window.sendChatMessage = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !conn) return;

            addMessage(text, 'me', 'Sen');
            conn.send({ type: 'chat', text: text });
            input.value = '';
        };

        window.handleKeypress = (e) => { if (e.key === 'Enter') sendChatMessage(); };

        function addMessage(text, type, senderName) {
            const box = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.className = `msg ${type}`;
            
            if(type === 'system') msg.innerText = text;
            else msg.innerHTML = `<div style="font-size:0.7rem; opacity:0.7; margin-bottom:2px;">${senderName}</div>${text}`;
            
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        window.onload = initPeer;

    </script>
</body>
</html>

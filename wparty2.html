<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WParty - Connect and Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- VibeCoder "Deep Blue" Master Theme --- */
        :root {
            --bg-base: #020617;        /* Slate 950 */
            --bg-glass: rgba(15, 23, 42, 0.85);
            --bg-glass-heavy: rgba(2, 6, 23, 0.7);
            --primary: #0ea5e9;        /* Sky 500 */
            --primary-glow: rgba(14, 165, 233, 0.4);
            --secondary: #6366f1;      /* Indigo 500 */
            --accent: #22d3ee;         /* Cyan 400 */
            --success: #10b981;        /* Emerald 500 */
            --text-main: #f1f5f9;      /* Slate 100 */
            --text-muted: #64748b;     /* Slate 400 */
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html { 
            height: 100%; width: 100%; 
            background-color: var(--bg-base); 
            color: var(--text-main);
            overflow: hidden; 
            touch-action: manipulation; 
        }

        #app-root {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            width: 100%; max-width: 600px; margin: 0 auto;
            background: var(--bg-base); 
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 165, 233, 0.1);
        }

        /* =========================================
           1. LOBİ (MINIMALIST & COOL)
           ========================================= */
        #lobby-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #075985 0%, var(--bg-base) 100%);
            padding: 2.5rem; z-index: 50;
        }
        
        .logo-container { text-align: center; margin-bottom: 3rem; }
        .logo-text {
            font-size: 3.5rem; font-weight: 900; letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-top: 0.5rem; font-weight: 300; }
        
        .lobby-card { 
            width: 100%; background: var(--bg-glass); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 2rem; 
            padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn { 
            width: 100%; padding: 1.1rem; border: none; border-radius: 1.2rem; 
            font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 10px 20px -5px var(--primary-glow); }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border); }
        
        #invite-link-display {
            background: rgba(0,0,0,0.4); padding: 1.2rem; border-radius: 1rem;
            font-family: 'SF Mono', monospace; font-size: 0.85rem; color: var(--accent);
            text-align: center; word-break: break-all; border: 1px solid var(--border);
        }

        /* =========================================
           2. TAM EKRAN VİDEO & SİNERJİ BÖLÜMÜ
           ========================================= */
        #main-screen { flex: 1; display: none; flex-direction: column; width: 100%; height: 100%; position: relative; }

        #video-section {
            flex: 1; /* Artık ekranın tamamını kaplıyor */
            background-color: #000; position: relative;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; overflow: hidden;
        }
        #native-video { width: 100%; height: 100%; object-fit: contain; }
        #yt-wrapper { width: 100%; height: 100%; }

        #play-overlay {
            position: absolute; inset: 0; background: var(--bg-glass-heavy); backdrop-filter: blur(8px);
            color: white; display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 40; cursor: pointer;
        }
        .play-icon { font-size: 5rem; color: var(--primary); filter: drop-shadow(0 0 15px var(--primary)); margin-bottom: 1rem; }

        /* =========================================
           3. YÜZEN SOHBET (OVERLAY BUBBLES)
           ========================================= */
        #overlay-chat-container {
            position: absolute;
            bottom: 6rem; /* Input alanının üzerinde kalsın */
            left: 1rem; right: 1rem;
            display: flex; flex-direction: column; gap: 0.75rem;
            justify-content: flex-end; align-items: flex-start;
            pointer-events: none; /* Balonların altındaki videoya tıklanabilsin */
            z-index: 20;
            max-height: 50%; overflow: hidden;
        }

        .overlay-bubble {
            max-width: 85%; padding: 0.75rem 1.2rem; border-radius: 1.5rem; 
            font-size: 0.95rem; line-height: 1.4; word-wrap: break-word;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: auto; /* Balon okunabilir kalsın */
        }
        
        .overlay-bubble.system { 
            align-self: center; background: rgba(14, 165, 233, 0.2); border: 1px solid rgba(14, 165, 233, 0.3);
            color: var(--text-main); font-size: 0.8rem; border-radius: 2rem; padding: 0.5rem 1.2rem; text-align: center;
        }
        .overlay-bubble.me { 
            align-self: flex-end; background: linear-gradient(135deg, rgba(3, 105, 161, 0.9), rgba(30, 58, 138, 0.9)); 
            color: white; border-bottom-right-radius: 0.4rem; border: 1px solid rgba(255,255,255,0.1);
        }
        .overlay-bubble.other { 
            align-self: flex-start; background: rgba(15, 23, 42, 0.8); color: var(--text-main); 
            border: 1px solid var(--border); border-bottom-left-radius: 0.4rem; 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(20px) scale(0.9); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* =========================================
           4. YÜZEN KONTROLLER & DRAWER
           ========================================= */
        #admin-drawer {
            position: absolute; top: 0; left: 0; right: 0;
            background: var(--bg-glass-heavy); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: env(safe-area-inset-top, 1rem) 1rem 1rem 1rem; transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 0.75rem;
        }
        #admin-drawer.open { transform: translateY(0); }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
        .drawer-header span { font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }

        #host-url-input {
            width: 100%; padding: 0.85rem 1.2rem; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border); border-radius: 1rem; color: white; outline: none; font-size: 0.9rem;
        }
        #host-url-input:focus { border-color: var(--primary); }

        #btn-toggle-admin {
            position: absolute; top: max(1rem, env(safe-area-inset-top)); right: 1rem; width: 40px; height: 40px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 50%;
            display: none; align-items: center; justify-content: center; cursor: pointer;
            z-index: 30; backdrop-filter: blur(10px); color: var(--text-main);
            transition: 0.3s;
        }
        #btn-toggle-admin:hover { background: var(--primary); }

        /* SOHBET GİRİŞ ALANI (FLOATING CAPSULE) */
        #input-wrapper {
            position: absolute; bottom: max(1rem, env(safe-area-inset-bottom)); left: 1rem; right: 1rem;
            z-index: 30; display: flex;
        }

        #input-area {
            display: flex; width: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 2rem; padding: 0.5rem; gap: 0.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        
        #chat-input { 
            flex: 1; padding: 0.75rem 1rem; background: transparent; border: none; 
            font-size: 1rem; color: white; outline: none;
        }
        #chat-input::placeholder { color: var(--text-muted); }

        #btn-send { 
            width: 42px; height: 42px; background: var(--primary); color: white; border: none; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: 0.2s;
        }
        #btn-send:active { transform: scale(0.9); }
        #btn-send svg { width: 18px; height: 18px; fill: currentColor; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-root">
        
        <div id="lobby-screen">
            <div class="logo-container">
                <div class="logo-text">WParty</div>
                <div class="subtitle">Connect and Share</div>
            </div>
            
            <div id="setup-start" class="lobby-card">
                <button id="btn-create-p2p" class="btn btn-primary">Connect and Share</button>
                <div id="lobby-log" style="text-align: center; color: var(--primary); font-size: 0.85rem; height: 1rem;"></div>
            </div>

            <div id="setup-host-waiting" class="lobby-card hidden">
                <p style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">Davet linkin hazır:</p>
                <div id="invite-link-display">...</div>
                <button id="btn-copy-link" class="btn btn-outline">📋 Linki Kopyala</button>
                <p style="text-align: center; font-size: 0.85rem; color: var(--primary); font-weight: 600; margin-top: 0.5rem;">Bağlantı bekleniyor...</p>
            </div>

            <div id="setup-join-invite" class="lobby-card hidden">
                <p style="text-align: center; font-size: 1.1rem; font-weight: 700;">Bir partiye davet edildin!</p>
                <button id="btn-join-p2p" class="btn btn-success">Partiye Katıl</button>
                <div id="join-log" style="text-align: center; color: #ef4444; font-size: 0.85rem; height: 1rem;"></div>
            </div>
        </div>

        <div id="main-screen">
            
            <div id="admin-drawer">
                <div class="drawer-header">
                    <span>Video Linki Yükle</span>
                    <button onclick="toggleDrawer()" style="background:none; border:none; color:var(--text-muted); font-size:1.2rem;">✕</button>
                </div>
                <input type="text" id="host-url-input" placeholder="YouTube veya MP4 URL...">
                <button id="btn-load-video" class="btn btn-primary" style="padding:0.75rem; font-size:0.85rem;">Videoyu Başlat</button>
            </div>

            <div id="btn-toggle-admin" onclick="toggleDrawer()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </div>

            <div id="video-section">
                <div id="play-overlay">
                    <div class="play-icon">▶</div>
                    <div style="font-size: 1.2rem; font-weight: 700; letter-spacing: 1px;">SENKRONİZE OL</div>
                </div>

                <video id="native-video" playsinline class="hidden"></video>
                <div id="yt-wrapper" class="hidden"><div id="yt-iframe"></div></div>
                
                <div id="overlay-chat-container"></div>
            </div>

            <div id="input-wrapper">
                <form id="input-area" onsubmit="sendMsg(event)">
                    <input 
                        type="text" 
                        id="chat-input" 
                        placeholder="Mesajını yaz..." 
                        autocomplete="off" 
                        autocorrect="off" 
                        autocapitalize="sentences" 
                        spellcheck="false" 
                        name="wparty_chat_field_xyz" 
                        data-lpignore="true" 
                        data-form-type="other"
                    >
                    <button type="submit" id="btn-send">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </form>
            </div>
            
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        /**
         * VibeCoder WParty v10.0 - Immersive Overlay Edition
         */

        const appRoot = document.getElementById('app-root');
        const overlayContainer = document.getElementById('overlay-chat-container');
        const adminDrawer = document.getElementById('admin-drawer');
        const toggleBtn = document.getElementById('btn-toggle-admin');
        const chatInput = document.getElementById('chat-input');
        
        function resizeViewport() {
            if (window.visualViewport) {
                appRoot.style.height = window.visualViewport.height + 'px';
            }
        }
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', resizeViewport);
            window.visualViewport.addEventListener('scroll', resizeViewport);
            resizeViewport();
        }

        function toggleDrawer() {
            adminDrawer.classList.toggle('open');
        }

        let peer = null, conn = null, isHost = false, isSyncing = false;
        let activeMode = 'none', currentUrl = '';
        const PREFIX = "vwparty-v10-";

        // URL PARAM CHECK
        const urlParams = new URLSearchParams(window.location.search);
        const roomCodeFromUrl = urlParams.get('room');
        if (roomCodeFromUrl) {
            document.getElementById('setup-start').classList.add('hidden');
            document.getElementById('setup-join-invite').classList.remove('hidden');
        }

        // VIDEO ENGINE
        let ytPlayer = null;
        function extractYT(url) {
            const match = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadVideo(url) {
            if(!url) return;
            currentUrl = url;
            document.getElementById('play-overlay').style.display = 'none';

            const ytId = extractYT(url);
            const nativeVid = document.getElementById('native-video');
            const ytWrap = document.getElementById('yt-wrapper');

            if (ytId) {
                activeMode = 'youtube';
                nativeVid.classList.add('hidden'); nativeVid.pause();
                ytWrap.classList.remove('hidden');
                if(ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                    ytPlayer.loadVideoById(ytId);
                } else {
                    ytPlayer = new YT.Player('yt-iframe', {
                        height: '100%', width: '100%', videoId: ytId,
                        playerVars: { 'playsinline': 1, 'controls': isHost ? 1 : 0 },
                        events: { 'onStateChange': (e) => {
                            if(!isHost || isSyncing) return;
                            const t = ytPlayer.getCurrentTime();
                            if (e.data === YT.PlayerState.PLAYING) sendSync('play', t, true);
                            if (e.data === YT.PlayerState.PAUSED) sendSync('pause', t, false);
                        }}
                    });
                }
            } else {
                activeMode = 'native';
                ytWrap.classList.add('hidden');
                if (ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
                nativeVid.classList.remove('hidden');
                nativeVid.src = url; nativeVid.load();
                if (isHost) nativeVid.setAttribute('controls', 'true');
            }
            
            adminDrawer.classList.remove('open');
        }

        // SYNC ENGINE
        function applySync(time, isPlaying) {
            isSyncing = true;
            const nativeVid = document.getElementById('native-video');
            if (activeMode === 'native') {
                if (Math.abs(nativeVid.currentTime - time) > 0.5) nativeVid.currentTime = time;
                if (isPlaying && nativeVid.paused) {
                    nativeVid.play().catch(() => { if(!isHost) document.getElementById('play-overlay').style.display = 'flex'; });
                } else if (!isPlaying && !nativeVid.paused) nativeVid.pause();
            } 
            else if (activeMode === 'youtube' && ytPlayer && typeof ytPlayer.seekTo === 'function') {
                if (Math.abs(ytPlayer.getCurrentTime() - time) > 1) ytPlayer.seekTo(time, true);
                if (isPlaying) ytPlayer.playVideo(); else ytPlayer.pauseVideo();
            }
            setTimeout(() => { isSyncing = false; }, 300);
        }

        document.getElementById('play-overlay').onclick = function() {
            this.style.display = 'none';
            if (activeMode === 'native') document.getElementById('native-video').play();
            else if (activeMode === 'youtube') ytPlayer.playVideo();
        };

        const nativeVid = document.getElementById('native-video');
        nativeVid.addEventListener('play', () => { if(isHost && !isSyncing) sendSync('play', nativeVid.currentTime, true); });
        nativeVid.addEventListener('pause', () => { if(isHost && !isSyncing) sendSync('pause', nativeVid.currentTime, false); });
        nativeVid.addEventListener('seeked', () => { if(isHost && !isSyncing) sendSync('seek', nativeVid.currentTime, !nativeVid.paused); });

        // OVERLAY CHAT ENGINE (Garbage Collection ile)
        function appendChat(msg, type) {
            const el = document.createElement('div'); 
            el.className = `overlay-bubble ${type}`; 
            el.textContent = msg;
            overlayContainer.appendChild(el);
            
            // 6 saniye sonra balonu yumuşakça yok et
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(-10px)';
                setTimeout(() => el.remove(), 500); // CSS transition süresi kadar bekle ve DOM'dan sil
            }, 6000);
        }

        function sendSync(action, time=0, isPlaying=false, url=null) {
            if (conn && conn.open) conn.send({ type: 'sync', action, time, isPlaying, url });
        }

        function handleData(data) {
            if (data.type === 'chat') appendChat(data.text, 'other');
            else if (data.type === 'sync') {
                if (data.action === 'url' || data.action === 'init') {
                    if (data.url && currentUrl !== data.url) {
                        loadVideo(data.url);
                        appendChat("🎬 Yeni video yüklendi.", "system");
                    }
                } else applySync(data.time, data.isPlaying);
            }
        }

        // HOST START
        document.getElementById('btn-create-p2p').onclick = () => {
            isHost = true;
            document.getElementById('lobby-log').textContent = "Initializing P2P...";
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            peer = new Peer(PREFIX + code);
            peer.on('open', () => {
                document.getElementById('setup-start').classList.add('hidden');
                document.getElementById('setup-host-waiting').classList.remove('hidden');
                const invUrl = `${window.location.href.split('?')[0]}?room=${code}`;
                document.getElementById('invite-link-display').textContent = invUrl;
                document.getElementById('btn-copy-link').onclick = () => {
                    navigator.clipboard.writeText(invUrl).then(() => {
                        const b = document.getElementById('btn-copy-link');
                        b.textContent = "✅ Kopyalandı"; b.style.background = "var(--success)";
                        setTimeout(() => { b.textContent = "📋 Linki Kopyala"; b.style.background = ""; }, 2000);
                    });
                };
            });
            peer.on('connection', (c) => {
                conn = c; startApp();
                appendChat("✨ Arkadaşın partiye katıldı!", "system");
                sendSync('init', 0, false, currentUrl);
                conn.on('data', handleData);
            });
        };

        // JOIN START
        document.getElementById('btn-join-p2p').onclick = () => {
            isHost = false;
            document.getElementById('join-log').textContent = "Connecting...";
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(PREFIX + roomCodeFromUrl);
                conn.on('open', () => {
                    startApp();
                    appendChat("✨ Partiye katıldın!", "system");
                    conn.on('data', handleData);
                });
            });
            peer.on('error', () => document.getElementById('join-log').textContent = "Parti bulunamadı.");
        };

        function startApp() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            if(isHost) toggleBtn.style.display = 'flex';
            window.history.replaceState({}, '', window.location.pathname);
            resizeViewport();
        }

        document.getElementById('btn-load-video').onclick = () => {
            const u = document.getElementById('host-url-input').value.trim();
            if(u) { loadVideo(u); sendSync('url', 0, false, u); }
        };

        window.sendMsg = (e) => {
            e.preventDefault();
            const t = chatInput.value.trim();
            if (!t || !conn || !conn.open) return;
            appendChat(t, 'me');
            conn.send({ type: 'chat', text: t });
            chatInput.value = '';
            
            // Mobilde odak kaybını engelle (klavye açık kalsın)
            setTimeout(() => chatInput.focus(), 10);
        };

    </script>
</body>
</html>

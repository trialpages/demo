<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch TV - Global Canlı Yayın Merkezi</title>
    
    <!-- HLS.js Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* ==========================================================================
           1. MODERN YOUTUBE-STYLE CSS MİMARİSİ
           ========================================================================== */
        :root {
            --bg-main: #0f0f0f;
            --bg-secondary: #212121;
            --bg-hover: #3d3d3d;
            --accent: #ff0000;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --border-color: #3f3f3f;
            --nav-height: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* --- Navbar / Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .hamburger:hover {
            background-color: var(--bg-hover);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .logo-icon {
            background-color: var(--accent);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .search-container {
            display: flex;
            flex: 1;
            max-width: 600px;
            margin: 0 10px;
        }

        .search-container input {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .search-container input:focus {
            border-color: #1c62b9;
        }

        .header-right {
            width: 40px; /* Dengeleyici alan */
            flex-shrink: 0;
        }

        /* --- Drawer / Hamburger Menü (Accordion Yapısı) --- */
        .drawer-overlay {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            width: 100vw;
            height: calc(100vh - var(--nav-height));
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: var(--nav-height);
            left: -280px;
            width: 280px;
            height: calc(100vh - var(--nav-height));
            background-color: var(--bg-secondary);
            z-index: 95;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .drawer.active {
            left: 0;
        }

        /* Accordion Stilleri */
        .accordion {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            padding: 16px 20px;
            width: 100%;
            text-align: left;
            border: none;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion:hover {
            background-color: var(--bg-hover);
        }

        .accordion:after {
            content: '\02795'; /* Plus icon */
            font-size: 13px;
            color: var(--text-secondary);
        }

        .accordion.active:after {
            content: "\2796"; /* Minus icon */
        }

        .panel {
            padding: 0;
            background-color: var(--bg-main);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease-out;
        }

        .drawer-item {
            padding: 12px 24px 12px 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.95rem;
            transition: background-color 0.2s;
            color: var(--text-secondary);
        }

        .drawer-item:hover, .drawer-item.active {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        /* --- Ana İçerik Düzeni --- */
        .main-layout {
            margin-top: var(--nav-height);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- Video Oynatıcı Alanı --- */
        .player-section {
            width: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: var(--nav-height);
            z-index: 40;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .video-container {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            max-height: 45vh; /* Tablet ve Mobilde ekranı işgal etmesini kesin olarak engeller */
            position: relative;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            outline: none;
            object-fit: contain; /* En boy oranını koruyarak sığdırır */
        }

        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }

        .error-overlay.hidden {
            display: none;
        }

        .player-info {
            width: 100%;
            max-width: 1280px;
            padding: 16px;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .player-info img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background-color: var(--bg-secondary);
            object-fit: contain;
            padding: 4px;
        }

        .player-title h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .player-title p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* --- Liste (Kanallar) --- */
        .content-section {
            padding: 16px;
            max-width: 1000px; /* Okunabilirliği artırmak için max genişlik */
            margin: 0 auto;
            width: 100%;
        }

        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Zarif Liste Mimarisi */
        .channels-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .channel-row {
            display: flex;
            align-items: center;
            background-color: var(--bg-main);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .channel-row:hover {
            background-color: var(--bg-hover);
            border-color: var(--border-color);
        }

        .row-thumbnail {
            width: 70px;
            height: 45px;
            background-color: var(--bg-secondary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .row-thumbnail img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .row-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .row-info h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .row-action {
            color: var(--text-secondary);
            font-size: 1.2rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .channel-row:hover .row-action {
            opacity: 1;
            color: var(--accent);
        }

        /* --- Responsive Tasarım --- */
        @media (max-width: 768px) {
            .logo {
                font-size: 0; /* Mobilde sadece ikon kalsın, arama çubuğuna yer açılsın */
            }
            .logo-icon {
                font-size: 1.25rem;
            }
            .search-container {
                margin: 0 5px;
            }
            .header-right {
                width: 0;
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Üst Navigasyon -->
    <header>
        <div class="header-left">
            <button class="hamburger" id="menuBtn">☰</button>
            <div class="logo" id="logoBtn">
                <span class="logo-icon">▶</span> Watch TV
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Seçili listede kanal ara..." autocomplete="off">
        </div>
        <div class="header-right"></div> 
    </header>

    <!-- Yan Menü (Accordion Yapısı) -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
        
        <button class="accordion">📺 Kategoriler</button>
        <div class="panel">
            <div class="drawer-item" onclick="loadList('categories/news.m3u', 'Haberler', this)">📰 Haberler</div>
            <div class="drawer-item" onclick="loadList('categories/movies.m3u', 'Filmler', this)">🎬 Filmler</div>
            <div class="drawer-item" onclick="loadList('categories/sports.m3u', 'Spor', this)">⚽ Spor</div>
            <div class="drawer-item" onclick="loadList('categories/music.m3u', 'Müzik', this)">🎵 Müzik</div>
            <div class="drawer-item" onclick="loadList('categories/documentary.m3u', 'Belgesel', this)">🌍 Belgesel</div>
        </div>

        <button class="accordion">🗣️ Diller</button>
        <div class="panel">
            <div class="drawer-item" onclick="loadList('languages/eng.m3u', 'İngilizce', this)">🇬🇧 İngilizce</div>
            <div class="drawer-item" onclick="loadList('languages/ara.m3u', 'Arapça', this)">🇸🇦 Arapça</div>
            <div class="drawer-item" onclick="loadList('languages/tur.m3u', 'Türkçe', this)">🇹🇷 Türkçe</div>
            <div class="drawer-item" onclick="loadList('languages/deu.m3u', 'Almanca', this)">🇩🇪 Almanca</div>
            <div class="drawer-item" onclick="loadList('languages/fra.m3u', 'Fransızca', this)">🇫🇷 Fransızca</div>
        </div>

        <button class="accordion">🌍 Ülkeler</button>
        <div class="panel" id="countriesPanel">
            <!-- JavaScript ile dinamik ve sıralı doldurulacak -->
        </div>

    </aside>

    <!-- Ana Akış -->
    <main class="main-layout">
        
        <!-- Video Oynatıcı (Sticky & Sınırlandırılmış Yükseklik) -->
        <section class="player-section">
            <div class="video-container">
                <video id="videoPlayer" controls></video>
                <div id="errorOverlay" class="error-overlay hidden">
                    <span style="font-size: 3rem; margin-bottom: 10px;">⚠️</span>
                    <p style="color: #ff4444; font-size: 1.2rem; font-weight: 500;">Yayın çevrimdışı veya link ölü.</p>
                </div>
            </div>
            <div class="player-info">
                <img id="currentLogo" src="https://via.placeholder.com/50x50/212121/aaaaaa?text=TV" alt="Logo">
                <div class="player-title">
                    <h2 id="currentTitle">İzlemek için bir kanal seçin</h2>
                    <p id="currentCategory">Global Yayın Ağı</p>
                </div>
            </div>
        </section>

        <!-- Kanallar Liste Alanı -->
        <section class="content-section">
            <div id="statusMessage" class="status-message">
                Lütfen menüden bir ülke veya kategori seçin.
            </div>
            <div class="channels-list" id="channelsList">
                <!-- Kanallar buraya zarif satırlar olarak basılacak -->
            </div>
        </section>

    </main>

    <!-- ==========================================================================
         2. UYGULAMA MANTIĞI VE HLS MOTORU (VibeCoder Özel Mimarisi)
         ========================================================================== -->
    <script>
        const BASE_URL = 'https://iptv-org.github.io/iptv/';
        const FALLBACK_LOGO = 'https://via.placeholder.com/300x168/212121/aaaaaa?text=Watch+TV';
        
        // Kapsamlı Ülke Veritabanı
        const COUNTRY_DB = [
            { code: 'tr', name: '🇹🇷 Türkiye' },
            { code: 'us', name: '🇺🇸 Amerika Birleşik Devletleri' },
            // Avrupa Ülkeleri
            { code: 'de', name: '🇩🇪 Almanya' },
            { code: 'at', name: '🇦🇹 Avusturya' },
            { code: 'be', name: '🇧🇪 Belçika' },
            { code: 'gb', name: '🇬🇧 Birleşik Krallık (İngiltere)' },
            { code: 'bg', name: '🇧🇬 Bulgaristan' },
            { code: 'cz', name: '🇨🇿 Çekya' },
            { code: 'dk', name: '🇩🇰 Danimarka' },
            { code: 'fi', name: '🇫🇮 Finlandiya' },
            { code: 'fr', name: '🇫🇷 Fransa' },
            { code: 'nl', name: '🇳🇱 Hollanda' },
            { code: 'ie', name: '🇮🇪 İrlanda' },
            { code: 'es', name: '🇪🇸 İspanya' },
            { code: 'se', name: '🇸🇪 İsveç' },
            { code: 'ch', name: '🇨🇭 İsviçre' },
            { code: 'it', name: '🇮🇹 İtalya' },
            { code: 'no', name: '🇳🇴 Norveç' },
            { code: 'pl', name: '🇵🇱 Polonya' },
            { code: 'pt', name: '🇵🇹 Portekiz' },
            { code: 'ro', name: '🇷🇴 Romanya' },
            { code: 'ru', name: '🇷🇺 Rusya' },
            { code: 'gr', name: '🇬🇷 Yunanistan' },
            // Arap Ülkeleri
            { code: 'ae', name: '🇦🇪 Birleşik Arap Emirlikleri' },
            { code: 'dz', name: '🇩🇿 Cezayir' },
            { code: 'ma', name: '🇲🇦 Fas' },
            { code: 'iq', name: '🇮🇶 Irak' },
            { code: 'qa', name: '🇶🇦 Katar' },
            { code: 'kw', name: '🇰🇼 Kuveyt' },
            { code: 'lb', name: '🇱🇧 Lübnan' },
            { code: 'eg', name: '🇪🇬 Mısır' },
            { code: 'sa', name: '🇸🇦 Suudi Arabistan' },
            { code: 'tn', name: '🇹🇳 Tunus' },
            { code: 'jo', name: '🇯🇴 Ürdün' }
        ];

        // DOM Elementleri
        const menuBtn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const drawerOverlay = document.getElementById('drawerOverlay');
        const countriesPanel = document.getElementById('countriesPanel');
        const channelsList = document.getElementById('channelsList');
        const statusMessage = document.getElementById('statusMessage');
        const searchInput = document.getElementById('searchInput');
        const logoBtn = document.getElementById('logoBtn');
        
        const videoPlayer = document.getElementById('videoPlayer');
        const errorOverlay = document.getElementById('errorOverlay');
        const currentTitle = document.getElementById('currentTitle');
        const currentCategory = document.getElementById('currentCategory');
        const currentLogo = document.getElementById('currentLogo');

        let currentChannels = [];
        let hlsInstance = null;
        let activeFilterName = "";

        // Uygulama Başlatıcı
        function initApp() {
            populateCountriesDrawer();
            setupAccordions();
            setupEventListeners();
            
            // Başlangıçta Türkiye Listesini Yükle (Sahte bir 'this' bağlamıyla)
            const fakeDrawerItem = document.createElement('div');
            loadList('countries/tr.m3u', 'Türkiye', fakeDrawerItem);
        }

        // Accordion (Açılır Menü) Mantığı
        function setupAccordions() {
            const accordions = document.querySelectorAll('.accordion');
            accordions.forEach(acc => {
                acc.addEventListener('click', function() {
                    // Diğerlerini kapatma (opsiyonel, istersen eklenebilir. Şu an bağımsız çalışıyor)
                    this.classList.toggle('active');
                    const panel = this.nextElementSibling;
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        // ScrollHeight dinamik olduğu için yüksekliği yeterli seviyede veriyoruz
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                });
            });
        }

        // Ülkeleri Hamburger Menüye Doldur
        function populateCountriesDrawer() {
            // Alfabetik sıralama (isim bazında)
            COUNTRY_DB.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
            
            COUNTRY_DB.forEach(country => {
                const div = document.createElement('div');
                div.className = 'drawer-item';
                div.textContent = country.name;
                div.onclick = function() {
                    loadList(`countries/${country.code}.m3u`, country.name.split(' ')[1] || country.name, this);
                };
                countriesPanel.appendChild(div);
            });
        }

        // Olay Dinleyicileri
        function setupEventListeners() {
            menuBtn.onclick = toggleDrawer;
            drawerOverlay.onclick = toggleDrawer;

            logoBtn.onclick = () => {
                window.scrollTo(0,0);
            };

            // Arama Motoru
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase('tr');
                if(!currentChannels.length) return;
                
                const filtered = currentChannels.filter(c => c.name.toLowerCase('tr').includes(term));
                renderListView(filtered);
            });
        }

        function toggleDrawer() {
            drawer.classList.toggle('active');
            drawerOverlay.classList.toggle('active');
        }

        function clearDrawerSelection() {
            document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
        }

        // Listeyi Çek
        async function loadList(endpoint, listName, drawerElement = null) {
            activeFilterName = listName;
            channelsList.innerHTML = '';
            statusMessage.style.display = 'block';
            statusMessage.innerHTML = `<span style="color:var(--text-primary)">${listName}</span> kanalları yükleniyor...`;
            searchInput.value = '';

            if(drawerElement && drawerElement.classList) {
                clearDrawerSelection();
                drawerElement.classList.add('active');
                if (drawer.classList.contains('active')) {
                    toggleDrawer(); // Listeyi seçince menüyü kapat
                }
            }

            try {
                const response = await fetch(BASE_URL + endpoint);
                if (!response.ok) throw new Error("Liste bulunamadı");
                
                const m3uText = await response.text();
                currentChannels = parseM3U(m3uText);
                
                if(currentChannels.length === 0) {
                    statusMessage.innerHTML = 'Bu kategoride aktif kanal bulunamadı.';
                } else {
                    statusMessage.style.display = 'none';
                    renderListView(currentChannels);
                }
            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = 'Listeye ulaşılamadı. Lütfen başka bir kategori seçin.';
            }
        }

        // M3U Ayrıştırıcı
        function parseM3U(m3uText) {
            const lines = m3uText.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';
                    const nameMatch = line.split(',');
                    currentChannel.name = nameMatch.length > 1 ? nameMatch[1].trim() : 'Bilinmeyen Kanal';
                } else if (line !== '' && !line.startsWith('#')) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        channels.push({...currentChannel});
                    }
                    currentChannel = {};
                }
            }
            return channels;
        }

        // Şık Liste Görünümüne (List View) Veri Basma
        function renderListView(channels) {
            channelsList.innerHTML = '';
            
            channels.forEach(channel => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                
                const imgUrl = channel.logo || FALLBACK_LOGO;
                
                row.innerHTML = `
                    <div class="row-thumbnail">
                        <img src="${imgUrl}" alt="Logo" onerror="this.src='${FALLBACK_LOGO}'">
                    </div>
                    <div class="row-info">
                        <h3>${channel.name}</h3>
                    </div>
                    <div class="row-action">▶</div>
                `;

                row.onclick = () => playChannel(channel);
                channelsList.appendChild(row);
            });
        }

        // HLS.js Motoru
        function playChannel(channel) {
            currentTitle.textContent = channel.name;
            currentCategory.textContent = activeFilterName;
            currentLogo.src = channel.logo || FALLBACK_LOGO;
            currentLogo.onerror = function() { this.src = FALLBACK_LOGO; };
            errorOverlay.classList.add('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = channel.url;
                videoPlayer.play().catch(e => console.log("Oynatma hatası", e));
            } else if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxMaxBufferLength: 20,
                    liveSyncDurationCount: 3
                });
                
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(videoPlayer);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlayer.play().catch(e => console.log("Otomatik oynatma engellendi", e));
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                            case Hls.ErrorTypes.MEDIA_ERROR:
                            default:
                                errorOverlay.classList.remove('hidden');
                                hlsInstance.destroy();
                                break;
                        }
                    }
                });
            } else {
                alert("Tarayıcınız bu video formatını desteklemiyor.");
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>

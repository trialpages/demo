<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch TV - Global Canlı Yayın Merkezi</title>
    
    <!-- HLS.js Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* ==========================================================================
           1. MODERN YOUTUBE-STYLE CSS MİMARİSİ
           ========================================================================== */
        :root {
            --bg-main: #0f0f0f;
            --bg-secondary: #212121;
            --bg-hover: #3d3d3d;
            --accent: #ff0000;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --border-color: #3f3f3f;
            --nav-height: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* --- Navbar / Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .hamburger:hover {
            background-color: var(--bg-hover);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .logo-icon {
            background-color: var(--accent);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .search-container {
            display: flex;
            flex: 1;
            max-width: 600px;
            margin: 0 20px;
        }

        .search-container input {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .search-container input:focus {
            border-color: #1c62b9; /* YouTube Mavi Focus */
        }

        /* --- Drawer / Hamburger Menü --- */
        .drawer-overlay {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            width: 100vw;
            height: calc(100vh - var(--nav-height));
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: var(--nav-height);
            left: -250px;
            width: 240px;
            height: calc(100vh - var(--nav-height));
            background-color: var(--bg-secondary);
            z-index: 95;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding-top: 12px;
        }

        .drawer.active {
            left: 0;
        }

        .drawer-section {
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .drawer-title {
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .drawer-item {
            padding: 12px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .drawer-item:hover, .drawer-item.active {
            background-color: var(--bg-hover);
        }

        /* --- Ana İçerik Düzeni --- */
        .main-layout {
            margin-top: var(--nav-height);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- Video Oynatıcı Alanı --- */
        .player-section {
            width: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: var(--nav-height);
            z-index: 40;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .video-container {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            position: relative;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }

        .error-overlay.hidden {
            display: none;
        }

        .player-info {
            width: 100%;
            max-width: 1280px;
            padding: 16px;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .player-info img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--bg-secondary);
            object-fit: contain;
            padding: 4px;
        }

        .player-title h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .player-title p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* --- Etiketler / Ülkeler (Chips) --- */
        .chips-container {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            gap: 12px;
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            scrollbar-width: none; /* Firefox */
        }
        
        .chips-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .chip {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s, color 0.2s;
            border: 1px solid transparent;
        }

        .chip:hover {
            background-color: var(--bg-hover);
        }

        .chip.active {
            background-color: var(--text-primary);
            color: var(--bg-main);
        }

        /* --- Grid (Kanallar) --- */
        .content-section {
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background-color: var(--bg-main);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.2s;
        }

        .channel-card:hover {
            transform: scale(1.02);
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-thumbnail img {
            max-width: 60%;
            max-height: 60%;
            object-fit: contain;
        }

        .card-info {
            display: flex;
            gap: 12px;
            padding: 0 4px;
        }

        .card-info h3 {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- Responsive Tasarım --- */
        @media (max-width: 768px) {
            .search-container {
                display: none; /* Mobilde arama ikonuna dönüştürülebilir, şimdilik gizli/sade */
            }
            .player-section {
                /* Mobilde video ekranın üstünde kalır */
                position: sticky;
                top: var(--nav-height);
            }
        }
    </style>
</head>
<body>

    <!-- Üst Navigasyon -->
    <header>
        <div class="header-left">
            <button class="hamburger" id="menuBtn">☰</button>
            <div class="logo" id="logoBtn">
                <span class="logo-icon">▶</span> Watch TV
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Seçili listede kanal ara..." autocomplete="off">
        </div>
        <div style="width: 24px;"></div> <!-- Dengeleyici boşluk -->
    </header>

    <!-- Yan Menü (Kategoriler & Diller) -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-section">
            <div class="drawer-title">Kategoriler</div>
            <div class="drawer-item" onclick="loadList('categories/news.m3u', 'Haberler', this)">📰 Haberler</div>
            <div class="drawer-item" onclick="loadList('categories/movies.m3u', 'Filmler', this)">🎬 Filmler</div>
            <div class="drawer-item" onclick="loadList('categories/sports.m3u', 'Spor', this)">⚽ Spor</div>
            <div class="drawer-item" onclick="loadList('categories/music.m3u', 'Müzik', this)">🎵 Müzik</div>
            <div class="drawer-item" onclick="loadList('categories/kids.m3u', 'Çocuk', this)">🧸 Çocuk</div>
            <div class="drawer-item" onclick="loadList('categories/documentary.m3u', 'Belgesel', this)">🌍 Belgesel</div>
        </div>
        <div class="drawer-section">
            <div class="drawer-title">Diller</div>
            <div class="drawer-item" onclick="loadList('languages/eng.m3u', 'İngilizce', this)">🇬🇧 İngilizce</div>
            <div class="drawer-item" onclick="loadList('languages/ara.m3u', 'Arapça', this)">🇸🇦 Arapça</div>
            <div class="drawer-item" onclick="loadList('languages/fas.m3u', 'Farsça', this)">🇮🇷 Farsça</div>
            <div class="drawer-item" onclick="loadList('languages/tur.m3u', 'Türkçe', this)">🇹🇷 Türkçe</div>
            <div class="drawer-item" onclick="loadList('languages/rus.m3u', 'Rusça', this)">🇷🇺 Rusça</div>
        </div>
    </aside>

    <!-- Ana Akış -->
    <main class="main-layout">
        
        <!-- Video Oynatıcı (Sticky) -->
        <section class="player-section">
            <div class="video-container">
                <video id="videoPlayer" controls></video>
                <div id="errorOverlay" class="error-overlay hidden">
                    <span style="font-size: 3rem; margin-bottom: 10px;">⚠️</span>
                    <p style="color: #ff4444; font-size: 1.2rem; font-weight: 500;">Yayın çevrimdışı veya link ölü.</p>
                </div>
            </div>
            <div class="player-info">
                <img id="currentLogo" src="https://via.placeholder.com/50x50/212121/aaaaaa?text=TV" alt="Logo">
                <div class="player-title">
                    <h2 id="currentTitle">İzlemek için bir kanal seçin</h2>
                    <p id="currentCategory">Global Yayın Ağı</p>
                </div>
            </div>
        </section>

        <!-- Ülkeler Çubuğu -->
        <nav class="chips-container" id="countriesBar">
            <!-- JavaScript ile doldurulacak -->
        </nav>

        <!-- Kanallar Grid Alanı -->
        <section class="content-section">
            <div id="statusMessage" class="status-message">
                Lütfen üstten bir ülke veya soldaki menüden kategori seçin.
            </div>
            <div class="channels-grid" id="channelsGrid">
                <!-- Kanallar buraya basılacak -->
            </div>
        </section>

    </main>

    <!-- ==========================================================================
         2. UYGULAMA MANTIĞI VE HLS MOTORU (VibeCoder Özel Mimarisi)
         ========================================================================== -->
    <script>
        // Yapılandırma ve Veritabanı
        const BASE_URL = 'https://iptv-org.github.io/iptv/';
        const FALLBACK_LOGO = 'https://via.placeholder.com/300x168/212121/aaaaaa?text=Watch+TV';
        
        // Stabilite için statik ülke listesi (En çok izlenenler)
        const COUNTRIES = [
            { code: 'tr', name: 'Türkiye' },
            { code: 'us', name: 'Amerika' },
            { code: 'gb', name: 'İngiltere' },
            { code: 'de', name: 'Almanya' },
            { code: 'fr', name: 'Fransa' },
            { code: 'it', name: 'İtalya' },
            { code: 'es', name: 'İspanya' },
            { code: 'ru', name: 'Rusya' },
            { code: 'sa', name: 'Suudi Arabistan' },
            { code: 'ir', name: 'İran' },
            { code: 'az', name: 'Azerbaycan' },
            { code: 'nl', name: 'Hollanda' },
            { code: 'gr', name: 'Yunanistan' },
            { code: 'jp', name: 'Japonya' },
            { code: 'kr', name: 'Güney Kore' }
        ];

        // DOM Elementleri
        const menuBtn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const drawerOverlay = document.getElementById('drawerOverlay');
        const countriesBar = document.getElementById('countriesBar');
        const channelsGrid = document.getElementById('channelsGrid');
        const statusMessage = document.getElementById('statusMessage');
        const searchInput = document.getElementById('searchInput');
        const logoBtn = document.getElementById('logoBtn');
        
        const videoPlayer = document.getElementById('videoPlayer');
        const errorOverlay = document.getElementById('errorOverlay');
        const currentTitle = document.getElementById('currentTitle');
        const currentCategory = document.getElementById('currentCategory');
        const currentLogo = document.getElementById('currentLogo');

        // State (Durum) Yönetimi
        let currentChannels = [];
        let hlsInstance = null;
        let activeFilterName = "";

        // Uygulama Başlatıcı
        function initApp() {
            renderCountriesBar();
            setupEventListeners();
            // Varsayılan olarak Türkiye'yi yükle
            loadList('countries/tr.m3u', 'Türkiye', document.querySelector('.chip'));
        }

        // Ülke Butonlarını (Chips) Oluştur
        function renderCountriesBar() {
            countriesBar.innerHTML = '';
            COUNTRIES.forEach(country => {
                const btn = document.createElement('div');
                btn.className = 'chip';
                btn.textContent = country.name;
                btn.onclick = () => {
                    // Aktif stili ayarla
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    clearDrawerSelection();
                    loadList(`countries/${country.code}.m3u`, country.name);
                };
                countriesBar.appendChild(btn);
            });
        }

        // Olay Dinleyicileri (Event Listeners)
        function setupEventListeners() {
            // Hamburger Menü
            menuBtn.onclick = toggleDrawer;
            drawerOverlay.onclick = toggleDrawer;

            // Logoya tıklayınca varsayılana dön
            logoBtn.onclick = () => {
                window.scrollTo(0,0);
                document.querySelector('.chip').click();
            };

            // Arama Motoru (Sadece mevcut liste içinde arar)
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase('tr');
                if(!currentChannels.length) return;
                
                const filtered = currentChannels.filter(c => c.name.toLowerCase('tr').includes(term));
                renderGrid(filtered);
            });
        }

        // Çekmeceyi Aç/Kapat
        function toggleDrawer() {
            drawer.classList.toggle('active');
            drawerOverlay.classList.toggle('active');
        }

        // Menü seçimlerini temizle
        function clearDrawerSelection() {
            document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
        }
        function clearChipsSelection() {
            document.querySelectorAll('.chip').forEach(el => el.classList.remove('active'));
        }

        // Listeyi Çek ve Parse Et
        async function loadList(endpoint, listName, drawerElement = null) {
            // UI Güncellemeleri
            activeFilterName = listName;
            channelsGrid.innerHTML = '';
            statusMessage.style.display = 'block';
            statusMessage.innerHTML = `<span style="color:var(--text-primary)">${listName}</span> kanalları yükleniyor...`;
            searchInput.value = '';

            if(drawerElement) {
                clearChipsSelection();
                clearDrawerSelection();
                drawerElement.classList.add('active');
                toggleDrawer(); // Mobilde menüyü kapat
            }

            try {
                const response = await fetch(BASE_URL + endpoint);
                if (!response.ok) throw new Error("Liste bulunamadı");
                
                const m3uText = await response.text();
                currentChannels = parseM3U(m3uText);
                
                if(currentChannels.length === 0) {
                    statusMessage.innerHTML = 'Bu kategoride kanal bulunamadı.';
                } else {
                    statusMessage.style.display = 'none';
                    renderGrid(currentChannels);
                }
            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = 'Listeye ulaşılamadı. Lütfen başka bir kategori seçin.';
            }
        }

        // M3U Ayrıştırıcı (Parser)
        function parseM3U(m3uText) {
            const lines = m3uText.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';

                    const nameMatch = line.split(',');
                    currentChannel.name = nameMatch.length > 1 ? nameMatch[1].trim() : 'Bilinmeyen Kanal';
                } else if (line !== '' && !line.startsWith('#')) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        channels.push({...currentChannel});
                    }
                    currentChannel = {};
                }
            }
            return channels;
        }

        // Grid (Izgara) Sistemine Veri Basma
        function renderGrid(channels) {
            channelsGrid.innerHTML = '';
            
            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                
                // Güvenli Logo Fallback Mimarisi
                const imgUrl = channel.logo || FALLBACK_LOGO;
                
                card.innerHTML = `
                    <div class="card-thumbnail">
                        <img src="${imgUrl}" alt="${channel.name}" onerror="this.src='${FALLBACK_LOGO}'">
                    </div>
                    <div class="card-info">
                        <h3>${channel.name}</h3>
                    </div>
                `;

                card.onclick = () => playChannel(channel);
                channelsGrid.appendChild(card);
            });
        }

        // HLS.js Video Oynatma Motoru
        function playChannel(channel) {
            // Görsel Güncellemeler
            currentTitle.textContent = channel.name;
            currentCategory.textContent = activeFilterName;
            currentLogo.src = channel.logo || FALLBACK_LOGO;
            currentLogo.onerror = function() { this.src = FALLBACK_LOGO; };
            errorOverlay.classList.add('hidden');

            // Scroll to top (Mobilde izlemeyi kolaylaştırmak için)
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            // Safari (Yerel HLS desteği)
            if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = channel.url;
                videoPlayer.play().catch(e => console.log("Oynatma hatası", e));
            } 
            // Modern Tarayıcılar (HLS.js)
            else if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxMaxBufferLength: 20,
                    liveSyncDurationCount: 3
                });
                
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(videoPlayer);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoPlayer.play().catch(e => console.log("Otomatik oynatma engellendi", e));
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                errorOverlay.classList.remove('hidden');
                                hlsInstance.destroy();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                errorOverlay.classList.remove('hidden');
                                hlsInstance.destroy();
                                break;
                        }
                    }
                });
            } else {
                alert("Tarayıcınız bu video formatını desteklemiyor.");
            }
        }

        // Sistemi Başlat
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>

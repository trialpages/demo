<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İhtisas Dergisi - Profesyonel Dizgi Paneli V6</title>
    
    <script>
        window.PagedConfig = { auto: false };
    </script>
    <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>

    <script>
        class CustomMagazineHandler extends Paged.Handler {
            constructor(chunker, polisher, caller) { super(chunker, polisher, caller); }

            afterRendered(pages) {
                const tocLinks = document.querySelectorAll('.toc-item-link');
                tocLinks.forEach(link => {
                    const targetId = link.getAttribute('href').replace('#', '');
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        const page = targetElement.closest('.pagedjs_page');
                        if (page) {
                            const pageNumber = page.getAttribute('data-page-number');
                            link.querySelector('.toc-page-num').innerText = pageNumber;
                        }
                    }
                });

                const btnHtml = `
                    <div id="ui-controls" style="display:block; position:fixed; bottom:20px; right:20px; z-index:99999; background:#fff; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.4); border-radius:8px; border-left:5px solid #27ae60; text-align:center;">
                        <p style="margin: 0 0 10px 0; font-weight: bold; color: #333; font-family: sans-serif; font-size: 14px;">Dizgi Tamamlandı</p>
                        <button onclick="window.print()" style="background: #2c241e; color: white; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 4px; width: 100%; font-weight: bold; transition: 0.3s;">🖨️ PDF Olarak İndir</button>
                        <span style="font-size: 11px; color: #666; margin-top: 8px; display: block; font-family: sans-serif;">(Açılan ekranda 'PDF Olarak Kaydet'i seçiniz)</span>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', btnHtml);
            }
        }
        Paged.registerHandlers(CustomMagazineHandler);
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        /* --- ARAYÜZ --- */
        body { margin: 0; background-color: #fdfbf7; font-family: 'Merriweather', serif; color: #1a1a1a; }
        
        #login-screen, #loading-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #2c241e 0%, #1a1511 100%); color: #f4f1ea; }
        #login-screen h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 5px; }
        .login-form { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; margin-top: 20px;}
        .login-form input { padding: 14px; border: none; border-radius: 4px; font-family: inherit; font-size: 15px; }
        .login-form button { background-color: #c8b9a6; color: #2c241e; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #loading-screen { display: none; background: #fdfbf7; color: #1a1511; font-family: 'Playfair Display', serif; font-size: 20pt; text-align: center; }

        @media print {
            #ui-controls, #login-screen, #loading-screen { display: none !important; }
        }

        /* --- MİZANPAJ AYARLARI --- */
        /* İç sayfalar için krem zemin rengi */
        .pagedjs_page { background-color: #fdfbf7 !important; }

        /* Kapak sayfasının zemin rengini iptal et (Görsel tam çıksın) */
        .pagedjs_page:first-of-type { background-color: #fff !important; }

        @page { 
            size: A4; 
            margin: 25mm 22mm; 
            @top-center { 
                content: "İHTİSAS DERGİSİ • SAYI: 1 • NİSAN 2026"; 
                font-family: 'Merriweather', serif; 
                font-size: 8pt; 
                color: #888; 
                letter-spacing: 2px; 
            }
            @bottom-center { 
                content: counter(page); 
                font-family: 'Merriweather', serif; 
                font-size: 10pt; 
                color: #333; 
            } 
        }
        
        @page:first { @top-center { content: none; } @bottom-center { content: none; } margin: 0; }
        @page:nth(2) { @top-center { content: none; } @bottom-center { content: none; } }

        /* 1. KAPAK SAYFASI - Görsel Geri Getirildi */
        .cover-page { position: relative; height: 100vh; overflow: hidden; page-break-after: always; text-align: center; background-color: #000; }
        .cover-bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.4); }
        .cover-content { position: relative; z-index: 2; color: #f9f6f0; height: 100%; display: flex; flex-direction: column; padding: 60px 40px; box-sizing: border-box; }
        
        .cover-header { margin-top: 10vh; }
        .cover-header h1 { font-family: 'Playfair Display', serif; font-size: 80pt; margin: 0; letter-spacing: 10px; font-weight: 700; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .cover-header h2 { font-size: 18pt; font-weight: 300; margin-top: 20px; letter-spacing: 4px; border-top: 1px solid rgba(200,185,166,0.5); padding-top: 20px; color: #c8b9a6; }
        
        .issue-info { position: absolute; top: 40px; right: 40px; font-size: 14pt; font-family: 'Playfair Display', serif; font-style: italic; color: #c8b9a6; }
        
        .cover-highlights { margin-top: auto; align-self: flex-end; text-align: right; max-width: 65%; border-right: 4px solid #c8b9a6; padding-right: 20px; margin-bottom: 50px; }
        .cover-highlights h3 { margin: 0 0 15px 0; font-family: 'Playfair Display', serif; font-size: 14pt; color: #c8b9a6; letter-spacing: 2px; text-transform: uppercase; }
        .cover-highlight-item { font-size: 13pt; margin-bottom: 10px; line-height: 1.4; font-style: italic; }

        /* 2. JENERİK */
        .colophon-page { height: 100vh; page-break-after: always; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; padding: 40mm 20mm; }
        .c-logo { font-family: 'Playfair Display', serif; font-size: 45pt; color: #1a1511; margin: 0; line-height: 1; letter-spacing: 4px; }
        .c-sublogo { font-size: 11pt; color: #555; text-transform: uppercase; letter-spacing: 3px; margin-top: 10px; }
        .masthead-stack { margin: 40px 0; border-top: 1px solid #d5d0c8; border-bottom: 1px solid #d5d0c8; padding: 35px 0; width: 70%; display: flex; flex-direction: column; gap: 25px; }
        .m-item { font-size: 11pt; color: #333; line-height: 1.5; }
        .m-item strong { display: block; font-family: 'Playfair Display', serif; font-size: 14pt; color: #1a1511; letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }
        .c-footer { margin-top: 20px; font-size: 10pt; line-height: 1.8; color: #666; }
        .c-location { margin-top: 30px; font-family: 'Playfair Display', serif; font-size: 16pt; font-weight: bold; color: #1a1511; }

        /* 3. İÇİNDEKİLER */
        .toc-page { padding-top: 20px; page-break-after: always; }
        .toc-page h2 { font-family: 'Playfair Display', serif; font-size: 32pt; text-align: center; margin-bottom: 50px; color: #1a1511; letter-spacing: 2px; }
        .toc-item-link { display: flex; align-items: baseline; text-decoration: none; color: inherit; margin-bottom: 18px; width: 100%; }
        .toc-text-block { max-width: 80%; }
        .toc-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14pt; color: #2c241e; line-height: 1.4; display: block; }
        .toc-author { font-style: italic; font-size: 11pt; color: #666; }
        .toc-leader { flex-grow: 1; border-bottom: 2px dotted #aaa; margin: 0 15px; position: relative; top: -4px; }
        .toc-page-num { font-family: 'Playfair Display', serif; font-size: 16pt; font-weight: bold; color: #1a1511; }

        /* 4. MAKALELER */
        .article { page-break-before: always; }
        .article-header { text-align: center; margin-bottom: 40px; column-span: all; padding: 0 15mm; }
        .article-category { display: inline-block; font-family: sans-serif; font-size: 9pt; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #777; border-top: 1px solid #777; border-bottom: 1px solid #777; padding: 4px 0; margin-bottom: 20px; }
        .article-title { font-family: 'Playfair Display', serif; font-size: 28pt; margin: 0 0 15px 0; color: #1a1511; line-height: 1.25; }
        .article-author { font-size: 14pt; font-style: italic; color: #444; }
        .article-image { width: 100%; max-height: 350px; object-fit: cover; margin-bottom: 30px; column-span: all; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .article-content { column-count: 2; column-gap: 12mm; text-align: justify; font-size: 10.5pt; color: #111; line-height: 1.7; }
        .article-content p { margin: 0 0 12px 0; text-indent: 15px; }
        .article-content p:first-of-type { text-indent: 0; }
        .article-content p:first-of-type::first-letter { float: left; font-size: 48pt; line-height: 40pt; padding-right: 10px; margin-top: 4px; font-family: 'Playfair Display', serif; color: #2c241e; font-weight: bold; }
        .pull-quote { column-span: all; font-family: 'Playfair Display', serif; font-size: 16pt; font-style: italic; color: #4a3b32; text-align: center; margin: 30px 10%; padding: 20px 0; border-top: 3px solid #c8b9a6; border-bottom: 3px solid #c8b9a6; line-height: 1.5; }

        #magazine-wrapper { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>İHTİSAS Paneli</h1>
        <div class="login-form">
            <input type="email" id="email" placeholder="E-posta Adresi" required>
            <input type="password" id="password" placeholder="Parola" required>
            <button id="loginBtn">Sisteme Giriş Yap</button>
        </div>
        <p id="login-error" style="color: #ffcccc; margin-top: 15px; display: none; text-align: center;"></p>
    </div>

    <div id="loading-screen">Dizgi Hazırlanıyor...</div>

    <div id="magazine-wrapper">
        <div class="cover-page">
            <img class="cover-bg-image" src="https://images.unsplash.com/photo-1568667256549-094345857637?w=1000&auto=format&fit=crop&q=80" alt="Kapak Görseli">
            <div class="cover-content">
                <div class="issue-info" id="issue-date-cover">Nisan 2026 • İzmir</div>
                <div class="cover-header">
                    <h1>İHTİSAS</h1>
                    <h2>İLMÎ, FİKRÎ, EDEBÎ, SİYASÎ DERGİ</h2>
                </div>
                <div class="cover-highlights" id="cover-highlights">
                    <h3>Bu Sayıda</h3>
                </div>
            </div>
        </div>

        <div class="colophon-page">
            <h1 class="c-logo">İHTİSAS</h1>
            <div class="masthead-stack">
                <div class="m-item"><strong>İmtiyaz Sahibi</strong>Ahmet Yasin</div>
                <div class="m-item"><strong>Sorumlu Müdür</strong>Yasin Hocaoğlu</div>
                <div class="m-item"><strong>İletişim</strong>ihtisasdergi.web.app</div>
            </div>
            <div class="c-location">İZMİR • NİSAN 2026</div>
        </div>

        <div class="toc-page">
            <h2>İçindekiler</h2>
            <div id="toc-container"></div>
        </div>

        <div id="articles-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhQPJiplyKn5hQQY3ZAWrEwU4n8NdEx2w",
            authDomain: "ihtisasdergi.firebaseapp.com",
            projectId: "ihtisasdergi",
            storageBucket: "ihtisasdergi.firebasestorage.app",
            messagingSenderId: "791201866171",
            appId: "1:791201866171:web:9db75d685b6b02dddca49e",
            measurementId: "G-KCV9BBMQ6E"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function formatContent(text) {
            if (!text) return "";
            let isHtml = text.includes('<p>');
            let rawParagraphs = isHtml ? text.match(/<p>(.*?)<\/p>/g).map(p => p.replace(/<\/?p>/g, '')) : text.split('\n').filter(p => p.trim() !== '');
            let formatted = [];
            let pullQuoteInserted = false;
            for (let i = 0; i < rawParagraphs.length; i++) {
                let pText = rawParagraphs[i].trim();
                if (!pullQuoteInserted && i >= 2 && i <= 4 && pText.length > 100) {
                    formatted.push(`<div class="pull-quote">“${pText.split('. ')[0]}.”</div>`);
                    pullQuoteInserted = true;
                }
                formatted.push(`<p>${pText}</p>`);
            }
            return formatted.join('');
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(() => {
                document.getElementById('login-error').style.display = 'block';
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'flex';
                buildMagazine();
            }
        });

        async function buildMagazine() {
            try {
                const q = query(collection(db, "articles"), orderBy("date", "desc")); 
                const querySnapshot = await getDocs(q);
                let articles = [];
                querySnapshot.forEach(doc => articles.push(doc.data()));

                articles.slice(0, 3).forEach(art => {
                    document.getElementById('cover-highlights').innerHTML += `<div class="cover-highlight-item">${art.title}</div>`;
                });

                articles.forEach((data, index) => {
                    const articleId = `article-${index}`;
                    document.getElementById('toc-container').innerHTML += `
                        <a href="#${articleId}" class="toc-item-link">
                            <div class="toc-text-block"><span class="toc-title">${data.title}</span><span class="toc-author">${data.author || 'Yazar'}</span></div>
                            <div class="toc-leader"></div><div class="toc-page-num">...</div>
                        </a>`;
                    document.getElementById('articles-container').innerHTML += `
                        <div class="article" id="${articleId}">
                            <div class="article-header"><div class="article-category">${data.category || 'ARAŞTIRMA'}</div><h1 class="article-title">${data.title}</h1><div class="article-author">${data.author || 'Yazar'}</div></div>
                            ${data.image ? `<img src="${data.image}" class="article-image">` : ''}
                            <div class="article-content">${formatContent(data.content)}</div>
                        </div>`;
                });

                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('magazine-wrapper').style.display = 'block';
                await window.PagedPolyfill.preview();
            } catch (error) { console.error(error); }
        }
    </script>
</body>
</html>

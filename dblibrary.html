<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Risaleler Kütüphanesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3f66;
            --primary-brown: #8b4513;
            --bg-beige: #f5f5dc;
            --text-dark: #333;
            --white: #fff;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-beige);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        h1, h2, h3, .serif {
            font-family: 'Merriweather', serif;
        }

        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Kitap Grid */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .book-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .book-cover {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-bottom: 3px solid var(--primary-brown);
        }

        .book-info-card {
            padding: 1.5rem 1rem;
        }

        .book-title-card {
            color: var(--primary-blue);
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
        }

        /* Detay Sayfası (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-beige);
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem;
            color: var(--primary-brown);
            cursor: pointer;
            border: none;
            background: none;
        }

        .book-detail-header {
            display: flex;
            padding: 2rem;
            background: var(--white);
            border-bottom: 2px solid #e0e0e0;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .detail-cover {
            width: 200px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .detail-meta {
            flex: 1;
        }

        .detail-title {
            color: var(--primary-blue);
            margin-top: 0;
        }

        .meta-item {
            margin-bottom: 0.5rem;
            color: #555;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--primary-brown);
            color: var(--white);
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background-color: #6b3410;
        }

        /* Yorum Alanı */
        .comments-section {
            padding: 2rem;
        }

        .comment-form {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .submit-btn {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .comment-item {
            background: var(--white);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-brown);
        }

        .comment-author {
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="margin: 0; font-size: 2.5rem;">Dijital Risaleler</h1>
        <p style="font-weight: 300; letter-spacing: 1px;">Toplumsal Meselelere Akademik ve Şeffaf Yaklaşımlar</p>
    </header>

    <div class="container">
        <div class="book-grid" id="bookGrid"></div>
    </div>

    <div class="modal-overlay" id="bookModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            
            <div class="book-detail-header" id="modalHeader">
                </div>

            <div class="comments-section">
                <h3 class="serif" style="color: var(--primary-blue);">Okuyucu Yorumları</h3>
                
                <div class="comment-form">
                    <form id="commentForm">
                        <div class="form-group">
                            <input type="text" id="commentName" placeholder="Adınız Soyadınız" required>
                        </div>
                        <div class="form-group">
                            <textarea id="commentText" rows="4" placeholder="Kitap hakkındaki düşünceleriniz..." required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Yorumu Gönder</button>
                    </form>
                </div>

                <div id="commentsList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ÖRNEK VERİ (Firebase'den çekilecek verinin simülasyonu)
        const sampleBooks = [
            {
                id: 1,
                title: "Modern Çağda İnanç ve Toplum",
                author: "Ahmet",
                publisher: "İhtisas Yayınları",
                date: "Aralık 2025",
                cover: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=400",
                description: "Toplumun güncel dini ve sosyolojik meselelerine akademik bir derinlik ve anlaşılır bir dille yaklaşan, dijital çağın getirdiği savrulmalara karşı sağlam bir zemin arayışı sunan bu risale, modern insanın anlam arayışına ışık tutuyor.",
                fileUrl: "#",
                comments: [
                    { name: "Yusuf K.", text: "Çok ufuk açıcı bir çalışma olmuş, emeğinize sağlık." }
                ]
            }
        ];

        function renderBooks() {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = '';
            
            // Tarihe göre yeniden eskiye sıralama simülasyonu (Veritabanında order by yapılacak)
            sampleBooks.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => openModal(book);
                card.innerHTML = `
                    <img src="${book.cover}" alt="${book.title}" class="book-cover">
                    <div class="book-info-card">
                        <h3 class="book-title-card">${book.title}</h3>
                        <p style="color: #666; font-size: 0.9rem;">${book.author}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(book) {
            const modal = document.getElementById('bookModal');
            const header = document.getElementById('modalHeader');
            const commentsList = document.getElementById('commentsList');

            header.innerHTML = `
                <img src="${book.cover}" alt="${book.title}" class="detail-cover">
                <div class="detail-meta">
                    <h2 class="detail-title">${book.title}</h2>
                    <div class="meta-item"><strong>Yazar:</strong> ${book.author}</div>
                    <div class="meta-item"><strong>Yayınevi:</strong> ${book.publisher}</div>
                    <div class="meta-item"><strong>Yayın Tarihi:</strong> ${book.date}</div>
                    <p style="margin-top: 1rem; line-height: 1.8;">${book.description}</p>
                    <a href="${book.fileUrl}" class="download-btn" target="_blank">📥 Risaleyi İndir (PDF)</a>
                </div>
            `;

            commentsList.innerHTML = book.comments.map(c => `
                <div class="comment-item">
                    <div class="comment-author">${c.name}</div>
                    <div>${c.text}</div>
                </div>
            `).join('');

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookModal').style.display = 'none';
        }

        // Yorum Gönderme Simülasyonu (Firebase eklenecek yer)
        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Yorumunuz alındı. Yönetici onayından sonra yayınlanacaktır.');
            this.reset();
        });

        // Sayfa yüklendiğinde kitapları bas
        window.onload = renderBooks;
    </script>
</body>
</html>

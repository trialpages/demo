<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeCoder P2P Watch & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- Tailwind Şıklığı, Vanilya Hızı --- */
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --chat-me: #e0e7ff;
            --chat-other: #f1f5f9;
            --border: #e2e8f0;
            --radius-md: 0.5rem;
            --radius-xl: 1rem;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            /* Mobilde tarayıcı barlarını hesaba katan dinamik yükseklik (Ders 3) */
            height: 100vh; /* Fallback */
            height: 100dvh; 
            overflow: hidden;
        }

        /* --- Medya Alanı --- */
        #media-container {
            height: 35dvh; /* Mobilde daha fazla yer kalsın diye %35'e çektik */
            min-height: 200px;
            background-color: #000;
            position: relative;
            box-shadow: var(--shadow-md);
            z-index: 10;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: contain; }
        .viewer-mode video { pointer-events: none; } /* İzleyici videoya dokunamaz */

        #no-video-placeholder {
            position: absolute;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.875rem;
            text-align: center;
            pointer-events: none;
        }

        /* --- Uygulama İçi Genel Alan --- */
        #app-container {
            flex: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            overflow: hidden;
            min-height: 0; /* Flex çocuklarının taşmasını engeller */
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .header-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .text-sm { font-size: 0.875rem; color: var(--text-muted); }

        .input-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
        
        input[type="text"] {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border);
            border-radius: var(--radius-md); font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        
        input#input-room-id { text-transform: uppercase; text-align: center; font-weight: bold; letter-spacing: 2px;}

        button {
            width: 100%; padding: 0.75rem 1rem; border: none; border-radius: var(--radius-md);
            background-color: var(--primary); color: white; font-size: 1rem; font-weight: 500;
            cursor: pointer; transition: background-color 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #059669; }
        .btn-outline { background-color: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background-color: var(--chat-me); }

        .hidden { display: none !important; }

        /* KISA KOD GÖSTERİMİ */
        .id-badge {
            background-color: var(--chat-me); padding: 1rem; border-radius: var(--radius-md);
            text-align: center; font-family: monospace; font-size: 2rem; font-weight: bold;
            color: var(--primary); letter-spacing: 4px; margin: 1rem 0;
        }

        /* --- SOHBET VE HOST KONTROL ALANI --- */
        #chat-section {
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
            background-color: var(--surface-color); border: 1px solid var(--border);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-sm);
            min-height: 0;
        }

        #host-dynamic-controls {
            padding: 0.75rem;
            background-color: var(--chat-me);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        #host-dynamic-controls input { padding: 0.5rem; font-size: 0.85rem; }
        #host-dynamic-controls button { padding: 0.5rem; width: auto; font-size: 0.85rem; white-space: nowrap; }

        #chat-messages {
            flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem;
        }

        .chat-bubble {
            max-width: 80%; padding: 0.75rem 1rem; border-radius: 1rem; font-size: 0.95rem; line-height: 1.4;
            word-wrap: break-word;
        }
        .chat-bubble.me {
            background-color: var(--primary); color: white; align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        .chat-bubble.other {
            background-color: var(--chat-other); color: var(--text-main); align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        .chat-system {
            align-self: center; background: none; color: var(--text-muted); font-size: 0.75rem; font-style: italic; padding: 0;
            text-align: center;
        }

        #chat-input-area {
            display: flex; padding: 0.75rem; border-top: 1px solid var(--border); gap: 0.5rem;
            background-color: var(--surface-color);
        }
        #chat-input-area input {
            flex: 1; margin: 0; padding: 0.5rem 1rem; border-radius: 2rem;
        }
        #chat-input-area button {
            width: auto; padding: 0.5rem 1.25rem; border-radius: 2rem;
        }
    </style>
</head>
<body>

    <div id="media-container">
        <span id="no-video-placeholder">Bağlantı kurulduğunda video burada oynatılacak.</span>
        <video id="video-player" playsinline></video> </div>

    <div id="app-container">
        
        <div id="setup-card" class="card">
            <h2 class="header-title">Oda Kur</h2>
            <div class="input-group" style="margin-top: 0;">
                <input type="text" id="initial-video-url" placeholder="Video Linki (.mp4, .m3u8) (İsteğe Bağlı)">
                <button id="btn-create-room">👑 Yeni Oda Kur</button>
            </div>
            
            <div style="text-align: center; margin: 1rem 0; color: var(--text-muted); font-size: 0.875rem;">veya katıl</div>
            
            <h2 class="header-title">Odaya Katıl</h2>
            <div class="input-group" style="margin-top: 0;">
                <input type="text" id="input-room-id" placeholder="5 HARFLİ KOD" maxlength="5">
                <button id="btn-join-room" class="btn-success">🔗 Odaya Katıl</button>
            </div>
            <p id="setup-log" class="text-sm" style="text-align: center; margin-top: 1rem; color: #ef4444;"></p>
        </div>

        <div id="host-card" class="card hidden">
            <h2 class="header-title" style="text-align: center;">Oda Kodun</h2>
            <p class="text-sm" style="text-align: center;">Arkadaşının bağlanması için bu kodu gönder:</p>
            <div id="my-short-code" class="id-badge">...</div>
            <p class="text-sm" style="text-align: center; color: var(--success);">İzleyici bekleniyor...</p>
        </div>

        <div id="chat-section" class="hidden">
            <div id="host-dynamic-controls" class="hidden">
                <input type="text" id="dynamic-video-url" placeholder="Yeni video linki yapıştır...">
                <button id="btn-change-video" class="btn-outline">Yükle</button>
            </div>

            <div id="chat-messages">
                <div class="chat-bubble chat-system">P2P Bağlantı bekleniyor...</div>
            </div>
            <form id="chat-input-area" onsubmit="sendChatMessage(event)">
                <input type="text" id="chat-input" placeholder="Mesaj yaz..." autocomplete="off" required>
                <button type="submit">Gönder</button>
            </form>
        </div>

    </div>

    <script>
        /**
         * VibeCoder P2P Watch & Chat Engine v2.1
         * Mimarî: Dinamik Viewport (100dvh) + Dynamic Media Routing
         */

        const PREFIX = "vbc-watch-";
        let peer = null;
        let connection = null;
        let isHost = false;
        let isSyncing = false; 

        // UI Elementleri
        const video = document.getElementById('video-player');
        const placeholder = document.getElementById('no-video-placeholder');
        const setupCard = document.getElementById('setup-card');
        const hostCard = document.getElementById('host-card');
        const chatSection = document.getElementById('chat-section');
        const myShortCodeDisplay = document.getElementById('my-short-code');
        const inputRoomId = document.getElementById('input-room-id');
        const setupLog = document.getElementById('setup-log');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const mediaContainer = document.getElementById('media-container');
        
        // Dinamik Video Link Elementleri
        const initialVideoUrl = document.getElementById('initial-video-url');
        const hostDynamicControls = document.getElementById('host-dynamic-controls');
        const dynamicVideoUrl = document.getElementById('dynamic-video-url');
        const btnChangeVideo = document.getElementById('btn-change-video');

        function generateShortCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; 
            let result = '';
            for (let i = 0; i < 5; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function showLog(msg) { setupLog.textContent = msg; }

        function appendChat(message, type) {
            const el = document.createElement('div');
            el.className = `chat-bubble ${type}`;
            el.textContent = message;
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight; 
        }

        function switchToChatMode() {
            setupCard.classList.add('hidden');
            hostCard.classList.add('hidden');
            chatSection.classList.remove('hidden');
        }

        // --- VİDEO YÜKLEME YARDIMCISI ---
        function loadVideoSource(url) {
            if(!url) return;
            video.src = url;
            video.load();
            placeholder.classList.add('hidden');
        }

        function sendDataPayload(type, payload) {
            if (connection && connection.open) {
                connection.send({ type: type, payload: payload });
            }
        }

        // --- GELEN VERİ YÖNETİMİ ---
        function handleIncomingData(dataEnvelope) {
            const { type, payload } = dataEnvelope;

            if (type === 'chat') {
                appendChat(payload.text, 'other');
            } 
            else if (type === 'sync') {
                isSyncing = true; 

                // Eğer Host yeni bir video URL'si gönderdiyse (veya ilk bağlantıysa)
                if (payload.action === 'change-url' || payload.action === 'init') {
                    if (payload.url && video.src !== payload.url) {
                        loadVideoSource(payload.url);
                        appendChat(payload.action === 'init' ? "Video senkronize edildi." : "Host videoyu değiştirdi.", "chat-system");
                    }
                }

                if (payload.action !== 'change-url') {
                    if (Math.abs(video.currentTime - payload.time) > 0.5) {
                        video.currentTime = payload.time;
                    }
                    if (payload.isPlaying && video.paused) {
                        video.play().catch(e => appendChat("Video oto-oynatma engellendi, ekrana dokunup oynatın.", "chat-system"));
                    } else if (!payload.isPlaying && !video.paused) {
                        video.pause();
                    }
                }
                
                setTimeout(() => { isSyncing = false; }, 100);
            }
        }

        // --- HOST VİDEO DEĞİŞTİRME TETİKLEYİCİSİ ---
        btnChangeVideo.addEventListener('click', () => {
            const newUrl = dynamicVideoUrl.value.trim();
            if (newUrl) {
                loadVideoSource(newUrl);
                sendDataPayload('sync', { action: 'change-url', url: newUrl });
                appendChat("Yeni video yüklendi ve izleyiciye gönderildi.", "chat-system");
                dynamicVideoUrl.value = ''; // Kutuyu temizle
            }
        });

        // --- HOST MANTIĞI ---
        document.getElementById('btn-create-room').addEventListener('click', () => {
            isHost = true;
            video.setAttribute('controls', 'true'); // Host kontrolleri görebilir
            
            // Eğer kurulum ekranında link girildiyse hemen yükle
            const startUrl = initialVideoUrl.value.trim();
            if(startUrl) loadVideoSource(startUrl);

            showLog("Sunucuya bağlanılıyor...");
            const shortCode = generateShortCode();
            
            peer = new Peer(PREFIX + shortCode);

            peer.on('open', () => {
                setupCard.classList.add('hidden');
                hostCard.classList.remove('hidden');
                myShortCodeDisplay.textContent = shortCode;
            });

            peer.on('connection', (conn) => {
                connection = conn;
                switchToChatMode();
                
                // Host için dinamik video değiştirme barını aktif et
                hostDynamicControls.classList.remove('hidden');
                
                chatMessages.innerHTML = ''; // Bekleme yazısını temizle
                appendChat("İzleyici odaya katıldı! P2P bağlantı güvenli.", "chat-system");
                
                // İzleyici bağlanır bağlanmaz şu anki videoyu ve durumunu gönder (Dinamik Routing)
                sendDataPayload('sync', { action: 'init', url: video.src, time: video.currentTime, isPlaying: !video.paused });
                setupHostVideoListeners();

                connection.on('data', handleIncomingData);
            });

            peer.on('error', (err) => showLog("Bağlantı hatası: " + err.type));
        });

        // --- VİEWER MANTIĞI ---
        document.getElementById('btn-join-room').addEventListener('click', () => {
            const code = inputRoomId.value.trim().toUpperCase();
            if (code.length !== 5) { showLog("Lütfen 5 haneli kodu girin."); return; }

            isHost = false;
            showLog("Oda aranıyor...");
            mediaContainer.classList.add('viewer-mode'); 
            video.removeAttribute('controls'); 

            peer = new Peer(); 

            peer.on('open', () => {
                connection = peer.connect(PREFIX + code);

                connection.on('open', () => {
                    switchToChatMode();
                    chatMessages.innerHTML = '';
                    appendChat("Odaya başarıyla bağlandınız! Video bekleniyor...", "chat-system");
                    
                    connection.on('data', handleIncomingData);
                });

                connection.on('error', () => appendChat("Bağlantı koptu.", "chat-system"));
            });
        });

        function setupHostVideoListeners() {
            video.addEventListener('play', () => {
                if(!isSyncing) sendDataPayload('sync', { action: 'play', time: video.currentTime, isPlaying: true });
            });
            video.addEventListener('pause', () => {
                if(!isSyncing) sendDataPayload('sync', { action: 'pause', time: video.currentTime, isPlaying: false });
            });
            video.addEventListener('seeked', () => {
                if(!isSyncing) sendDataPayload('sync', { action: 'seek', time: video.currentTime, isPlaying: !video.paused });
            });
        }

        window.sendChatMessage = function(e) {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || !connection || !connection.open) return;

            appendChat(text, 'me');
            sendDataPayload('chat', { text: text });
            chatInput.value = '';
            
            // Mobilde klavye açıkken mesaj atınca inputta kalması için odaklamayı yenile
            chatInput.focus(); 
        };

    </script>
</body>
</html>

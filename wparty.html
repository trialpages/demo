<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeCoder P2P Watch & Chat (Ultimate Sürüm)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- Tailwind Şıklığı --- */
        :root {
            --bg-color: #f8fafc; --surface-color: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --primary: #6366f1; --primary-hover: #4f46e5; --success: #10b981; --warning: #f59e0b;
            --chat-me: #e0e7ff; --chat-other: #f1f5f9; --border: #e2e8f0;
            --radius-md: 0.5rem; --radius-xl: 1rem; --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }

        /* --- MEDYA ALANI (Sabit) --- */
        #media-container {
            height: 35dvh; min-height: 200px; flex: 0 0 auto; background-color: #000; position: relative; box-shadow: var(--shadow-md); z-index: 50; display: flex; align-items: center; justify-content: center;
        }

        #native-video-player { width: 100%; height: 100%; object-fit: contain; }
        #yt-player-wrapper { width: 100%; height: 100%; }
        .viewer-mode { pointer-events: none; } 

        #no-video-placeholder { position: absolute; color: rgba(255, 255, 255, 0.5); font-size: 0.875rem; text-align: center; pointer-events: none; padding: 1rem;}

        /* Canlı Yayın (Live) Etiketi */
        #live-badge { position: absolute; top: 10px; left: 10px; background-color: #ef4444; color: white; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: bold; animation: pulse 2s infinite; z-index: 60; display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- UYGULAMA İÇİ GENEL ALAN --- */
        #app-container { flex: 1 1 auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; max-width: 600px; margin: 0 auto; width: 100%; overflow-y: auto; scroll-behavior: smooth; }

        .card { background-color: var(--surface-color); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 1.5rem; box-shadow: var(--shadow-sm); flex-shrink: 0; }
        .header-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .text-sm { font-size: 0.875rem; color: var(--text-muted); }

        .input-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
        input[type="text"] { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        input#input-room-id { text-transform: uppercase; text-align: center; font-weight: bold; letter-spacing: 2px;}

        button { width: 100%; padding: 0.75rem 1rem; border: none; border-radius: var(--radius-md); background-color: var(--primary); color: white; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #059669; }
        .btn-outline { background-color: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-warning { background-color: var(--warning); color: #fff; }
        .btn-warning:hover { background-color: #d97706; }
        
        .hidden { display: none !important; }

        .id-badge { background-color: var(--chat-me); padding: 1rem; border-radius: var(--radius-md); text-align: center; font-family: monospace; font-size: 2rem; font-weight: bold; color: var(--primary); letter-spacing: 4px; margin: 1rem 0; }

        /* --- SOHBET VE KONTROLLER --- */
        #chat-section { display: flex; flex-direction: column; flex: 1; min-height: 300px; background-color: var(--surface-color); border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); overflow: hidden; }
        
        #host-controls-wrapper { display: flex; flex-direction: column; background-color: var(--chat-me); border-bottom: 1px solid var(--border); }
        #host-dynamic-controls { padding: 0.75rem; display: flex; gap: 0.5rem; }
        #host-dynamic-controls input { padding: 0.5rem; font-size: 0.85rem; }
        #host-dynamic-controls button { padding: 0.5rem; width: auto; font-size: 0.85rem; white-space: nowrap; }
        
        #host-stream-controls { padding: 0 0.75rem 0.75rem 0.75rem; }
        #host-stream-controls button { font-size: 0.85rem; padding: 0.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;}

        #chat-messages { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }
        .chat-bubble { max-width: 80%; padding: 0.75rem 1rem; border-radius: 1rem; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .chat-bubble.me { background-color: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
        .chat-bubble.other { background-color: var(--chat-other); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 0.25rem; }
        .chat-system { align-self: center; background: none; color: var(--text-muted); font-size: 0.75rem; font-style: italic; padding: 0; text-align: center; }

        #chat-input-area { display: flex; padding: 0.75rem; border-top: 1px solid var(--border); gap: 0.5rem; background-color: var(--surface-color); }
        #chat-input-area input { flex: 1; margin: 0; padding: 0.5rem 1rem; border-radius: 2rem; }
        #chat-input-area button { width: auto; padding: 0.5rem 1.25rem; border-radius: 2rem; }
    </style>
</head>
<body>

    <div id="media-container">
        <span id="no-video-placeholder">Bağlantı kurulduğunda video burada oynatılacak.</span>
        <div id="live-badge">CANLI YAYIN</div>
        
        <video id="native-video-player" playsinline class="hidden"></video>
        <div id="yt-player-wrapper" class="hidden"><div id="yt-player-iframe"></div></div>
    </div>

    <div id="app-container">
        
        <div id="setup-card" class="card">
            <h2 class="header-title">Oda Kur</h2>
            <div class="input-group" style="margin-top: 0;">
                <input type="text" id="initial-video-url" placeholder="YouTube veya MP4 linki (İsteğe bağlı)">
                <button id="btn-create-room">👑 Yeni Oda Kur</button>
            </div>
            
            <div style="text-align: center; margin: 1rem 0; color: var(--text-muted); font-size: 0.875rem;">veya katıl</div>
            
            <h2 class="header-title">Odaya Katıl</h2>
            <div class="input-group" style="margin-top: 0;">
                <input type="text" id="input-room-id" placeholder="5 HARFLİ KOD" maxlength="5">
                <button id="btn-join-room" class="btn-success">🔗 Odaya Katıl</button>
            </div>
            <p id="setup-log" class="text-sm" style="text-align: center; margin-top: 1rem; color: #ef4444;"></p>
        </div>

        <div id="host-card" class="card hidden">
            <h2 class="header-title" style="text-align: center;">Oda Kodun</h2>
            <p class="text-sm" style="text-align: center;">Arkadaşının bağlanması için bu kodu gönder:</p>
            <div id="my-short-code" class="id-badge">...</div>
            <p class="text-sm" style="text-align: center; color: var(--success);">İzleyici bekleniyor...</p>
        </div>

        <div id="chat-section" class="hidden">
            <div id="host-controls-wrapper" class="hidden">
                <div id="host-dynamic-controls">
                    <input type="text" id="dynamic-video-url" placeholder="Yeni video/youtube linki yapıştır...">
                    <button id="btn-change-video" class="btn-outline">Yükle</button>
                </div>
                <div id="host-stream-controls">
                    <button id="btn-share-screen" class="btn-warning">📺 Sekme Paylaş (Her Site İçin)</button>
                </div>
            </div>

            <div id="chat-messages">
                <div class="chat-bubble chat-system">P2P Bağlantı bekleniyor...</div>
            </div>
            <form id="chat-input-area" onsubmit="sendChatMessage(event)">
                <input type="text" id="chat-input" placeholder="Mesaj yaz..." autocomplete="off" required>
                <button type="submit">Gönder</button>
            </form>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        /**
         * VibeCoder P2P Watch & Chat Engine v4.0
         * Mimari: URL Sync + WebRTC MediaStream (Ekran Paylaşımı)
         */

        const PREFIX = "vbc-watch-";
        let peer = null, dataConnection = null, mediaCall = null;
        let isHost = false, isSyncing = false;
        
        let activePlayerMode = 'none'; // 'native', 'youtube', veya 'stream'
        let currentVideoUrl = '';
        let localStream = null;

        // UI Elemanları
        const mediaContainer = document.getElementById('media-container');
        const nativeVideo = document.getElementById('native-video-player');
        const ytWrapper = document.getElementById('yt-player-wrapper');
        const placeholder = document.getElementById('no-video-placeholder');
        const liveBadge = document.getElementById('live-badge');
        
        const setupCard = document.getElementById('setup-card');
        const hostCard = document.getElementById('host-card');
        const chatSection = document.getElementById('chat-section');
        const myShortCodeDisplay = document.getElementById('my-short-code');
        const inputRoomId = document.getElementById('input-room-id');
        const setupLog = document.getElementById('setup-log');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        
        const initialVideoUrl = document.getElementById('initial-video-url');
        const hostControlsWrapper = document.getElementById('host-controls-wrapper');
        const dynamicVideoUrl = document.getElementById('dynamic-video-url');
        const btnChangeVideo = document.getElementById('btn-change-video');
        const btnShareScreen = document.getElementById('btn-share-screen');

        // YouTube API
        let ytPlayer = null;
        let isYtApiReady = false;
        window.onYouTubeIframeAPIReady = function() { isYtApiReady = true; };
        function extractYTId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- MEDYA TEMİZLEME YARDIMCISI ---
        function clearMedia() {
            if(ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
            ytWrapper.classList.add('hidden');
            
            nativeVideo.pause();
            nativeVideo.src = "";
            nativeVideo.srcObject = null; // Stream'i temizle
            nativeVideo.classList.add('hidden');
            
            liveBadge.style.display = 'none';
        }

        // --- HİBRİT YÖNLENDİRİCİ (URL) ---
        function loadVideoSource(url) {
            if(!url) return;
            clearMedia();
            currentVideoUrl = url;
            placeholder.classList.add('hidden');

            const ytId = extractYTId(url);

            if (ytId) {
                activePlayerMode = 'youtube';
                ytWrapper.classList.remove('hidden');
                if (ytPlayer) ytPlayer.loadVideoById(ytId);
                else if (isYtApiReady) {
                    ytPlayer = new YT.Player('yt-player-iframe', {
                        height: '100%', width: '100%', videoId: ytId,
                        playerVars: { 'playsinline': 1, 'controls': isHost ? 1 : 0 },
                        events: { 'onStateChange': onYTStateChange }
                    });
                }
            } else {
                activePlayerMode = 'native';
                nativeVideo.classList.remove('hidden');
                nativeVideo.src = url;
                nativeVideo.load();
            }
        }

        // --- EKRAN PAYLAŞIMI (STREAM) MOTORU ---
        async function startScreenShare() {
            try {
                // Sesi ve Görüntüyü Tarayıcıdan İste
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" }, 
                    audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 44100 } // Film sesi için optimizasyon
                });
                
                localStream = stream;
                clearMedia();
                
                activePlayerMode = 'stream';
                placeholder.classList.add('hidden');
                liveBadge.style.display = 'block';
                
                nativeVideo.classList.remove('hidden');
                nativeVideo.srcObject = stream; // URL değil, Canlı Stream veriyoruz
                nativeVideo.muted = true; // Kendi paylaştığımız sesi yankı yapmasın diye kendimize kısıyoruz
                nativeVideo.play();

                // Eğer bağlantı varsa, MediaStream'i karşı tarafa "Ara" diyerek gönder
                if (peer && dataConnection) {
                    mediaCall = peer.call(dataConnection.peer, stream);
                    appendChat("Canlı sekme yayını başlatıldı.", "chat-system");
                    
                    // İzleyiciye modun değiştiğini bildir ki eski videoları kapatsın
                    sendDataPayload('sync', { action: 'stream-started' });
                }

                // Ekran paylaşımı tarayıcıdan durdurulursa
                stream.getVideoTracks()[0].onended = function () {
                    appendChat("Ekran paylaşımı durduruldu.", "chat-system");
                    sendDataPayload('sync', { action: 'stream-ended' });
                    clearMedia();
                    placeholder.classList.remove('hidden');
                };

            } catch (err) {
                appendChat("Ekran paylaşılamadı veya iptal edildi.", "chat-system");
            }
        }

        btnShareScreen.addEventListener('click', startScreenShare);

        // --- BİRLEŞİK SYNC ADAPTÖRÜ (Sadece URL tabanlılar için) ---
        function applySyncState(time, isPlaying) {
            if(activePlayerMode === 'stream') return; // Canlı yayında senkrona gerek yok!
            
            isSyncing = true;
            if (activePlayerMode === 'native') {
                if (Math.abs(nativeVideo.currentTime - time) > 0.5) nativeVideo.currentTime = time;
                if (isPlaying && nativeVideo.paused) nativeVideo.play().catch(e=>appendChat("Oynatmak için ekrana dokunun.", "chat-system"));
                else if (!isPlaying && !nativeVideo.paused) nativeVideo.pause();
            } 
            else if (activePlayerMode === 'youtube' && ytPlayer && typeof ytPlayer.seekTo === 'function') {
                if (Math.abs(ytPlayer.getCurrentTime() - time) > 1) ytPlayer.seekTo(time, true);
                if (isPlaying) ytPlayer.playVideo();
                else ytPlayer.pauseVideo();
            }
            setTimeout(() => { isSyncing = false; }, 300);
        }

        // --- HOST OLAY DİNLEYİCİLERİ ---
        function setupHostNativeListeners() {
            nativeVideo.setAttribute('controls', 'true');
            nativeVideo.addEventListener('play', () => { if(!isSyncing && activePlayerMode === 'native') sendSyncData('play', nativeVideo.currentTime, true); });
            nativeVideo.addEventListener('pause', () => { if(!isSyncing && activePlayerMode === 'native') sendSyncData('pause', nativeVideo.currentTime, false); });
            nativeVideo.addEventListener('seeked', () => { if(!isSyncing && activePlayerMode === 'native') sendSyncData('seek', nativeVideo.currentTime, !nativeVideo.paused); });
        }

        function onYTStateChange(event) {
            if(!isHost || isSyncing || activePlayerMode !== 'youtube') return;
            const time = ytPlayer.getCurrentTime();
            if (event.data === YT.PlayerState.PLAYING) sendSyncData('play', time, true);
            if (event.data === YT.PlayerState.PAUSED) sendSyncData('pause', time, false);
        }

        // --- GENEL P2P YARDIMCILARI ---
        function generateShortCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let res = '';
            for (let i=0; i<5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length)); return res;
        }

        function appendChat(msg, type) {
            const el = document.createElement('div'); el.className = `chat-bubble ${type}`; el.textContent = msg;
            chatMessages.appendChild(el); chatMessages.scrollTop = chatMessages.scrollHeight; 
        }

        function switchToChatMode() { setupCard.classList.add('hidden'); hostCard.classList.add('hidden'); chatSection.classList.remove('hidden'); }
        function sendDataPayload(type, payload) { if (dataConnection && dataConnection.open) dataConnection.send({ type, payload }); }
        function sendSyncData(action, time, isPlaying) { sendDataPayload('sync', { action, time, isPlaying }); }

        function handleIncomingData(dataEnvelope) {
            const { type, payload } = dataEnvelope;
            if (type === 'chat') {
                appendChat(payload.text, 'other');
            } 
            else if (type === 'sync') {
                if(payload.action === 'stream-started') {
                    appendChat("Host canlı ekran yayını başlattı.", "chat-system");
                    clearMedia(); // İzleyici URL videolarını kapatıp yayını bekler
                }
                else if(payload.action === 'stream-ended') {
                    appendChat("Canlı yayın sona erdi.", "chat-system");
                    clearMedia();
                    placeholder.classList.remove('hidden');
                }
                else if (payload.action === 'change-url' || payload.action === 'init') {
                    if (payload.url && currentVideoUrl !== payload.url) {
                        loadVideoSource(payload.url);
                        appendChat(payload.action === 'init' ? "Bağlanıldı." : "Host yeni bir video linki açtı.", "chat-system");
                    }
                }
                else if (payload.action !== 'change-url') {
                    applySyncState(payload.time, payload.isPlaying);
                }
            }
        }

        btnChangeVideo.addEventListener('click', () => {
            const newUrl = dynamicVideoUrl.value.trim();
            if (newUrl) {
                if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; } // Yayın varsa durdur
                loadVideoSource(newUrl);
                sendDataPayload('sync', { action: 'change-url', url: newUrl });
                dynamicVideoUrl.value = '';
            }
        });

        // --- HOST KURULUM ---
        document.getElementById('btn-create-room').addEventListener('click', () => {
            isHost = true;
            setupHostNativeListeners(); 

            const startUrl = initialVideoUrl.value.trim();
            if(startUrl) loadVideoSource(startUrl);

            setupLog.textContent = "Sunucuya bağlanılıyor...";
            const shortCode = generateShortCode();
            peer = new Peer(PREFIX + shortCode);

            peer.on('open', () => {
                setupCard.classList.add('hidden'); hostCard.classList.remove('hidden'); myShortCodeDisplay.textContent = shortCode;
            });

            peer.on('connection', (conn) => {
                dataConnection = conn;
                switchToChatMode();
                hostControlsWrapper.classList.remove('hidden');
                chatMessages.innerHTML = '';
                appendChat("İzleyici odaya katıldı! P2P bağlantı güvenli.", "chat-system");
                
                if(activePlayerMode === 'stream' && localStream) {
                    mediaCall = peer.call(dataConnection.peer, localStream);
                } else {
                    let cTime = 0, cPlaying = false;
                    if(activePlayerMode === 'native') { cTime = nativeVideo.currentTime; cPlaying = !nativeVideo.paused; }
                    else if(activePlayerMode === 'youtube' && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
                        cTime = ytPlayer.getCurrentTime(); cPlaying = (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING);
                    }
                    sendDataPayload('sync', { action: 'init', url: currentVideoUrl, time: cTime, isPlaying: cPlaying });
                }
                dataConnection.on('data', handleIncomingData);
            });
            peer.on('error', (err) => setupLog.textContent = "Hata: " + err.type);
        });

        // --- VİEWER KURULUM ---
        document.getElementById('btn-join-room').addEventListener('click', () => {
            const code = inputRoomId.value.trim().toUpperCase();
            if (code.length !== 5) { setupLog.textContent = "Lütfen 5 haneli kodu girin."; return; }

            isHost = false;
            setupLog.textContent = "Oda aranıyor...";
            mediaContainer.classList.add('viewer-mode'); 
            peer = new Peer(); 

            peer.on('open', () => {
                dataConnection = peer.connect(PREFIX + code);
                dataConnection.on('open', () => {
                    switchToChatMode();
                    chatMessages.innerHTML = '';
                    appendChat("Odaya bağlandınız! Veri bekleniyor...", "chat-system");
                    dataConnection.on('data', handleIncomingData);
                });
                dataConnection.on('error', () => appendChat("Bağlantı koptu.", "chat-system"));
            });

            // YENİ: İZLEYİCİ GÖRÜNTÜLÜ ARAMAYI (CANLI YAYINI) KABUL EDİYOR
            peer.on('call', (call) => {
                mediaCall = call;
                call.answer(); // Otomatik cevapla
                
                call.on('stream', (remoteStream) => {
                    clearMedia();
                    activePlayerMode = 'stream';
                    placeholder.classList.add('hidden');
                    liveBadge.style.display = 'block';
                    
                    nativeVideo.classList.remove('hidden');
                    nativeVideo.srcObject = remoteStream;
                    
                    // İzleyici tarafında ses açık olmalı
                    nativeVideo.muted = false; 
                    nativeVideo.play().catch(e => appendChat("Yayının sesini açmak için ekrana bir kez dokunun.", "chat-system"));
                });
            });
        });

        // Sohbet
        window.sendChatMessage = function(e) {
            e.preventDefault(); const text = chatInput.value.trim();
            if (!text || !dataConnection || !dataConnection.open) return;
            appendChat(text, 'me'); sendDataPayload('chat', { text: text });
            chatInput.value = ''; chatInput.focus(); 
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeCoder WParty (Native Mobile Edition)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- Tailwind Renkleri ve Modern Reset --- */
        :root {
            --bg-color: #0f172a; /* Koyu tema arkaplan (Video ile bütünlük) */
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #ec4899; /* Canlı bir pembe/mor tonu */
            --primary-hover: #db2777;
            --success: #10b981;
            --chat-me: #fce7f3;
            --chat-other: #f1f5f9;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        /* Vücut tamamen kilitli, kaydırma yok */
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-color); touch-action: manipulation; }

        /* --- ANA UYGULAMA KAPSAYICISI (VisualViewport ile boyutlanacak) --- */
        #app-root {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            width: 100%; max-width: 600px; margin: 0 auto;
            background: var(--bg-color); overflow: hidden;
        }

        /* =========================================
           1. LOBİ (KURULUM EKRANI)
           ========================================= */
        #lobby-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: var(--surface-color); padding: 2rem; z-index: 50;
        }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; text-align: center; }
        
        .lobby-card { width: 100%; background: #f8fafc; border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        
        .input-style { width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 0.75rem; font-size: 1rem; outline: none; transition: 0.2s; }
        .input-style:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 0.85rem; border: none; border-radius: 0.75rem; background: var(--primary); color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-success { background: var(--success); }
        
        #code-display { font-family: monospace; font-size: 2.5rem; font-weight: bold; color: var(--primary); text-align: center; letter-spacing: 5px; padding: 1rem; background: var(--chat-me); border-radius: 0.75rem; margin: 1rem 0;}

        /* =========================================
           2. VİDEO BÖLÜMÜ (ÜSTTE SABİT, 16:9)
           ========================================= */
        #main-screen { flex: 1; display: none; flex-direction: column; width: 100%; height: 100%; }

        #video-section {
            width: 100%;
            aspect-ratio: 16 / 9; /* Altın oran, mobilde kusursuz boyut */
            flex-shrink: 0; /* Klavye açılsa da ASLA EZİLMEZ */
            background-color: #000; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }
        #native-video { width: 100%; height: 100%; object-fit: contain; }
        #yt-wrapper { width: 100%; height: 100%; }

        /* Mobil Auto-play Güvenlik Kalkanı (Dokunmaya zorlar) */
        #play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7); color: white; display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 20;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }
        .play-icon { font-size: 3rem; margin-bottom: 0.5rem; color: var(--primary); }

        #video-placeholder { color: rgba(255,255,255,0.5); font-size: 0.85rem; text-align: center; padding: 1rem; }

        /* =========================================
           3. SOHBET BÖLÜMÜ (ESNEK & KAYDIRILABİLİR)
           ========================================= */
        #chat-section {
            flex: 1; /* Videodan arta kalan tüm boşluğu alır */
            display: flex; flex-direction: column;
            background-color: var(--surface-color);
            border-radius: 1.5rem 1.5rem 0 0; /* Modern görünüm için üst köşeleri yuvarlat */
            margin-top: -1rem; /* Video ile hafif iç içe geçsin */
            padding-top: 1rem;
            z-index: 5; overflow: hidden; /* Sadece mesaj listesi kayacak */
        }

        #host-url-bar {
            display: flex; padding: 0.5rem 1rem; gap: 0.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        #host-url-bar input { flex: 1; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 2rem; font-size: 0.85rem; outline: none; }
        #host-url-bar button { padding: 0.5rem 1rem; background: var(--text-main); color: white; border: none; border-radius: 2rem; font-size: 0.85rem; font-weight: bold;}

        /* Mesaj Listesi Alanı */
        #messages-container {
            flex: 1; overflow-y: auto; padding: 1rem;
            display: flex; flex-direction: column; gap: 0.75rem;
            scroll-behavior: smooth;
        }

        .bubble { max-width: 85%; padding: 0.65rem 1rem; border-radius: 1.25rem; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bubble.system { align-self: center; background: none; box-shadow: none; color: var(--text-muted); font-size: 0.75rem; text-align: center; }
        .bubble.me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
        .bubble.other { background: var(--chat-other); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 0.25rem; }

        /* Mesaj Gönderme Kutusu (Klavyeye yapışık kalır) */
        #input-area {
            display: flex; padding: 0.75rem 1rem; background: var(--surface-color); border-top: 1px solid var(--border);
            gap: 0.5rem; flex-shrink: 0;
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        }
        #chat-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 2rem; font-size: 1rem; outline: none; background: #f8fafc; }
        #chat-input:focus { border-color: var(--primary); background: #fff;}
        #btn-send { padding: 0.75rem 1.25rem; background: var(--primary); color: white; border: none; border-radius: 2rem; font-weight: bold; cursor: pointer; }
        #btn-send:active { background: var(--primary-hover); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-root">
        
        <div id="lobby-screen">
            <div class="logo">WParty</div>
            <div class="subtitle">Senkronize izle, kesintisiz sohbet et.</div>
            
            <div id="setup-start" class="lobby-card">
                <button id="btn-create-p2p" class="btn">👑 Oda Kur (Host Ol)</button>
                <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem;">veya</div>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="join-code" class="input-style" placeholder="5 HANELİ KOD" maxlength="5" style="text-transform: uppercase; text-align: center; font-weight: bold; letter-spacing: 2px;">
                </div>
                <button id="btn-join-p2p" class="btn btn-success">🔗 Odaya Katıl</button>
                <div id="lobby-log" style="text-align: center; color: #ef4444; font-size: 0.85rem; height: 1rem;"></div>
            </div>

            <div id="setup-host-waiting" class="lobby-card hidden">
                <p style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">Arkadaşına bu kodu gönder:</p>
                <div id="code-display">...</div>
                <p style="text-align: center; font-size: 0.9rem; color: var(--success); font-weight: 600;">Bağlantı bekleniyor...</p>
            </div>
        </div>

        <div id="main-screen">
            
            <div id="video-section">
                <div id="video-placeholder">Host video yüklediğinde burada açılacak.</div>
                
                <div id="play-overlay">
                    <div class="play-icon">▶</div>
                    <div>Sesi Açmak İçin Dokun</div>
                </div>

                <video id="native-video" playsinline class="hidden"></video>
                <div id="yt-wrapper" class="hidden"><div id="yt-iframe"></div></div>
            </div>

            <div id="chat-section">
                <div id="host-url-bar" class="hidden">
                    <input type="text" id="host-video-url" placeholder="YouTube veya MP4 linki...">
                    <button id="btn-load-video">Aç</button>
                </div>

                <div id="messages-container">
                    <div class="bubble system">Bağlantı kuruldu. Sohbet şifrelidir.</div>
                </div>

                <form id="input-area" onsubmit="sendMsg(event)">
                    <input type="text" id="chat-input" placeholder="Mesaj yaz..." autocomplete="off" required>
                    <button type="submit" id="btn-send">Gönder</button>
                </form>
            </div>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        /**
         * VibeCoder WParty v7.0 - Native Mobile UX
         */

        /* ==========================================
           MİMARİ DOKUNUŞ: KLAVYE (VISUAL VIEWPORT) FİX
           Mobil klavye açıldığında ekranın dışarı taşmasını engeller.
           ========================================== */
        const appRoot = document.getElementById('app-root');
        const msgContainer = document.getElementById('messages-container');
        
        function resizeViewport() {
            if (window.visualViewport) {
                appRoot.style.height = window.visualViewport.height + 'px';
                // Klavye açıldığında sohbetin en altına kaydır
                setTimeout(() => msgContainer.scrollTop = msgContainer.scrollHeight, 100);
            }
        }
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', resizeViewport);
            window.visualViewport.addEventListener('scroll', resizeViewport);
            resizeViewport(); // İlk açılış
        }

        /* ==========================================
           P2P VE UI DEĞİŞKENLERİ
           ========================================== */
        const PREFIX = "vbc-v7-";
        let peer = null, conn = null, isHost = false, isSyncing = false;
        let activeMode = 'none', currentUrl = '';

        // DOM Elementleri
        const lobbyScreen = document.getElementById('lobby-screen');
        const mainScreen = document.getElementById('main-screen');
        const startCard = document.getElementById('setup-start');
        const waitCard = document.getElementById('setup-host-waiting');
        const lobbyLog = document.getElementById('lobby-log');
        const codeDisplay = document.getElementById('code-display');
        const joinCodeInput = document.getElementById('join-code');
        
        const hostUrlBar = document.getElementById('host-url-bar');
        const inputVideoUrl = document.getElementById('host-video-url');
        const vPlaceholder = document.getElementById('video-placeholder');
        const playOverlay = document.getElementById('play-overlay');
        
        const nativeVid = document.getElementById('native-video');
        const ytWrap = document.getElementById('yt-wrapper');
        const chatInput = document.getElementById('chat-input');

        /* ==========================================
           VİDEO MOTORU (YOUTUBE + MP4)
           ========================================== */
        let ytPlayer = null;
        let isYtReady = false;
        window.onYouTubeIframeAPIReady = function() { isYtReady = true; };

        function extractYT(url) {
            const match = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadVideo(url) {
            if(!url) return;
            currentUrl = url;
            vPlaceholder.classList.add('hidden');
            playOverlay.style.display = 'none'; // Yeni video yüklendiğinde kalkanı gizle

            const ytId = extractYT(url);
            if (ytId) {
                activeMode = 'youtube';
                nativeVid.classList.add('hidden'); nativeVid.pause();
                ytWrap.classList.remove('hidden');

                const tryYT = () => {
                    if (typeof YT !== 'undefined' && YT.Player) {
                        if(ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                            ytPlayer.loadVideoById(ytId);
                        } else {
                            ytPlayer = new YT.Player('yt-iframe', {
                                height: '100%', width: '100%', videoId: ytId,
                                playerVars: { 'playsinline': 1, 'controls': isHost ? 1 : 0, 'disablekb': 1 },
                                events: { 'onStateChange': onYTStateChange }
                            });
                        }
                    } else { setTimeout(tryYT, 300); }
                };
                tryYT();
            } else {
                activeMode = 'native';
                ytWrap.classList.add('hidden');
                if (ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
                nativeVid.classList.remove('hidden');
                nativeVid.src = url; nativeVid.load();
                
                if (isHost) nativeVid.setAttribute('controls', 'true');
                else nativeVid.removeAttribute('controls');
            }
        }

        /* ==========================================
           SENKRONİZASYON VE GÜVENLİK (AUTO-PLAY)
           ========================================== */
        function applySync(time, isPlaying) {
            isSyncing = true;
            if (activeMode === 'native') {
                if (Math.abs(nativeVid.currentTime - time) > 0.5) nativeVid.currentTime = time;
                if (isPlaying && nativeVid.paused) {
                    nativeVid.play().catch(e => {
                        // MİMARİ ÇÖZÜM: Tarayıcı oynatmayı reddederse (kullanıcı dokunmadıysa) Overlay'i göster
                        if(!isHost) playOverlay.style.display = 'flex';
                    });
                } else if (!isPlaying && !nativeVid.paused) nativeVid.pause();
            } 
            else if (activeMode === 'youtube' && ytPlayer && typeof ytPlayer.seekTo === 'function') {
                if (Math.abs(ytPlayer.getCurrentTime() - time) > 1) ytPlayer.seekTo(time, true);
                if (isPlaying) ytPlayer.playVideo(); else ytPlayer.pauseVideo();
            }
            setTimeout(() => { isSyncing = false; }, 300);
        }

        // İzleyici güvenlik kalkanına dokunduğunda
        playOverlay.addEventListener('click', () => {
            playOverlay.style.display = 'none';
            if (activeMode === 'native') nativeVid.play();
        });

        // Host Video Olay Dinleyicileri
        nativeVid.addEventListener('play', () => { if(isHost && !isSyncing) sendSync('play', nativeVid.currentTime, true); });
        nativeVid.addEventListener('pause', () => { if(isHost && !isSyncing) sendSync('pause', nativeVid.currentTime, false); });
        nativeVid.addEventListener('seeked', () => { if(isHost && !isSyncing) sendSync('seek', nativeVid.currentTime, !nativeVid.paused); });

        function onYTStateChange(event) {
            if(!isHost || isSyncing) return;
            const time = ytPlayer.getCurrentTime();
            if (event.data === YT.PlayerState.PLAYING) sendSync('play', time, true);
            if (event.data === YT.PlayerState.PAUSED) sendSync('pause', time, false);
        }

        /* ==========================================
           P2P HABERLEŞME VE SOHBET
           ========================================== */
        function genCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let res = '';
            for(let i=0; i<5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length)); return res;
        }

        function appendChat(msg, type) {
            const el = document.createElement('div'); el.className = `bubble ${type}`; el.textContent = msg;
            msgContainer.appendChild(el); 
            // Yumuşak kaydırma
            setTimeout(() => msgContainer.scrollTop = msgContainer.scrollHeight, 50);
        }

        function sendSync(action, time=0, isPlaying=false, url=null) {
            if (conn && conn.open) conn.send({ type: 'sync', action, time, isPlaying, url });
        }

        function handleData(dataEnvelope) {
            const { type, action, time, isPlaying, url, text } = dataEnvelope;
            
            if (type === 'chat') {
                appendChat(text, 'other');
            } else if (type === 'sync') {
                if (action === 'url' || action === 'init') {
                    if (url && currentUrl !== url) {
                        loadVideo(url);
                        appendChat(action === 'init' ? "Video bağlandı." : "Host yeni bir video açtı.", "system");
                    }
                } else {
                    applySync(time, isPlaying);
                }
            }
        }

        function startApp() {
            lobbyScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            if(isHost) hostUrlBar.classList.remove('hidden');
            resizeViewport(); // UI değiştiği için boyutları tazele
        }

        // --- HOST BAĞLANTISI ---
        document.getElementById('btn-create-p2p').addEventListener('click', () => {
            isHost = true;
            lobbyLog.textContent = "Sunucuya bağlanılıyor...";
            const code = genCode();
            peer = new Peer(PREFIX + code);

            peer.on('open', () => {
                startCard.classList.add('hidden');
                waitCard.classList.remove('hidden');
                codeDisplay.textContent = code;
                lobbyLog.textContent = "";
            });

            peer.on('connection', (c) => {
                conn = c;
                startApp();
                appendChat("İzleyici odaya katıldı!", "system");
                sendSync('init', 0, false, currentUrl);
                conn.on('data', handleData);
            });
            peer.on('error', (err) => lobbyLog.textContent = "Bağlantı hatası: " + err.type);
        });

        document.getElementById('btn-load-video').addEventListener('click', () => {
            const url = inputVideoUrl.value.trim();
            if(url) {
                loadVideo(url);
                sendSync('url', 0, false, url);
                inputVideoUrl.value = '';
            }
        });

        // --- İZLEYİCİ BAĞLANTISI ---
        document.getElementById('btn-join-p2p').addEventListener('click', () => {
            const code = joinCodeInput.value.trim().toUpperCase();
            if(code.length !== 5) { lobbyLog.textContent = "5 haneli kodu giriniz."; return; }
            
            isHost = false;
            lobbyLog.textContent = "Oda aranıyor...";
            peer = new Peer();

            peer.on('open', () => {
                conn = peer.connect(PREFIX + code);
                conn.on('open', () => {
                    startApp();
                    conn.on('data', handleData);
                });
                conn.on('error', () => appendChat("Bağlantı koptu.", "system"));
            });
            peer.on('error', (err) => lobbyLog.textContent = "Oda bulunamadı.");
        });

        // --- MESAJ GÖNDERME ---
        window.sendMsg = function(e) {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || !conn || !conn.open) return;
            
            appendChat(text, 'me');
            conn.send({ type: 'chat', text: text });
            chatInput.value = '';
            
            // Mobilde klavyenin kapanmaması için odağı geri ver
            chatInput.focus();
        };

    </script>
</body>
</html>
